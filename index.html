// ─── REDUCER ──────────────────────────────────────────────────────────────────
function reducer(state,action){
  const{type,payload}=action
  const updMonth=(key,fn)=>({...state,months:{...state.months,[key]:fn(state.months[key]||{cashBalance:0,closed:false,snapshot:null,entries:[],exits:[],cardExpenses:{},collaboratorExtras:{},dailyNotes:{},dailyCash:{}})}})
  switch(type){
    case'ADD_ENTRY':return updMonth(payload.monthKey,m=>({...m,entries:[...(m.entries||[]),{...payload.entry,id:uid()}]}))
    case'UPDATE_ENTRY':return updMonth(payload.monthKey,m=>({...m,entries:m.entries.map(e=>e.id===payload.entry.id?payload.entry:e)}))
    case'DELETE_ENTRY':return updMonth(payload.monthKey,m=>({...m,entries:m.entries.filter(e=>e.id!==payload.id)}))
    case'ADD_EXIT':return updMonth(payload.monthKey,m=>({...m,exits:[...(m.exits||[]),{...payload.exit,id:uid()}]}))
    case'UPDATE_EXIT':return updMonth(payload.monthKey,m=>({...m,exits:m.exits.map(e=>e.id===payload.exit.id?payload.exit:e)}))
    case'DELETE_EXIT':return updMonth(payload.monthKey,m=>({...m,exits:m.exits.filter(e=>e.id!==payload.id)}))
    case'SET_CASH_BALANCE':return updMonth(payload.monthKey,m=>({...m,cashBalance:payload.value}))
    case'UPDATE_DAILY_NOTE':return updMonth(payload.monthKey,m=>({...m,dailyNotes:{...m.dailyNotes,[payload.day]:payload.note}}))
    case'UPDATE_DAILY_CASH':return updMonth(payload.monthKey,m=>({...m,dailyCash:{...m.dailyCash,[payload.day]:payload.value}}))
    case'ADD_CARD_EXPENSE':return updMonth(payload.monthKey,m=>({...m,cardExpenses:{...m.cardExpenses,[payload.cardId]:[...(m.cardExpenses?.[payload.cardId]||[]),{...payload.expense,id:uid()}]}}))
    case'DELETE_CARD_EXPENSE':return updMonth(payload.monthKey,m=>({...m,cardExpenses:{...m.cardExpenses,[payload.cardId]:(m.cardExpenses?.[payload.cardId]||[]).filter(e=>e.id!==payload.id)}}))
    case'ADD_COLLAB_EXTRA':return updMonth(payload.monthKey,m=>({...m,collaboratorExtras:{...m.collaboratorExtras,[payload.collabId]:[...(m.collaboratorExtras?.[payload.collabId]||[]),{...payload.extra,id:uid()}]}}))
    case'DELETE_COLLAB_EXTRA':return updMonth(payload.monthKey,m=>({...m,collaboratorExtras:{...m.collaboratorExtras,[payload.collabId]:(m.collaboratorExtras?.[payload.collabId]||[]).filter(e=>e.id!==payload.id)}}))
    case'CLOSE_MONTH':return updMonth(payload.monthKey,m=>({...m,closed:true,snapshot:{...m,closed:true}}))
    case'COPY_FROM_PREV':{
      const prev=state.months[payload.prevKey]
      if(!prev)return state
      return updMonth(payload.monthKey,m=>({...m,entries:prev.entries.map(e=>({...e,id:uid(),status:'Previsto',realValue:0,note:''})),exits:prev.exits.map(e=>({...e,id:uid(),status:'Pendente',realValue:0,note:''}))}))
    }
    case'GENERATE_CONTRACT_ENTRIES':{
      const client=state.settings.clients.find(c=>c.id===payload.clientId)
      if(!client||!client.startDate||!client.duration)return state
      let next={...state,months:{...state.months}}
      const dur=parseInt(client.duration)||12
      const start=new Date(client.startDate+'T12:00:00')
      for(let i=0;i<dur;i++){
        const d=new Date(start.getFullYear(),start.getMonth()+i,1)
        const mk=monthKey(d.getFullYear(),d.getMonth()+1)
        const month=next.months[mk]||{cashBalance:0,closed:false,snapshot:null,entries:[],exits:[],cardExpenses:{},collaboratorExtras:{},dailyNotes:{},dailyCash:{}}
        const exists=(month.entries||[]).find(e=>e.clientId===payload.clientId||e.client===client.name)
        if(!exists){
          const entry={id:uid(),client:client.name,clientId:payload.clientId,dueDay:client.dueDay,expectedValue:client.value,status:'Previsto',realValue:0,note:'Gerado pelo contrato'}
          next.months[mk]={...month,entries:[...(month.entries||[]),entry]}
        }
      }
      return next
    }
    case'ADD_TASK':return{...state,tasks:[...(state.tasks||[]),{...payload.task,id:uid(),createdAt:new Date().toISOString()}]}
    case'UPDATE_TASK':return{...state,tasks:(state.tasks||[]).map(t=>t.id===payload.task.id?{...payload.task,updatedAt:new Date().toISOString()}:t)}
    case'DELETE_TASK':return{...state,tasks:(state.tasks||[]).filter(t=>t.id!==payload.id)}
    case'ADD_GOAL':return{...state,settings:{...state.settings,goals:[...(state.settings.goals||[]),{...payload.goal,id:uid(),createdAt:new Date().toISOString()}]}}
    case'UPDATE_GOAL':return{...state,settings:{...state.settings,goals:(state.settings.goals||[]).map(g=>g.id===payload.goal.id?{...payload.goal,updatedAt:new Date().toISOString()}:g)}}
    case'DELETE_GOAL':return{...state,settings:{...state.settings,goals:(state.settings.goals||[]).filter(g=>g.id!==payload.id)}}
    case'ADD_PERMUTE_USAGE':return{...state,settings:{...state.settings,permuteUsages:[...(state.settings.permuteUsages||[]),{...payload.usage,id:uid()}]}}
    case'DELETE_PERMUTE_USAGE':return{...state,settings:{...state.settings,permuteUsages:(state.settings.permuteUsages||[]).filter(u=>u.id!==payload.id)}}
    case'SELL_PERMUTE':{
      const {usage,entry,entryMonthKey}=payload
      const nextUsages=[...(state.settings.permuteUsages||[]),{...usage,id:uid(),type:'sale'}]
      const month=state.months[entryMonthKey]||{cashBalance:0,closed:false,snapshot:null,entries:[],exits:[],cardExpenses:{},collaboratorExtras:{},dailyNotes:{},dailyCash:{}}
      const newEntry={...entry,id:uid(),status:'Previsto',realValue:0}
      return{...state,settings:{...state.settings,permuteUsages:nextUsages},months:{...state.months,[entryMonthKey]:{...month,entries:[...(month.entries||[]),newEntry]}}}
    }
    case'ADD_SETTING':return{...state,settings:{...state.settings,[payload.key]:[...(state.settings[payload.key]||[]),{...payload.item,id:uid()}]}}
    case'UPDATE_SETTING':return{...state,settings:{...state.settings,[payload.key]:state.settings[payload.key].map(i=>i.id===payload.item.id?payload.item:i)}}
    case'DELETE_SETTING':return{...state,settings:{...state.settings,[payload.key]:state.settings[payload.key].filter(i=>i.id!==payload.id)}}
    case'IMPORT':{const d=payload.data;if(!d.settings)d.settings={};if(!d.settings.permuteUsages)d.settings.permuteUsages=[];if(!d.settings.goals)d.settings.goals=[];if(!d.tasks)d.tasks=[];return d}
    default:return state
  }
}

function loadState(){
  try{
    const s=localStorage.getItem('paiolfinance_v3')
    const data=s?JSON.parse(s):SEED
    if(data.settings?.clients){
      data.settings.clients=data.settings.clients.map(c=>({startDate:'',duration:12,endDate:'',contractNote:'',phone:'',email:'',permuteValue:0,...c}))
    }
    if(!data.settings)data.settings={}
    if(!data.settings.permuteUsages)data.settings.permuteUsages=[]
    if(!data.settings.goals)data.settings.goals=[]
    if(!data.tasks)data.tasks=[]
    return data
  }catch{return SEED}
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function DashboardPage({state,dispatch,monthKey:mk,toast}){
  const month=state.months[mk]||{}
  const entries=month.entries||[]
  const exits=month.exits||[]
  const totalExpIn=entries.reduce((s,e)=>s+(e.expectedValue||0),0)
  const totalRealIn=entries.filter(e=>e.status==='Recebido').reduce((s,e)=>s+(e.realValue||0),0)
  const totalExpOut=exits.reduce((s,e)=>s+(e.expectedValue||0),0)
  const totalRealOut=exits.filter(e=>e.status==='Pago').reduce((s,e)=>s+(e.realValue||0),0)
  const resPrev=totalExpIn-totalExpOut
  const resReal=totalRealIn-totalRealOut
  // Carry-over: saldo final do mês anterior
  const prevMkKey=(()=>{const d=parseMonthKey(mk);const pm=d.month===1?{year:d.year-1,month:12}:{year:d.year,month:d.month-1};return monthKey(pm.year,pm.month)})()
  const prevMth=state.months[prevMkKey]||null
  const prevEndBal=prevMth?((prevMth.cashBalance||0)+prevMth.entries?.filter(e=>e.status==='Recebido').reduce((s,e)=>s+(e.realValue||0),0)-prevMth.exits?.filter(e=>e.status==='Pago').reduce((s,e)=>s+(e.realValue||0),0)):null
  const showCarryOver=!month.cashBalance&&prevEndBal!==null&&prevEndBal!==0
  const [editBal,setEditBal]=useState(false)
  const [balVal,setBalVal]=useState(String(month.cashBalance||''))
  const pendIn=entries.filter(e=>e.status!=='Recebido')
  const pendOut=exits.filter(e=>e.status!=='Pago')
  const barData=[{name:'Entradas',Previsto:totalExpIn,Realizado:totalRealIn},{name:'Saídas',Previsto:totalExpOut,Realizado:totalRealOut},{name:'Resultado',Previsto:resPrev,Realizado:resReal}]

  function saveBal(){const v=parseFloat(balVal.replace(',','.')); if(!isNaN(v)){dispatch({type:'SET_CASH_BALANCE',payload:{monthKey:mk,value:v}});toast('Saldo atualizado')}; setEditBal(false)}

  return(
    <div className="space-y-6">
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
        <div className="col-span-2 rounded-2xl p-5" style={{background:'linear-gradient(135deg,#10b98115,#10b98105)',border:'1px solid #10b98130',boxShadow:'0 4px 20px #10b98108'}}>
          <div className="flex items-start justify-between mb-3"><span className="text-xs text-slate-400 uppercase tracking-wider">Saldo em Caixa</span><Wallet size={16} style={{color:'#10b981'}}/></div>
          {editBal?(
            <div className="flex gap-2 items-center">
              <input className={iCls} style={{...iSty,maxWidth:160}} type="number" value={balVal} onChange={e=>setBalVal(e.target.value)} onKeyDown={e=>e.key==='Enter'&&saveBal()} autoFocus/>
              <button onClick={saveBal}><Check size={18} style={{color:'#10b981'}}/></button>
            </div>
          ):(
            <div className="flex items-center gap-2 cursor-pointer" onClick={()=>{setBalVal(String(month.cashBalance||'0'));setEditBal(true)}}>
              <span className="text-2xl font-bold" style={{color:'#10b981'}}>{fmtBRL(month.cashBalance)}</span>
              <Pencil size={14} className="text-slate-500"/>
            </div>
          )}
          <div className="text-xs text-slate-500 mt-1">Clique para editar</div>
          {showCarryOver&&(
            <button onClick={()=>{dispatch({type:'SET_CASH_BALANCE',payload:{monthKey:mk,value:prevEndBal}});toast('Saldo inicial importado do mês anterior ✓')}}
              className="text-xs mt-2 px-3 py-1 rounded-lg" style={{background:'#10b98120',color:'#10b981',border:'1px solid #10b98130'}}>
              ↩ Iniciar com {fmtBRL(prevEndBal)} do mês anterior
            </button>
          )}
        </div>
        <SummaryCard label="Entradas Previstas" value={fmtBRL(totalExpIn)} sub={`Realizadas: ${fmtBRL(totalRealIn)}`} color="#10b981" icon={TrendingUp}/>
        <SummaryCard label="Saídas Previstas" value={fmtBRL(totalExpOut)} sub={`Pagas: ${fmtBRL(totalRealOut)}`} color="#ef4444" icon={TrendingDown}/>
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
        <div className="rounded-2xl p-5 space-y-4" style={{background:'#1e293b',border:'1px solid #2d3f55'}}>
          <h3 className="text-sm font-semibold text-slate-300">Resultado do Mês</h3>
          <div className="flex gap-6">
            <div><div className="text-xs text-slate-500 mb-1">Previsto</div><div className="text-xl font-bold" style={{color:resPrev>=0?'#10b981':'#ef4444'}}>{fmtBRL(resPrev)}</div></div>
            <div><div className="text-xs text-slate-500 mb-1">Realizado</div><div className="text-xl font-bold" style={{color:resReal>=0?'#10b981':'#ef4444'}}>{fmtBRL(resReal)}</div></div>
          </div>
          <ProgressBar label="Entradas realizadas" current={totalRealIn} total={totalExpIn} color="#10b981"/>
          <ProgressBar label="Saídas pagas" current={totalRealOut} total={totalExpOut} color="#ef4444"/>

function EntriesPage({state,dispatch,monthKey:mk,toast}){

  const totalReal=entries.filter(e=>e.status==='Recebido').reduce((s,e)=>s+(e.realValue||0),0)
  const totalPend=entries.filter(e=>e.status!=='Recebido').reduce((s,e)=>s+(e.expectedValue||0),0)

// ─── FLUXO DE CAIXA ───────────────────────────────────────────────────────────
function CashFlowPage({state,dispatch,monthKey:mk}){
  const{year,month}=parseMonthKey(mk)
  const mData=state.months[mk]||{}
  const entries=mData.entries||[]
  const exits=mData.exits||[]
  const daysInMonth=new Date(year,month,0).getDate()
  const today=new Date()
  const isCurr=today.getFullYear()===year&&today.getMonth()+1===month
  const entriesByDay={};exits;entries.forEach(e=>{if(e.dueDay)entriesByDay[e.dueDay]=(entriesByDay[e.dueDay]||0)+(e.expectedValue||0)})
  const exitsByDay={};exits.forEach(e=>{if(e.day)exitsByDay[e.day]=(exitsByDay[e.day]||0)+(e.expectedValue||0)})
  let running=mData.cashBalance||0
  return(
    <div className="rounded-2xl overflow-auto" style={{border:'1px solid #2d3f55'}}>
      <table className="w-full min-w-[700px]">
        <thead style={{background:'#0f172a'}}><tr><Th>Dia</Th><Th right>Ent. Prev.</Th><Th right>Saí. Prev.</Th><Th right>Saldo Esp.</Th><Th right>Saldo Real</Th><Th>Status</Th><Th>Obs.</Th></tr></thead>
        <tbody>
          {Array.from({length:daysInMonth},(_,i)=>i+1).map((d,i)=>{
            const dIn=entriesByDay[d]||0;const dOut=exitsByDay[d]||0;running+=dIn-dOut
            const realCash=mData.dailyCash?.[String(d)]
            const isToday=isCurr&&today.getDate()===d
            const isPast=isCurr?today.getDate()>d:year<today.getFullYear()||(year===today.getFullYear()&&month<today.getMonth()+1)
            const diff=realCash!=null?realCash-running:null
            const status=realCash!=null?(Math.abs(diff)<1?'✅':'⚠️'):(isPast?'⏳':'—')
            return(
              <tr key={d} className="border-t" style={{borderColor:'#334155',background:isToday?'#1a3a2a':i%2===0?'#1e293b':'#1a2540'}}>
                <Td><span style={{color:isToday?'#10b981':'#f1f5f9'}}>{d}</span>{isToday&&<span className="ml-1 text-xs text-emerald-500">hoje</span>}</Td>
                <Td right color={dIn>0?'#10b981':'#475569'}>{dIn>0?fmtBRL(dIn):'—'}</Td>
                <Td right color={dOut>0?'#ef4444':'#475569'}>{dOut>0?fmtBRL(dOut):'—'}</Td>
                <Td right color={running>=0?'#f1f5f9':'#ef4444'}>{fmtBRL(running)}</Td>
                <td className="px-3 py-1.5"><input type="number" defaultValue={realCash??''} placeholder="—"
                  onBlur={e=>{const v=parseFloat(e.target.value);if(!isNaN(v))dispatch({type:'UPDATE_DAILY_CASH',payload:{monthKey:mk,day:String(d),value:v}})}}
                  className="w-24 px-2 py-1 rounded text-right text-sm outline-none" style={{background:'#0f172a',border:'1px solid #2d3f55',color:'#f1f5f9'}}/></td>
                <Td>{status}</Td>
                <td className="px-3 py-1.5"><input defaultValue={mData.dailyNotes?.[String(d)]||''} placeholder="Observação..."
                  onBlur={e=>dispatch({type:'UPDATE_DAILY_NOTE',payload:{monthKey:mk,day:String(d),note:e.target.value}})}
                  className="w-full px-2 py-1 rounded text-sm outline-none" style={{background:'transparent',border:'1px solid transparent',color:'#94a3b8'}}/></td>
              </tr>
            )
          })}
        </tbody>
      </table>
    </div>
  )
}

    dispatch({type:'ADD_CARD_EXPENSE',payload:{monthKey:mk,cardId:sel,expense:{description:form.description,value:parseFloat(form.value)||0,installments:parseInt(form.installments)||1,currentInstallment:parseInt(form.currentInstallment)||1}}})

  return(

// ─── PROJEÇÃO ANUAL ───────────────────────────────────────────────────────────
function AnnualProjectionPage({state}){
  const today=new Date();const year=today.getFullYear()
  const rows=Array.from({length:12},(_,i)=>{
    const mk=monthKey(year,i+1);const m=state.months[mk]||{}
    const entries=m.entries||[];const exits=m.exits||[]
    const expIn=entries.reduce((s,e)=>s+(e.expectedValue||0),0)
    const realIn=entries.filter(e=>e.status==='Recebido').reduce((s,e)=>s+(e.realValue||0),0)
    const expOut=exits.reduce((s,e)=>s+(e.expectedValue||0),0)
    const realOut=exits.filter(e=>e.status==='Pago').reduce((s,e)=>s+(e.realValue||0),0)
    return{mk,month:i+1,name:MONTH_NAMES[i],expIn,realIn,expOut,realOut,isPast:i+1<today.getMonth()+1,isCurrent:i+1===today.getMonth()+1}
  })
  let accP=0,accR=0
  const data=rows.map(r=>{accP+=r.expIn-r.expOut;if(r.isPast||r.isCurrent)accR+=r.realIn-r.realOut;return{...r,accP,accR}})
  const chartData=data.map(r=>({name:r.name.slice(0,3),'Entradas':r.expIn,'Saídas':r.expOut}))
  return(
    <div className="space-y-5">
      <div className="rounded-2xl p-5" style={{background:'#1e293b',border:'1px solid #2d3f55'}}>
        <h3 className="text-sm font-semibold text-slate-300 mb-4">Evolução {year}</h3>
        <ResponsiveContainer width="100%" height={200}>
          <AreaChart data={chartData}>
            <defs>
              <linearGradient id="gin" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#10b981" stopOpacity={0.3}/><stop offset="95%" stopColor="#10b981" stopOpacity={0}/></linearGradient>
              <linearGradient id="gout" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#ef4444" stopOpacity={0.3}/><stop offset="95%" stopColor="#ef4444" stopOpacity={0}/></linearGradient>
            </defs>
            <CartesianGrid strokeDasharray="3 3" stroke="#2d3f55"/>
            <XAxis dataKey="name" tick={{fill:'#64748b',fontSize:11}} axisLine={false} tickLine={false}/>
            <YAxis tick={{fill:'#64748b',fontSize:10}} axisLine={false} tickLine={false} tickFormatter={v=>`${(v/1000).toFixed(0)}k`}/>
            <Tooltip content={<CTip/>}/><Legend wrapperStyle={{fontSize:11,color:'#94a3b8'}}/>
            <Area type="monotone" dataKey="Entradas" stroke="#10b981" fill="url(#gin)" strokeWidth={2}/>
            <Area type="monotone" dataKey="Saídas" stroke="#ef4444" fill="url(#gout)" strokeWidth={2}/>
          </AreaChart>
        </ResponsiveContainer>
      </div>
      <div className="rounded-2xl overflow-auto" style={{border:'1px solid #2d3f55'}}>
        <table className="w-full min-w-[800px]">
          <thead style={{background:'#0f172a'}}><tr><Th>Mês</Th><Th right>Ent.Prev</Th><Th right>Saí.Prev</Th><Th right>Res.Prev</Th><Th right>Ent.Real</Th><Th right>Saí.Real</Th><Th right>Res.Real</Th><Th right>Acumulado</Th></tr></thead>
          <tbody>{data.map((r,i)=>{
            const rP=r.expIn-r.expOut;const rR=r.realIn-r.realOut
            return(
              <tr key={r.mk} className="border-t" style={{borderColor:'#334155',background:r.isCurrent?'#1a3a2a':i%2===0?'#1e293b':'#1a2540'}}>
                <Td><span style={{color:r.isCurrent?'#10b981':'#f1f5f9'}}>{r.name}</span>{r.isCurrent&&<span className="ml-1 text-xs text-emerald-500">atual</span>}</Td>
                <Td right color="#10b981">{fmtBRL(r.expIn)}</Td><Td right color="#ef4444">{fmtBRL(r.expOut)}</Td>
                <Td right color={rP>=0?'#10b981':'#ef4444'}>{fmtBRL(rP)}</Td>
                <Td right color={r.realIn>0?'#10b981':'#475569'}>{r.realIn>0?fmtBRL(r.realIn):'—'}</Td>
                <Td right color={r.realOut>0?'#ef4444':'#475569'}>{r.realOut>0?fmtBRL(r.realOut):'—'}</Td>
                <Td right color={rR!==0?(rR>=0?'#10b981':'#ef4444'):'#475569'}>{r.realIn>0||r.realOut>0?fmtBRL(rR):'—'}</Td>
                <Td right color={(r.isPast||r.isCurrent)?r.accR>=0?'#f1f5f9':'#ef4444':r.accP>=0?'#64748b':'#ef4444'}>{fmtBRL((r.isPast||r.isCurrent)?r.accR:r.accP)}</Td>
              </tr>
            )
          })}</tbody>
        </table>
      </div>
    </div>
  )
}

// ─── SIMULADOR ────────────────────────────────────────────────────────────────
function SimulatorPage({state,monthKey:mk}){
  const [type,setType]=useState('expense')
  const [form,setForm]=useState({name:'',value:'',installments:'1',months:'3'})
  const [result,setResult]=useState(null)
  const month=state.months[mk]||{}
  const baseIn=(month.entries||[]).reduce((s,e)=>s+(e.expectedValue||0),0)
  const baseOut=(month.exits||[]).reduce((s,e)=>s+(e.expectedValue||0),0)
  function simulate(){
    const v=parseFloat(form.value)||0;const inst=parseInt(form.installments)||1;const mo=parseInt(form.months)||3
    const months=Array.from({length:Math.max(inst,mo)},(_,i)=>{
      const mIn=type==='client'?baseIn+v:baseIn
      let mOut=baseOut;if(type==='expense')mOut+=i<inst?v/inst:0;if(type==='hire')mOut+=v
      return{month:i+1,in:mIn,out:mOut,result:mIn-mOut}
    })
    setResult({months,name:form.name})
  }
  const chartData=(result?.months||[]).map(m=>({name:`M+${m.month}`,'Com simulação':m.result,'Sem simulação':baseIn-baseOut}))
  return(
    <div className="space-y-5">
      <div className="rounded-2xl p-5" style={{background:'#1e293b',border:'1px solid #2d3f55'}}>
        <h3 className="text-sm font-semibold text-slate-300 mb-1 flex items-center gap-2"><Zap size={14} style={{color:'#10b981'}}/> Simulador</h3>
        <p className="text-xs text-slate-500 mb-4">Não altera os dados reais.</p>
        <div className="flex gap-2 mb-5 flex-wrap">
          {[['expense','💳 Compra'],['client','🤝 Novo Cliente'],['hire','👤 Contratação']].map(([k,l])=>(
            <button key={k} onClick={()=>{setType(k);setResult(null)}} className="px-3 py-2 rounded-lg text-xs font-medium transition-all"
              style={{background:type===k?'#10b981':'#33415540',color:type===k?'#fff':'#94a3b8',border:`1px solid ${type===k?'#10b981':'#334155'}`}}>{l}</button>
          ))}
        </div>
        <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-4">
          <Field label="Descrição"><Inp value={form.name} onChange={v=>setForm(f=>({...f,name:v}))} placeholder="Nome"/></Field>
          <Field label="Valor (R$)"><Inp type="number" value={form.value} onChange={v=>setForm(f=>({...f,value:v}))} placeholder="0,00"/></Field>
          {type==='expense'&&<Field label="Parcelas"><Inp type="number" value={form.installments} onChange={v=>setForm(f=>({...f,installments:v}))} placeholder="1"/></Field>}
          <Field label="Meses"><Inp type="number" value={form.months} onChange={v=>setForm(f=>({...f,months:v}))} placeholder="3"/></Field>
        </div>
        <Btn onClick={simulate}><Zap size={14}/> Simular</Btn>
      </div>
      {result&&(
        <div className="space-y-4">
          <div className="rounded-2xl p-5" style={{background:'#1e293b',border:'1px solid #2d3f55'}}>
            <h3 className="text-sm font-semibold text-slate-300 mb-3">{result.name||'Simulação'}</h3>
            <ResponsiveContainer width="100%" height={180}>
              <BarChart data={chartData} barSize={18}>
                <CartesianGrid strokeDasharray="3 3" stroke="#2d3f55"/>
                <XAxis dataKey="name" tick={{fill:'#64748b',fontSize:11}} axisLine={false} tickLine={false}/>
                <YAxis tick={{fill:'#64748b',fontSize:10}} axisLine={false} tickLine={false} tickFormatter={v=>`${(v/1000).toFixed(0)}k`}/>
                <Tooltip content={<CTip/>}/><Legend wrapperStyle={{fontSize:11,color:'#94a3b8'}}/>
                <Bar dataKey="Sem simulação" fill="#475569" radius={[3,3,0,0]}/>
                <Bar dataKey="Com simulação" fill="#10b981" radius={[3,3,0,0]}/>
              </BarChart>
            </ResponsiveContainer>
          </div>
          <div className="rounded-2xl overflow-hidden" style={{border:'1px solid #2d3f55'}}>
            <table className="w-full"><thead style={{background:'#0f172a'}}><tr><Th>Mês</Th><Th right>Entradas</Th><Th right>Saídas</Th><Th right>Resultado</Th><Th right>Impacto</Th></tr></thead>
              <tbody>{result.months.map((m,i)=>{
                const impact=m.result-(baseIn-baseOut)
                return<tr key={i} className="border-t" style={{borderColor:'#334155',background:i%2===0?'#1e293b':'#1a2540'}}>
                  <Td>Mês +{m.month}</Td><Td right color="#10b981">{fmtBRL(m.in)}</Td><Td right color="#ef4444">{fmtBRL(m.out)}</Td>
                  <Td right color={m.result>=0?'#10b981':'#ef4444'}>{fmtBRL(m.result)}</Td>
                  <Td right color={impact>=0?'#10b981':'#ef4444'}>{impact!==0?(impact>0?'+':'')+fmtBRL(impact):'—'}</Td>
                </tr>
              })}</tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  )
}

  function save(){
    const item={...form}
    for(const k of Object.keys(item))if(['value','baseSalary','limit','dueDay','day','closeDay'].includes(k))item[k]=parseFloat(item[k])||0
    if(modal==='add')dispatch({type:'ADD_SETTING',payload:{key:tab,item}})
    else dispatch({type:'UPDATE_SETTING',payload:{key:tab,item}})
    toast('Salvo');setModal(null)
  }
  function del(id){dispatch({type:'DELETE_SETTING',payload:{key:tab,id}});toast('Removido','warn')}

    const{year:y,month:m}=parseMonthKey(mk);const prev=new Date(y,m-2,1)

          <input type="file" accept=".json" className="hidden" onChange={e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{dispatch({type:'IMPORT',payload:{data:JSON.parse(ev.target.result)}});toast('Importado')}catch{toast('Arquivo inválido','error')}};r.readAsText(f)}}/>

      <div className="flex gap-0 border-b border-slate-700">

        <h3 className="text-sm font-semibold text-slate-300">{tabs.find(t=>t.id===tab)?.label}</h3>
        <Btn onClick={()=>{setForm({});setModal('add')}} small><Plus size={12}/> Adicionar</Btn>
      </div>
      <div className="rounded-2xl overflow-hidden" style={{border:'1px solid #2d3f55'}}>
        <table className="w-full"><tbody>
          {items.map((item,i)=>(
            <tr key={item.id} className="border-b" style={{borderColor:'#334155',background:i%2===0?'#1e293b':'#1a2540'}}>
              {rowRender(item)}
              <Td><div className="flex gap-1.5">
                <button onClick={()=>{setForm({...item});setModal(item)}} className="p-1 rounded text-slate-400 hover:text-slate-200"><Pencil size={13}/></button>
                <button onClick={()=>del(item.id)} className="p-1 rounded text-slate-400 hover:text-red-400"><Trash2 size={13}/></button>
              </div></Td>
            </tr>
          ))}
          {items.length===0&&<tr><td colSpan={5} className="px-3 py-8 text-center text-sm text-slate-500">Nenhum registro</td></tr>}
        </tbody></table>
      </div>

      </Modal>}
    </div>
  )
}

// ─── CLIENTES ─────────────────────────────────────────────────────────────────
function ClientsPage({state,dispatch,toast}){
  const clients=state.settings?.clients||[]
  const [modal,setModal]=useState(null)
  const [form,setForm]=useState({})
  const todayD=new Date()

  function getDaysLeft(endDate){
    if(!endDate)return null
    return Math.floor((new Date(endDate+'T12:00:00')-todayD)/86400000)
  }
  function getCS(c){
    if(!c.startDate||!c.endDate)return'no_contract'
    const d=getDaysLeft(c.endDate)
    if(d<0)return'expired';if(d<=30)return'expiring';return'active'
  }
  function computeEnd(startDate,duration){
    if(!startDate||!duration)return''
    const d=new Date(startDate+'T12:00:00')
    d.setMonth(d.getMonth()+parseInt(duration));d.setDate(d.getDate()-1)
    return d.toISOString().slice(0,10)
  }
  function countReceived(c){
    if(!c.startDate||!c.duration)return{r:0,t:0}
    const dur=parseInt(c.duration)||0,start=new Date(c.startDate+'T12:00:00')
    let r=0
    for(let i=0;i<dur;i++){
      const d=new Date(start.getFullYear(),start.getMonth()+i,1)
      const mk=monthKey(d.getFullYear(),d.getMonth()+1)
      const m=state.months[mk]
      if(m&&(m.entries||[]).find(e=>(e.clientId===c.id||e.client===c.name)&&e.status==='Recebido'))r++
    }
    return{r,t:dur}
  }
  function openAdd(){setForm({name:'',value:'',dueDay:'',startDate:'',duration:'12',endDate:'',contractNote:'',phone:'',email:'',permuteValue:''});setModal('add')}
  function openEdit(c){setForm({...c});setModal(c)}
  function save(){
    if(!form.name||!form.value)return toast('Preencha nome e valor','error')
    const item={...form,value:parseFloat(form.value)||0,dueDay:parseInt(form.dueDay)||1,duration:parseInt(form.duration)||12,endDate:computeEnd(form.startDate,form.duration),permuteValue:parseFloat(form.permuteValue)||0}
    if(modal==='add')dispatch({type:'ADD_SETTING',payload:{key:'clients',item}})
    else dispatch({type:'UPDATE_SETTING',payload:{key:'clients',item}})
    toast('Salvo');setModal(null)
  }
  function del(id){dispatch({type:'DELETE_SETTING',payload:{key:'clients',id}});toast('Removido','warn')}
  function genEntries(id){dispatch({type:'GENERATE_CONTRACT_ENTRIES',payload:{clientId:id}});toast('Entradas geradas para todos os meses ✓')}

  const scMap={active:{label:'Ativo',c:'#10b981',b:'#10b98120'},expiring:{label:'Vencendo',c:'#f59e0b',b:'#f59e0b20'},expired:{label:'Vencido',c:'#ef4444',b:'#ef444420'},no_contract:{label:'Sem contrato',c:'#64748b',b:'#64748b20'}}
  const inputSt={background:'#0f172a',border:'1px solid #2d3f55',borderRadius:8,padding:'8px 12px',color:'#f1f5f9',fontSize:14,width:'100%',outline:'none'}
  const Inp2=({value,onChange,type='text',placeholder})=><input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={inputSt}/>
  const Sel2=({value,onChange,opts})=><select value={value} onChange={e=>onChange(e.target.value)} style={inputSt}>{opts.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}</select>
  const Fld=({label,children})=><div><label className="block text-xs text-slate-400 mb-1">{label}</label>{children}</div>

  return(
    <div className="space-y-5">
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
        <SummaryCard label="Total de Clientes" value={clients.length} color="#3b82f6" icon={Briefcase}/>
        <SummaryCard label="Receita Mensal" value={fmtBRL(clients.reduce((s,c)=>s+(c.value||0),0))} color="#10b981" icon={TrendingUp}/>
        <SummaryCard label="Contratos Ativos" value={clients.filter(c=>getCS(c)==='active').length} color="#10b981" icon={CheckCircle}/>
        <SummaryCard label="Vencendo (30d)" value={clients.filter(c=>['expiring','expired'].includes(getCS(c))).length} color="#f59e0b" icon={AlertCircle}/>
      </div>
      <div className="flex justify-end">
        <button onClick={openAdd} className="flex items-center gap-1.5 px-4 py-2 text-sm font-medium rounded-lg" style={{background:'#10b981',color:'#fff'}}>
          <Plus size={14}/> Novo Cliente
        </button>
      </div>
      <div className="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-4">
        {clients.map(c=>{
          const cs=getCS(c),sc=scMap[cs],dl=getDaysLeft(c.endDate),{r,t}=countReceived(c)
          return(
            <div key={c.id} className="rounded-2xl p-5 space-y-3" style={{background:'#1e293b',border:`1px solid ${(cs==='expiring'||cs==='expired')?sc.c+'40':'#334155'}`}}>
              <div className="flex items-start justify-between">
                <div>
                  <div className="font-semibold text-slate-100">{c.name}</div>
                  <div className="text-xl font-bold mt-0.5" style={{color:'#10b981'}}>{fmtBRL(c.value)}<span className="text-xs text-slate-500 font-normal">/mês</span></div>
                  {c.permuteValue>0&&<div className="text-xs mt-0.5" style={{color:'#a78bfa'}}>+ {fmtBRL(c.permuteValue)} permuta/mês</div>}
                </div>
                <span className="text-xs font-semibold px-2 py-0.5 rounded-full" style={{background:sc.b,color:sc.c}}>{sc.label}</span>
              </div>
              {c.startDate&&(
                <div className="space-y-1 text-xs text-slate-400">
                  <div className="flex items-center gap-2"><CalendarCheck size={12}/><span>Início: {c.startDate.split('-').reverse().join('/')} · {c.duration} meses</span></div>
                  {c.endDate&&<div className="flex items-center gap-2" style={{color:dl!==null&&dl<=30?sc.c:'#94a3b8'}}><Clock size={12}/><span>Venc: {c.endDate.split('-').reverse().join('/')}{dl!==null&&(dl>=0?` (${dl}d)`:` (venceu há ${Math.abs(dl)}d)`)}</span></div>}
                  {t>0&&<div>
                    <div className="flex justify-between text-xs text-slate-500 mb-1"><span>Meses recebidos</span><span>{r}/{t}</span></div>
                    <div className="h-1.5 rounded-full overflow-hidden" style={{background:'#334155'}}><div className="h-full rounded-full" style={{width:`${(r/t)*100}%`,background:'#10b981'}}/></div>
                  </div>}
                </div>
              )}
              {(c.phone||c.email)&&<div className="space-y-1 text-xs text-slate-500">
                {c.phone&&<div className="flex items-center gap-1.5"><Phone size={11}/>{c.phone}</div>}
                {c.email&&<div className="flex items-center gap-1.5"><Mail size={11}/>{c.email}</div>}
              </div>}
              {c.contractNote&&<div className="text-xs text-slate-500 flex items-start gap-1.5"><FileText size={11} className="mt-0.5 shrink-0"/>{c.contractNote}</div>}
              <div className="flex items-center gap-2 pt-1">
                <button onClick={()=>openEdit(c)} className="flex items-center gap-1 text-xs px-2.5 py-1 rounded-lg" style={{background:'#334155',color:'#94a3b8'}}><Pencil size={11}/> Editar</button>
                {c.startDate&&c.duration&&<button onClick={()=>genEntries(c.id)} className="flex items-center gap-1 text-xs px-2.5 py-1 rounded-lg" style={{background:'#10b98120',color:'#10b981',border:'1px solid #10b98130'}}><CalendarCheck size={11}/> Gerar meses</button>}
                <button onClick={()=>del(c.id)} className="ml-auto text-xs px-2 py-1 rounded-lg" style={{background:'#ef444420',color:'#ef4444'}}><Trash2 size={11}/></button>
              </div>
            </div>
          )
        })}
      </div>
      {modal&&(
        <Modal title={modal==='add'?'Novo Cliente':`Editar — ${form.name}`} onClose={()=>setModal(null)} wide>
          <div className="space-y-4">
            <div className="grid grid-cols-2 gap-3">
              <Fld label="Nome do cliente"><Inp2 value={form.name||''} onChange={v=>setForm(f=>({...f,name:v}))} placeholder="Ex: Empresa ABC"/></Fld>
              <Fld label="Valor mensal (R$)"><Inp2 type="number" value={form.value||''} onChange={v=>setForm(f=>({...f,value:v}))} placeholder="0,00"/></Fld>
            </div>
            <div className="grid grid-cols-2 gap-3">
              <Fld label="Dia de pagamento"><Inp2 type="number" value={form.dueDay||''} onChange={v=>setForm(f=>({...f,dueDay:v}))} placeholder="10"/></Fld>
              <Fld label="Telefone"><Inp2 value={form.phone||''} onChange={v=>setForm(f=>({...f,phone:v}))} placeholder="(11) 99999-9999"/></Fld>
            </div>
            <Fld label="E-mail"><Inp2 value={form.email||''} onChange={v=>setForm(f=>({...f,email:v}))} placeholder="contato@empresa.com"/></Fld>
            <div className="border-t border-slate-700 pt-3">
              <p className="text-xs mb-3 font-semibold uppercase tracking-wider" style={{color:'#a78bfa'}}>Permuta</p>
              <Fld label="Valor em permuta por mês (R$) — deixe 0 se não houver permuta">
                <Inp2 type="number" value={form.permuteValue||''} onChange={v=>setForm(f=>({...f,permuteValue:v}))} placeholder="0,00"/>
              </Fld>
              <p className="text-xs text-slate-500 mt-1">Ex: cliente paga R$500 + R$300 em permuta → coloque 300 aqui e 500 em "Valor mensal"</p>
            </div>
            <div className="border-t border-slate-700 pt-3">
              <p className="text-xs text-slate-400 mb-3 font-semibold uppercase tracking-wider">Contrato</p>
              <div className="grid grid-cols-2 gap-3">
                <Fld label="Data de início"><Inp2 type="date" value={form.startDate||''} onChange={v=>{const e=computeEnd(v,form.duration);setForm(f=>({...f,startDate:v,endDate:e}))}}/></Fld>
                <Fld label="Duração"><Sel2 value={String(form.duration||'12')} onChange={v=>{const e=computeEnd(form.startDate,v);setForm(f=>({...f,duration:v,endDate:e}))}} opts={[{v:'3',l:'3 meses'},{v:'6',l:'6 meses'},{v:'12',l:'12 meses'},{v:'24',l:'24 meses'}]}/></Fld>
              </div>
              {form.endDate&&<p className="text-xs text-slate-500 mt-1">Término: {form.endDate.split('-').reverse().join('/')}</p>}
            </div>
            <Fld label="Observações (link Drive, notas...)"><Inp2 value={form.contractNote||''} onChange={v=>setForm(f=>({...f,contractNote:v}))} placeholder="Ex: https://drive.google.com/..."/></Fld>
            <div className="flex justify-end gap-2 pt-2">
              <button onClick={()=>setModal(null)} className="px-4 py-2 text-sm rounded-lg" style={{background:'#33415540',color:'#94a3b8'}}>Cancelar</button>
              <button onClick={save} className="flex items-center gap-1.5 px-4 py-2 text-sm font-medium rounded-lg" style={{background:'#10b981',color:'#fff'}}><Save size={14}/> Salvar</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  )
}

// ─── PERMUTA ──────────────────────────────────────────────────────────────────
function PermutaPage({state,dispatch,toast}){
  const clients=(state.settings?.clients||[]).filter(c=>c.permuteValue>0)
  const usages=state.settings?.permuteUsages||[]
  const [modal,setModal]=useState(null) // null | {clientId, type:'use'|'sale'}
  const [form,setForm]=useState({})
  const todayStr=new Date().toISOString().slice(0,10)
  const curMk=monthKey(new Date().getFullYear(),new Date().getMonth()+1)

  function getBalance(c){
    const earned=Object.entries(state.months||{}).reduce((sum,[mk2,month])=>{
      if(mk2<'2026-03')return sum
      const e=(month.entries||[]).find(en=>(en.clientId===c.id||en.client===c.name)&&en.status==='Recebido')
      return sum+(e?(c.permuteValue||0):0)
    },0)
    const used=usages.filter(u=>u.clientId===c.id).reduce((s,u)=>s+u.value,0)
    return{earned,used,balance:earned-used}
  }

  function openModal(clientId,type){
    setForm({clientId,clientName:(state.settings.clients.find(c=>c.id===clientId)||{}).name||'',person:'',description:'',value:'',date:todayStr,monthKey:curMk,type})
    setModal({clientId,type})
  }

  function save(){
    if(!form.value||!form.description)return toast('Preencha descrição e valor','error')
    const usage={clientId:form.clientId,clientName:form.clientName,person:form.person,description:form.description,value:parseFloat(form.value)||0,date:form.date,monthKey:form.monthKey,type:form.type}
    if(form.type==='sale'){
      const entry={client:`Venda Permuta — ${form.clientName}`,dueDay:new Date(form.date).getDate(),expectedValue:parseFloat(form.value)||0,note:`Permuta vendida para: ${form.person||'—'}`}
      dispatch({type:'SELL_PERMUTE',payload:{usage,entry,entryMonthKey:form.monthKey}})
      toast('Permuta vendida! Entrada criada no mês ✓')
    }else{
      dispatch({type:'ADD_PERMUTE_USAGE',payload:{usage}})
      toast('Uso registrado ✓')
    }
    setModal(null)
  }

  const inputSt={background:'#0f172a',border:'1px solid #2d3f55',borderRadius:8,padding:'8px 12px',color:'#f1f5f9',fontSize:14,width:'100%',outline:'none'}
  const Inp2=({value,onChange,type='text',placeholder})=><input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={inputSt}/>
  const Fld=({label,children})=><div><label className="block text-xs text-slate-400 mb-1">{label}</label>{children}</div>

  const totalPermuta=clients.reduce((s,c)=>s+(c.permuteValue||0),0)
  const totalUsed=usages.reduce((s,u)=>s+u.value,0)
  const totalSales=usages.filter(u=>u.type==='sale').reduce((s,u)=>s+u.value,0)

  // Gerar opções de meses disponíveis (últimos 6 + próximos 6)
  const monthOpts=Array.from({length:12},(_,i)=>{
    const d=new Date();d.setMonth(d.getMonth()-6+i)
    const mk2=monthKey(d.getFullYear(),d.getMonth()+1)
    return{v:mk2,l:`${MONTH_NAMES[d.getMonth()]}/${d.getFullYear()}`}
  })

  return(
    <div className="space-y-6">
      {/* KPIs */}
      <div className="grid grid-cols-2 lg:grid-cols-3 gap-4">
        <SummaryCard label="Permuta/mês em carteira" value={fmtBRL(totalPermuta)} color="#a78bfa" icon={ArrowLeftRight}/>
        <SummaryCard label="Total consumido" value={fmtBRL(totalUsed)} color="#f59e0b" icon={ShoppingBag}/>
        <SummaryCard label="Vendas em dinheiro" value={fmtBRL(totalSales)} color="#10b981" icon={DollarSign}/>
      </div>

      {/* Cards por cliente */}
      {clients.length===0?(
        <div className="rounded-2xl p-8 text-center text-slate-500" style={{background:'#1e293b',border:'1px solid #2d3f55'}}>
          <ArrowLeftRight size={32} className="mx-auto mb-3 opacity-30"/>
          <p className="text-sm">Nenhum cliente com permuta cadastrado.</p>
          <p className="text-xs mt-1">Edite um cliente e adicione um valor em "Permuta por mês".</p>
        </div>
      ):(
        <div className="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-4">
          {clients.map(c=>{
            const{earned,used,balance}=getBalance(c)
            const pct=earned>0?Math.min((used/earned)*100,100):0
            const neg=balance<0
            return(
              <div key={c.id} className="rounded-2xl p-5 space-y-3" style={{background:'#1e293b',border:`1px solid ${neg?'#ef444440':'#334155'}`}}>
                <div className="flex items-start justify-between">
                  <div>
                    <div className="font-semibold text-slate-100">{c.name}</div>
                    <div className="text-sm mt-0.5" style={{color:'#a78bfa'}}>{fmtBRL(c.permuteValue)}/mês em permuta</div>
                  </div>
                  <span className="text-xs font-bold px-2 py-0.5 rounded-full" style={{background:neg?'#ef444420':balance===0?'#f59e0b20':'#10b98120',color:neg?'#ef4444':balance===0?'#f59e0b':'#10b981'}}>
                    {neg?'Negativo':balance===0?'Zerado':'Disponível'}
                  </span>
                </div>
                <div className="space-y-1 text-xs">
                  <div className="flex justify-between text-slate-400"><span>Ganho ({Math.round(earned/Math.max(c.permuteValue,1))} meses)</span><span>{fmtBRL(earned)}</span></div>
                  <div className="flex justify-between text-slate-400"><span>Consumido</span><span style={{color:'#f59e0b'}}>{fmtBRL(used)}</span></div>
                  <div className="flex justify-between font-semibold"><span className="text-slate-300">Saldo</span><span style={{color:neg?'#ef4444':'#10b981'}}>{fmtBRL(balance)}</span></div>
                  <div className="h-1.5 rounded-full overflow-hidden mt-2" style={{background:'#334155'}}>
                    <div className="h-full rounded-full transition-all" style={{width:`${pct}%`,background:neg?'#ef4444':'#a78bfa'}}/>
                  </div>
                </div>
                <div className="flex gap-2 pt-1">
                  <button onClick={()=>openModal(c.id,'use')} className="flex items-center gap-1 text-xs px-2.5 py-1 rounded-lg flex-1 justify-center" style={{background:'#334155',color:'#94a3b8'}}>
                    <ShoppingBag size={11}/> Registrar uso
                  </button>
                  <button onClick={()=>openModal(c.id,'sale')} className="flex items-center gap-1 text-xs px-2.5 py-1 rounded-lg flex-1 justify-center" style={{background:'#10b98120',color:'#10b981',border:'1px solid #10b98130'}}>
                    <DollarSign size={11}/> Vender
                  </button>
                </div>
              </div>
            )
          })}
        </div>
      )}

      {/* Histórico */}
      {usages.length>0&&(
        <div className="rounded-2xl p-5" style={{background:'#1e293b',border:'1px solid #2d3f55'}}>
          <h3 className="text-sm font-semibold text-slate-300 mb-4">Histórico de usos</h3>
          <div className="overflow-x-auto">
            <table className="w-full text-xs">
              <thead><tr className="border-b border-slate-700">
                <th className="text-left py-2 pr-3 text-slate-500 font-medium">Data</th>
                <th className="text-left py-2 pr-3 text-slate-500 font-medium">Cliente</th>
                <th className="text-left py-2 pr-3 text-slate-500 font-medium">Pessoa</th>
                <th className="text-left py-2 pr-3 text-slate-500 font-medium">Descrição</th>
                <th className="text-right py-2 pr-3 text-slate-500 font-medium">Valor</th>
                <th className="text-center py-2 text-slate-500 font-medium">Tipo</th>
                <th className="text-center py-2 text-slate-500 font-medium"></th>
              </tr></thead>
              <tbody>{[...usages].sort((a,b)=>b.date.localeCompare(a.date)).map(u=>(
                <tr key={u.id} className="border-b border-slate-700/40 hover:bg-slate-700/20">
                  <td className="py-2 pr-3 text-slate-400">{u.date.split('-').reverse().join('/')}</td>
                  <td className="py-2 pr-3 text-slate-300">{u.clientName}</td>
                  <td className="py-2 pr-3 text-slate-400">{u.person||'—'}</td>
                  <td className="py-2 pr-3 text-slate-300">{u.description}</td>
                  <td className="py-2 pr-3 text-right font-medium" style={{color:u.type==='sale'?'#10b981':'#f59e0b'}}>{fmtBRL(u.value)}</td>
                  <td className="py-2 text-center">
                    <span className="px-2 py-0.5 rounded-full text-xs" style={{background:u.type==='sale'?'#10b98120':'#a78bfa20',color:u.type==='sale'?'#10b981':'#a78bfa'}}>
                      {u.type==='sale'?'Venda':'Uso'}
                    </span>
                  </td>
                  <td className="py-2 text-center">
                    <button onClick={()=>{dispatch({type:'DELETE_PERMUTE_USAGE',payload:{id:u.id}});toast('Removido','warn')}} style={{color:'#ef4444',background:'none',border:'none',cursor:'pointer',padding:4}}>
                      <Trash2 size={12}/>
                    </button>
                  </td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        </div>
      )}

      {/* Modal */}
      {modal&&(
        <Modal title={form.type==='sale'?`💰 Vender Permuta — ${form.clientName}`:`🛍 Registrar Uso — ${form.clientName}`} onClose={()=>setModal(null)}>
          <div className="space-y-4">
            <Fld label="Quem usou / quem comprou"><Inp2 value={form.person||''} onChange={v=>setForm(f=>({...f,person:v}))} placeholder="Ex: Mainara, Thays, João..."/></Fld>

            <div className="grid grid-cols-2 gap-3">

              <Fld label="Data"><Inp2 type="date" value={form.date||''} onChange={v=>setForm(f=>({...f,date:v}))}/></Fld>
