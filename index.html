function migrateSchema(data){
  if(!data||typeof data!=='object')return data
  const v=data.schemaVersion||0
  // v0→v1: garante todos os campos de settings existam
  if(v<1){
    if(!data.settings)data.settings={}
    if(!data.settings.clients)data.settings.clients=[]
    if(!data.settings.cards)data.settings.cards=[]
    if(!data.settings.collaborators)data.settings.collaborators=[]
    if(!data.settings.fixedExpenses)data.settings.fixedExpenses=[]
    if(!data.settings.permuteUsages)data.settings.permuteUsages=[]
    if(!data.settings.goals)data.settings.goals=[]
    if(!data.tasks)data.tasks=[]
    if(!data.activityLog)data.activityLog=[]
    // Garante que cada mês tem todos os campos
    Object.keys(data.months||{}).forEach(mk=>{
      const m=data.months[mk];const def=emptyMonth()
      Object.keys(def).forEach(k=>{if(m[k]===undefined)m[k]=def[k]})
    })
  }
  // Futuras migrações: if(v<2){...}
  data.schemaVersion=SCHEMA_VERSION
  return data
}

// ─── REDUCER HELPERS ─────────────────────────────────────────────────────────
function handlePayCardBill(state,payload){
  const{monthKey:mk2,cardId,amount,date,notes,createExit}=payload
  const card=(state.settings?.cards||[]).find(c=>c.id===cardId)
  const baseMonth=state.months[mk2]||emptyMonth()
  const updatedMonth={...baseMonth,cardPayments:{...(baseMonth.cardPayments||{}),[cardId]:{paid:true,amount,date,notes,paidAt:new Date().toISOString()}}}
  if(createExit){
    const exit={id:uid(),description:`Fatura ${card?.name||'Cartão'}`,category:'Cartão',value:amount,realValue:amount,date,status:'Pago',note:notes||''}
    updatedMonth.exits=[...(updatedMonth.exits||[]),exit]
  }
  return{...state,months:{...state.months,[mk2]:updatedMonth}}
}
function handleGenerateContractEntries(state,payload){
  const client=state.settings.clients.find(c=>c.id===payload.clientId)
  if(!client)return state
  let next={...state,months:{...state.months}}
  const dur=parseInt(payload.numMonths)||parseInt(client.duration)||12
  const fromStr=payload.fromDate||(client.startDate||new Date().toISOString().slice(0,10))
  const start=new Date(fromStr+'T12:00:00')
  for(let i=0;i<dur;i++){
    const d=new Date(start.getFullYear(),start.getMonth()+i,1)
    const mk=monthKey(d.getFullYear(),d.getMonth()+1)
    const month=next.months[mk]||emptyMonth()
    const exists=(month.entries||[]).find(e=>e.clientId===payload.clientId||e.client===client.name)
    if(!exists){
      const curMk3=monthKey(new Date().getFullYear(),new Date().getMonth()+1)
      const isPast=mk<curMk3
      const entry={id:uid(),client:client.name,clientId:payload.clientId,dueDay:client.dueDay,expectedValue:client.value,status:isPast?'Recebido':'Previsto',realValue:isPast?client.value:0,note:'Gerado pelo contrato'}
      next.months[mk]={...month,entries:[...(month.entries||[]),entry]}
    }
  }
  return next
}
function handleSellPermute(state,payload){
  const{usage,entry,entryMonthKey}=payload
  const nextUsages=[...(state.settings.permuteUsages||[]),{...usage,id:uid(),type:'sale'}]
  const month=state.months[entryMonthKey]||emptyMonth()
  const newEntry={...entry,id:uid(),status:'Previsto',realValue:0}
  return{...state,settings:{...state.settings,permuteUsages:nextUsages},months:{...state.months,[entryMonthKey]:{...month,entries:[...(month.entries||[]),newEntry]}}}
}

// ─── REDUCER ──────────────────────────────────────────────────────────────────
function reducer(state,action){
  const{type,payload}=action
  const updMonth=(key,fn)=>({...state,months:{...state.months,[key]:fn(state.months[key]||emptyMonth())}})
  switch(type){
    case'ADD_ENTRY':return updMonth(payload.monthKey,m=>({...m,entries:[...(m.entries||[]),{...payload.entry,id:uid()}]}))
    case'UPDATE_ENTRY':return updMonth(payload.monthKey,m=>({...m,entries:m.entries.map(e=>e.id===payload.entry.id?payload.entry:e)}))
    case'DELETE_ENTRY':return updMonth(payload.monthKey,m=>({...m,entries:m.entries.filter(e=>e.id!==payload.id)}))
    case'ADD_EXIT':return updMonth(payload.monthKey,m=>({...m,exits:[...(m.exits||[]),{...payload.exit,id:uid()}]}))
    case'UPDATE_EXIT':return updMonth(payload.monthKey,m=>({...m,exits:m.exits.map(e=>e.id===payload.exit.id?payload.exit:e)}))
    case'DELETE_EXIT':return updMonth(payload.monthKey,m=>({...m,exits:m.exits.filter(e=>e.id!==payload.id)}))
    case'SET_CASH_BALANCE':return updMonth(payload.monthKey,m=>({...m,cashBalance:payload.value}))
    case'UPDATE_DAILY_NOTE':return updMonth(payload.monthKey,m=>({...m,dailyNotes:{...m.dailyNotes,[payload.day]:payload.note}}))
    case'UPDATE_DAILY_CASH':return updMonth(payload.monthKey,m=>({...m,dailyCash:{...m.dailyCash,[payload.day]:payload.value}}))
    case'ADD_CARD_EXPENSE':return updMonth(payload.monthKey,m=>({...m,cardExpenses:{...m.cardExpenses,[payload.cardId]:[...(m.cardExpenses?.[payload.cardId]||[]),{...payload.expense,id:uid()}]}}))
    case'DELETE_CARD_EXPENSE':return updMonth(payload.monthKey,m=>({...m,cardExpenses:{...m.cardExpenses,[payload.cardId]:(m.cardExpenses?.[payload.cardId]||[]).filter(e=>e.id!==payload.id)}}))
    case'PAY_CARD_BILL':return handlePayCardBill(state,payload)
    case'ADD_COLLAB_EXTRA':return updMonth(payload.monthKey,m=>({...m,collaboratorExtras:{...m.collaboratorExtras,[payload.collabId]:[...(m.collaboratorExtras?.[payload.collabId]||[]),{...payload.extra,id:uid()}]}}))
    case'DELETE_COLLAB_EXTRA':return updMonth(payload.monthKey,m=>({...m,collaboratorExtras:{...m.collaboratorExtras,[payload.collabId]:(m.collaboratorExtras?.[payload.collabId]||[]).filter(e=>e.id!==payload.id)}}))
    case'CLOSE_MONTH':return updMonth(payload.monthKey,m=>({...m,closed:true,snapshot:{...m,closed:true}}))
    case'COPY_FROM_PREV':{
      const prev=state.months[payload.prevKey]
      if(!prev)return state
      return updMonth(payload.monthKey,m=>({...m,entries:prev.entries.map(e=>({...e,id:uid(),status:'Previsto',realValue:0,note:''})),exits:prev.exits.map(e=>({...e,id:uid(),status:'Pendente',realValue:0,note:''}))}))
    }
    case'GENERATE_CONTRACT_ENTRIES':return handleGenerateContractEntries(state,payload)
    case'ADD_TASK':return{...state,tasks:[...(state.tasks||[]),{...payload.task,id:uid(),createdAt:new Date().toISOString()}]}
    case'UPDATE_TASK':return{...state,tasks:(state.tasks||[]).map(t=>t.id===payload.task.id?{...payload.task,updatedAt:new Date().toISOString()}:t)}
    case'DELETE_TASK':return{...state,tasks:(state.tasks||[]).filter(t=>t.id!==payload.id)}
    case'ADD_GOAL':return{...state,settings:{...state.settings,goals:[...(state.settings.goals||[]),{...payload.goal,id:uid(),createdAt:new Date().toISOString()}]}}
    case'UPDATE_GOAL':return{...state,settings:{...state.settings,goals:(state.settings.goals||[]).map(g=>g.id===payload.goal.id?{...payload.goal,updatedAt:new Date().toISOString()}:g)}}
    case'DELETE_GOAL':return{...state,settings:{...state.settings,goals:(state.settings.goals||[]).filter(g=>g.id!==payload.id)}}
    case'ADD_PERMUTE_USAGE':return{...state,settings:{...state.settings,permuteUsages:[...(state.settings.permuteUsages||[]),{...payload.usage,id:uid()}]}}
    case'DELETE_PERMUTE_USAGE':return{...state,settings:{...state.settings,permuteUsages:(state.settings.permuteUsages||[]).filter(u=>u.id!==payload.id)}}
    case'SELL_PERMUTE':return handleSellPermute(state,payload)
    case'ADD_SETTING':return{...state,settings:{...state.settings,[payload.key]:[...(state.settings[payload.key]||[]),{...payload.item,id:uid()}]}}
    case'UPDATE_SETTING':return{...state,settings:{...state.settings,[payload.key]:state.settings[payload.key].map(i=>i.id===payload.item.id?payload.item:i)}}
    case'DELETE_SETTING':return{...state,settings:{...state.settings,[payload.key]:state.settings[payload.key].filter(i=>i.id!==payload.id)}}
    case'IMPORT':{const d=payload.data;const err=validateImportData(d);if(err){logError('IMPORT',err);return state}if(!d.activityLog)d.activityLog=[];d.lastModified=Date.now();return migrateSchema(d)}
    case'LOG_ACTIVITY':return{...state,activityLog:[payload,...(state.activityLog||[])].slice(0,500)}
    default:return state
  }
}
// Wrapper que adiciona lastModified em toda mutação
const _reducer=reducer
function trackedReducer(state,action){const next=_reducer(state,action);if(next!==state)next.lastModified=Date.now();return next}

function loadState(){
  try{
    const s=localStorage.getItem('paiolfinance_v3')
    const data=s?JSON.parse(s):SEED
    if(data.settings?.clients){
      data.settings.clients=data.settings.clients.map(c=>({startDate:'',duration:12,endDate:'',contractNote:'',phone:'',email:'',permuteValue:0,permuteAccumulates:true,razaoSocial:'',cnpj:'',cep:'',street:'',number:'',complement:'',city:'',state:'',status:'ativo',services:[],contractUrl:'',proposalUrl:'',...c}))
    }
    return migrateSchema(data)
  }catch(e){logError('loadState',e);return migrateSchema(SEED)}
}

// ─── ERROR BOUNDARY ──────────────────────────────────────────────────────────
class ErrorBoundary extends React.Component{
  constructor(props){super(props);this.state={hasError:false,error:null}}
  static getDerivedStateFromError(error){return{hasError:true,error}}
  componentDidCatch(error,info){logError('ErrorBoundary',{error:error.message,stack:info.componentStack})}
  render(){
    if(this.state.hasError)return React.createElement('div',{style:{padding:40,textAlign:'center',color:'#ef4444'}},
      React.createElement('div',{style:{fontSize:32,marginBottom:16}},'⚠'),
      React.createElement('h2',{style:{fontSize:16,fontWeight:600,marginBottom:8,color:'#fff'}},'Algo deu errado'),
      React.createElement('p',{style:{fontSize:13,color:'rgba(235,235,245,0.5)',marginBottom:16}},String(this.state.error?.message||'Erro desconhecido')),
      React.createElement('button',{onClick:()=>this.setState({hasError:false,error:null}),style:{padding:'8px 20px',borderRadius:10,background:'#10b981',color:'#fff',fontSize:13,fontWeight:600,border:'none',cursor:'pointer'}},'Tentar novamente')
    )
    return this.props.children
  }
}

// ─── SKELETON ────────────────────────────────────────────────────────────────
function Skeleton({h=16,w='100%',r=3}){return <div className="skeleton" style={{height:h,width:w,marginBottom:r}}/>}
function PageSkeleton(){return(
  <div className="space-y-4 py-2">
    <div className="grid grid-cols-2 lg:grid-cols-4 gap-3">
      {[1,2,3,4].map(i=><Skeleton key={i} h={100}/>)}
    </div>
    <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
      <Skeleton h={200}/><Skeleton h={200}/>

// ─── UI BASE ──────────────────────────────────────────────────────────────────
function Modal({title,onClose,children,wide}){
  const modalId=useRef('modal-'+uid()).current
  useEffect(()=>{const h=e=>{if(e.key==='Escape')onClose()};document.addEventListener('keydown',h);return()=>document.removeEventListener('keydown',h)},[onClose])
  return(
    <div role="dialog" aria-modal="true" aria-labelledby={modalId} className="fixed inset-0 z-50 flex items-center justify-center p-4 modal-backdrop" onClick={onClose}>
      <div className={`relative rounded-3xl p-6 w-full modal-content ${wide?'max-w-2xl':'max-w-lg'}`} onClick={e=>e.stopPropagation()}>
        <div className="flex items-center justify-between mb-6">
          <h2 id={modalId} className="text-base font-semibold tracking-tight" style={{color:'var(--text)'}}>{title}</h2>
          <button onClick={onClose} aria-label="Fechar" className="w-8 h-8 rounded-full flex items-center justify-center transition-all" style={{background:'var(--bg-overlay)',color:'var(--text-3)'}}><X size={15}/></button>
        </div>
        {children}
      </div>
    </div>
  )
}

function Toast({toasts}){
  return(
    <div className="fixed bottom-5 right-5 z-50 flex flex-col gap-2 pointer-events-none">
      {toasts.map(t=>(
        <div key={t.id} className="flex items-center gap-2.5 px-4 py-3 text-sm font-semibold"
          style={{background:t.type==='error'?'rgba(239,68,68,0.9)':t.type==='warn'?'rgba(245,158,11,0.9)':'rgba(16,185,129,0.9)',backdropFilter:'blur(20px)',WebkitBackdropFilter:'blur(20px)',color:'#fff',minWidth:220,borderRadius:14,border:'1px solid rgba(255,255,255,0.2)',boxShadow:'0 8px 32px rgba(0,0,0,0.4)'}}>
          {t.type==='error'?<AlertCircle size={15}/>:<CheckCircle size={15}/>}{t.msg}
        </div>
      ))}
    </div>
  )
}

function SummaryCard({label,value,sub,color,icon:Icon,onClick}){
  return(
    <div onClick={onClick} className="rounded-2xl p-4 transition-all" style={{background:'var(--bg-card)',backdropFilter:'blur(40px) saturate(180%)',WebkitBackdropFilter:'blur(40px) saturate(180%)',border:'1px solid var(--border)',boxShadow:'0 4px 24px rgba(0,0,0,0.3),inset 0 0.5px 0 var(--inner)',cursor:onClick?'pointer':'default'}}>
      <div className="flex items-start justify-between mb-4">
        <span className="text-xs font-medium uppercase tracking-widest" style={{color:'var(--text-2)'}}>{label}</span>
        {Icon&&<div className="w-9 h-9 rounded-2xl flex items-center justify-center shrink-0" style={{background:`${color}20`,border:`1px solid ${color}35`}}><Icon size={16} style={{color}}/></div>}
      </div>
      <div className="text-lg sm:text-xl font-bold tracking-tight mb-1" style={{color:color||'var(--text)'}}>{value}</div>
      {sub&&<div className="text-xs" style={{color:'var(--text-3)'}}>{sub}</div>}
    </div>
  )
}

function StatusBadge({status}){
  const cfg={
    'Previsto':{bg:'#1e40af20',color:'#60a5fa',border:'#3b82f630'},
    'Cobrado':{bg:'#78350f20',color:'#f59e0b',border:'#f59e0b30'},
    'Recebido':{bg:'#06522020',color:'#10b981',border:'#10b98130'},
    'Pendente':{bg:'#78350f20',color:'#f59e0b',border:'#f59e0b30'},
    'Pago':{bg:'#06522020',color:'#10b981',border:'#10b98130'},
  }[status]||{bg:'var(--bg-overlay)',color:'var(--text-3)',border:'var(--border)'}
  return <span className="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold" style={{background:cfg.bg,color:cfg.color,border:`1px solid ${cfg.border}`}}>{status}</span>
}

function ProgressBar({label,current,total,color}){
  const pct=total>0?Math.min(100,(current/total)*100):0
  return(
    <div>
      <div className="flex justify-between text-xs text-slate-500 mb-1.5"><span>{label}</span><span className="font-medium" style={{color:color||'#10b981'}}>{Math.round(pct)}%</span></div>
      <div className="h-1.5 rounded-full overflow-hidden" style={{background:'var(--bg-overlay)'}}>
        <div className="h-full rounded-full transition-all duration-500" style={{width:`${pct}%`,background:`linear-gradient(90deg,${color||'#10b981'},${color||'#10b981'}aa)`}}/>
      </div>
    </div>
  )
}

function Field({label,children}){return <div><label className="block text-xs font-medium mb-1.5" style={{color:'var(--text-2)',letterSpacing:'0.02em'}}>{label}</label>{children}</div>}
const iCls="w-full px-3.5 py-2.5 rounded-2xl text-sm outline-none transition-all glass-input"
const iSty={background:'var(--bg-input)',border:'1px solid var(--border)',color:'var(--text)'}
function Inp({value,onChange,type='text',placeholder}){return <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} className={iCls} style={iSty}/>}
function Sel({value,onChange,options}){return <select value={value} onChange={e=>onChange(e.target.value)} className={iCls} style={iSty}>{options.map(o=><option key={o.value??o} value={o.value??o}>{o.label??o}</option>)}</select>}
function Btn({onClick,children,small,color='#10b981'}){return <button onClick={onClick} className={`flex items-center gap-1.5 font-semibold transition-all active:scale-95 ${small?'px-3 py-1.5 text-xs':'px-4 py-2 text-sm'}`} style={{background:color,color:'#fff',borderRadius:10,boxShadow:`inset 0 1px 0 rgba(255,255,255,0.2),0 4px 12px ${color}55`}}>{children}</button>}
function BtnG({onClick,children,small}){return <button onClick={onClick} className={`flex items-center gap-1.5 transition-all active:scale-95 ${small?'px-3 py-1.5 text-xs':'px-4 py-2 text-sm'}`} style={{background:'var(--bg-overlay)',color:'var(--text-2)',border:'1px solid var(--border)',borderRadius:10}}>{children}</button>}

function Th({children,right}){return <th className={`px-3 py-3 text-xs font-semibold uppercase tracking-widest ${right?'text-right':'text-left'}`} style={{color:'var(--text-3)'}}>{children}</th>}
function Td({children,right,muted,color}){return <td className={`px-3 py-3.5 text-sm ${right?'text-right':''}`} style={{color:color||(muted?'var(--text-3)':'var(--text-2)'),borderBottom:'1px solid var(--sep)'}}>{children}</td>}

const CTip=({active,payload,label})=>{
  if(!active||!payload?.length)return null
  return <div className="rounded-2xl p-3 text-sm tooltip-chart"><p className="mb-1" style={{color:'var(--text-2)'}}>{label}</p>{payload.map((p,i)=><p key={i} className="font-medium" style={{color:p.color}}>{p.name}: {fmtBRL(p.value)}</p>)}</div>
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function DashboardPage({state,dispatch,monthKey:mk,toast,setActivePage}){
  const month=state.months[mk]||{}
  const entries=month.entries||[]
  const exits=month.exits||[]
  const {totalExpIn,totalRealIn,totalExpOut,totalRealOut,resPrev,resReal,pendIn,pendOut,barData}=useMemo(()=>{
    const totalExpIn=entries.reduce((s,e)=>s+(e.expectedValue||0),0)
    const totalRealIn=entries.filter(e=>e.status==='Recebido').reduce((s,e)=>s+(e.realValue||0),0)
    const totalExpOut=exits.reduce((s,e)=>s+(e.expectedValue||0),0)
    const totalRealOut=exits.filter(e=>e.status==='Pago').reduce((s,e)=>s+(e.realValue||0),0)
    const resPrev=totalExpIn-totalExpOut
    const resReal=totalRealIn-totalRealOut
    const pendIn=entries.filter(e=>e.status!=='Recebido')
    const pendOut=exits.filter(e=>e.status!=='Pago')
    const barData=[{name:'Entradas',Previsto:totalExpIn,Realizado:totalRealIn},{name:'Sa��das',Previsto:totalExpOut,Realizado:totalRealOut},{name:'Resultado',Previsto:resPrev,Realizado:resReal}]
    return{totalExpIn,totalRealIn,totalExpOut,totalRealOut,resPrev,resReal,pendIn,pendOut,barData}
  },[entries,exits])
  // Carry-over: saldo final do mês anterior
  const prevMkKey=useMemo(()=>{const d=parseMonthKey(mk);const pm=d.month===1?{year:d.year-1,month:12}:{year:d.year,month:d.month-1};return monthKey(pm.year,pm.month)},[mk])
  const prevMth=state.months[prevMkKey]||null
  const prevEndBal=useMemo(()=>prevMth?((prevMth.cashBalance||0)+prevMth.entries?.filter(e=>e.status==='Recebido').reduce((s,e)=>s+(e.realValue||0),0)-prevMth.exits?.filter(e=>e.status==='Pago').reduce((s,e)=>s+(e.realValue||0),0)):null,[prevMth])
  const showCarryOver=!month.cashBalance&&prevEndBal!==null&&prevEndBal!==0
  const [editBal,setEditBal]=useState(false)
  const [balVal,setBalVal]=useState(String(month.cashBalance||''))

  function saveBal(){const v=parseFloat(balVal.replace(',','.')); if(!isNaN(v)){dispatch({type:'SET_CASH_BALANCE',payload:{monthKey:mk,value:v}});toast('Saldo atualizado')}; setEditBal(false)}
  const [showReport,setShowReport]=useState(false)
  function printReport(){setShowReport(true);setTimeout(()=>{window.print();setShowReport(false)},300)}

  if(showReport){
    const {year:ry,month:rm}=parseMonthKey(mk)
    const collabs=state.settings?.collaborators||[]
    const cards=state.settings?.cards||[]
    const totalCollab=collabs.reduce((s,c)=>{const extras=(month.collaboratorExtras?.[c.id]||[]).reduce((a,e)=>a+e.value,0);return s+c.baseSalary+extras},0)
    return(
      <div className="print-only" style={{display:'block',padding:32,fontFamily:'Inter,sans-serif',color:'#000',background:'#fff',maxWidth:800,margin:'0 auto'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',borderBottom:'2px solid #10b981',paddingBottom:16,marginBottom:24}}>
          <div><h1 style={{fontSize:20,fontWeight:700,margin:0}}>Paiol Finance</h1><p style={{fontSize:12,color:'#666',margin:'4px 0 0'}}>Relatório Mensal</p></div>
          <div style={{textAlign:'right'}}><div style={{fontSize:16,fontWeight:600}}>{MONTH_NAMES[rm-1]} {ry}</div></div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:16,marginBottom:24}}>
          <div style={{padding:12,border:'1px solid #ddd',borderRadius:8}}><div style={{fontSize:10,color:'#888',textTransform:'uppercase'}}>Saldo em Caixa</div><div style={{fontSize:18,fontWeight:700,color:'#10b981'}}>{fmtBRL(month.cashBalance)}</div></div>
          <div style={{padding:12,border:'1px solid #ddd',borderRadius:8}}><div style={{fontSize:10,color:'#888',textTransform:'uppercase'}}>Entradas Realizadas</div><div style={{fontSize:18,fontWeight:700,color:'#10b981'}}>{fmtBRL(totalRealIn)}</div><div style={{fontSize:10,color:'#888'}}>Previsto: {fmtBRL(totalExpIn)}</div></div>
          <div style={{padding:12,border:'1px solid #ddd',borderRadius:8}}><div style={{fontSize:10,color:'#888',textTransform:'uppercase'}}>Saídas Pagas</div><div style={{fontSize:18,fontWeight:700,color:'#ef4444'}}>{fmtBRL(totalRealOut)}</div><div style={{fontSize:10,color:'#888'}}>Previsto: {fmtBRL(totalExpOut)}</div></div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:24}}>
          <div style={{padding:12,border:'1px solid #ddd',borderRadius:8}}><div style={{fontSize:10,color:'#888',textTransform:'uppercase'}}>Resultado Previsto</div><div style={{fontSize:16,fontWeight:700,color:resPrev>=0?'#10b981':'#ef4444'}}>{fmtBRL(resPrev)}</div></div>
          <div style={{padding:12,border:'1px solid #ddd',borderRadius:8}}><div style={{fontSize:10,color:'#888',textTransform:'uppercase'}}>Resultado Real</div><div style={{fontSize:16,fontWeight:700,color:resReal>=0?'#10b981':'#ef4444'}}>{fmtBRL(resReal)}</div></div>
        </div>
        {entries.length>0&&<div style={{marginBottom:24}}>
          <h3 style={{fontSize:13,fontWeight:600,marginBottom:8,borderBottom:'1px solid #eee',paddingBottom:4}}>Entradas</h3>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
            <thead><tr style={{borderBottom:'1px solid #ddd'}}><th style={{textAlign:'left',padding:'4px 8px'}}>Cliente</th><th style={{textAlign:'right',padding:'4px 8px'}}>Previsto</th><th style={{textAlign:'right',padding:'4px 8px'}}>Recebido</th><th style={{textAlign:'center',padding:'4px 8px'}}>Status</th></tr></thead>
            <tbody>{entries.map(e=><tr key={e.id} style={{borderBottom:'1px solid #f0f0f0'}}><td style={{padding:'4px 8px'}}>{e.client}</td><td style={{textAlign:'right',padding:'4px 8px'}}>{fmtBRL(e.expectedValue)}</td><td style={{textAlign:'right',padding:'4px 8px'}}>{fmtBRL(e.realValue)}</td><td style={{textAlign:'center',padding:'4px 8px'}}>{e.status}</td></tr>)}</tbody>
          </table>
        </div>}
        {exits.length>0&&<div style={{marginBottom:24}}>
          <h3 style={{fontSize:13,fontWeight:600,marginBottom:8,borderBottom:'1px solid #eee',paddingBottom:4}}>Saídas</h3>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
            <thead><tr style={{borderBottom:'1px solid #ddd'}}><th style={{textAlign:'left',padding:'4px 8px'}}>Descrição</th><th style={{padding:'4px 8px'}}>Categoria</th><th style={{textAlign:'right',padding:'4px 8px'}}>Previsto</th><th style={{textAlign:'right',padding:'4px 8px'}}>Pago</th><th style={{textAlign:'center',padding:'4px 8px'}}>Status</th></tr></thead>
            <tbody>{exits.map(e=><tr key={e.id} style={{borderBottom:'1px solid #f0f0f0'}}><td style={{padding:'4px 8px'}}>{e.name||e.description}</td><td style={{padding:'4px 8px'}}>{e.category}</td><td style={{textAlign:'right',padding:'4px 8px'}}>{fmtBRL(e.expectedValue)}</td><td style={{textAlign:'right',padding:'4px 8px'}}>{fmtBRL(e.realValue)}</td><td style={{textAlign:'center',padding:'4px 8px'}}>{e.status}</td></tr>)}</tbody>
          </table>
        </div>}
        <div style={{fontSize:10,color:'#999',textAlign:'center',marginTop:32,borderTop:'1px solid #eee',paddingTop:12}}>Gerado por Paiol Finance · {new Date().toLocaleDateString('pt-BR')} · Paiol Mídias</div>
      </div>
    )
  }

  return(
    <div className="space-y-6">
      <div className="grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-4 gap-3">
        <div className="col-span-2 rounded-2xl p-5" style={{background:'linear-gradient(135deg,#10b98115,#10b98105)',border:'1px solid #10b98130',boxShadow:'0 4px 20px #10b98108'}}>
          <div className="flex items-start justify-between mb-3"><span className="text-xs text-slate-400 uppercase tracking-wider">Saldo em Caixa</span><Wallet size={16} style={{color:'#10b981'}}/></div>
          {editBal?(
            <div className="flex gap-2 items-center">
              <input className={iCls} style={{...iSty,maxWidth:160}} type="number" value={balVal} onChange={e=>setBalVal(e.target.value)} onKeyDown={e=>e.key==='Enter'&&saveBal()} autoFocus/>
              <button onClick={saveBal}><Check size={18} style={{color:'#10b981'}}/></button>
            </div>
          ):(
            <div className="flex items-center gap-2 cursor-pointer" onClick={()=>{setBalVal(String(month.cashBalance||'0'));setEditBal(true)}}>
              <span className="text-2xl font-bold" style={{color:'#10b981'}}>{fmtBRL(month.cashBalance)}</span>
              <Pencil size={14} className="text-slate-500"/>
            </div>
          )}
          <div className="text-xs text-slate-500 mt-1">Clique para editar</div>
          {showCarryOver&&(
            <button onClick={()=>{dispatch({type:'SET_CASH_BALANCE',payload:{monthKey:mk,value:prevEndBal}});toast('Saldo inicial importado do mês anterior ✓')}}
              className="text-xs mt-2 px-3 py-1 rounded-lg" style={{background:'#10b98120',color:'#10b981',border:'1px solid #10b98130'}}>
              ↩ Iniciar com {fmtBRL(prevEndBal)} do mês anterior
            </button>
          )}
        </div>
        <SummaryCard label="Entradas Previstas" value={fmtBRL(totalExpIn)} sub={`Realizadas: ${fmtBRL(totalRealIn)}`} color="#10b981" icon={TrendingUp} onClick={setActivePage?()=>setActivePage('entries'):undefined}/>
        <SummaryCard label="Saídas Previstas" value={fmtBRL(totalExpOut)} sub={`Pagas: ${fmtBRL(totalRealOut)}`} color="#ef4444" icon={TrendingDown} onClick={setActivePage?()=>setActivePage('exits'):undefined}/>
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
        <div className="rounded-2xl p-5 space-y-4" style={{background:'var(--bg-card)',border:'1px solid var(--border)'}}>
          <h3 className="text-sm font-semibold text-slate-300">Resultado do Mês</h3>
          <div className="flex gap-6">
            <div><div className="text-xs text-slate-500 mb-1">Previsto</div><div className="text-xl font-bold" style={{color:resPrev>=0?'#10b981':'#ef4444'}}>{fmtBRL(resPrev)}</div></div>
            <div><div className="text-xs text-slate-500 mb-1">Realizado</div><div className="text-xl font-bold" style={{color:resReal>=0?'#10b981':'#ef4444'}}>{fmtBRL(resReal)}</div></div>
          </div>
          <ProgressBar label="Entradas realizadas" current={totalRealIn} total={totalExpIn} color="#10b981"/>
          <ProgressBar label="Saídas pagas" current={totalRealOut} total={totalExpOut} color="#ef4444"/>
          <div className="flex items-center gap-3 pt-1">
            {!month.closed&&<button onClick={()=>{dispatch({type:'CLOSE_MONTH',payload:{monthKey:mk}});toast('Mês fechado!')}} className="text-xs text-emerald-500 hover:text-emerald-400 flex items-center gap-1"><Check size={12}/> Fechar mês</button>}
            {month.closed&&<span className="text-xs text-emerald-500 flex items-center gap-1"><CheckCircle size={12}/> Mês fechado</span>}

          </div>
        </div>
        <div className="rounded-2xl p-5" style={{background:'var(--bg-card)',border:'1px solid var(--border)'}}>

            <BarChart data={barData} barSize={16}>
              <CartesianGrid strokeDasharray="3 3" stroke="#2d3f55"/>
              <XAxis dataKey="name" tick={{fill:'#64748b',fontSize:11}} axisLine={false} tickLine={false}/>
              <YAxis tick={{fill:'#64748b',fontSize:10}} axisLine={false} tickLine={false} tickFormatter={v=>`${(v/1000).toFixed(0)}k`}/>
              <Tooltip content={<CTip/>}/>
              <Legend wrapperStyle={{fontSize:11,color:'var(--text-3)'}}/>
              <Bar dataKey="Previsto" fill="#3b82f6" radius={[3,3,0,0]}/>
              <Bar dataKey="Realizado" fill="#10b981" radius={[3,3,0,0]}/>
            </BarChart>
          </ResponsiveContainer>
        </div>
      </div>

      {(()=>{
        const todayD=new Date()
        const alertas=(state.settings?.clients||[]).filter(c=>{
          if(!c.endDate)return false

        if(alertas.length===0)return null
        return(
          <div className="rounded-2xl p-5" style={{background:'var(--bg-card)',border:'1px solid #f59e0b40'}}>
            <h3 className="text-sm font-semibold text-amber-400 mb-3 flex items-center gap-2"><AlertCircle size={14}/> Contratos Vencendo</h3>
            <div className="space-y-2">{alertas.map(c=>(
              <div key={c.id} className="flex items-center justify-between py-1.5 border-b border-slate-700/50">
                <div><div className="text-sm text-slate-200">{c.name}</div><div className="text-xs text-slate-500">{fmtBRL(c.value)}/mês · dia {c.dueDay}</div></div>
                <span className="text-xs font-semibold px-2 py-0.5 rounded-full"
                  style={{background:c.daysLeft<0?'#ef444420':'#f59e0b20',color:c.daysLeft<0?'#ef4444':'#f59e0b'}}>
                  {c.daysLeft<0?`Venceu há ${Math.abs(c.daysLeft)}d`:c.daysLeft===0?'Vence hoje':`Vence em ${c.daysLeft}d`}
                </span>
              </div>
            ))}</div>
          </div>
        )
      })()}

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
        <div className="rounded-2xl p-5" style={{background:'var(--bg-card)',border:'1px solid var(--border)'}}>
          <h3 className="text-sm font-semibold text-slate-300 mb-3 flex items-center gap-2"><TrendingUp size={14} style={{color:'#10b981'}}/> A Receber ({pendIn.length})</h3>
          {pendIn.length===0?<p className="text-xs text-slate-500">Tudo recebido!</p>:(
            <div className="space-y-2">{pendIn.map(e=>(
              <div key={e.id} className="flex items-center justify-between py-1.5 border-b border-slate-700/50">
                <div><div className="text-sm text-slate-200">{e.client}</div><div className="text-xs text-slate-500">Dia {e.dueDay}</div></div>
                <div className="flex items-center gap-2"><span className="text-sm font-medium text-slate-200">{fmtBRL(e.expectedValue)}</span><StatusBadge status={e.status}/></div>
              </div>
            ))}</div>
          )}
        </div>
        <div className="rounded-2xl p-5" style={{background:'var(--bg-card)',border:'1px solid var(--border)'}}>
          <h3 className="text-sm font-semibold text-slate-300 mb-3 flex items-center gap-2"><TrendingDown size={14} style={{color:'#ef4444'}}/> A Pagar ({pendOut.length})</h3>
          {pendOut.length===0?<p className="text-xs text-slate-500">Tudo pago!</p>:(
            <div className="space-y-2">{pendOut.map(e=>(

// ─── FLUXO DE CAIXA ───────────────────────────────────────────────────────────
function CashFlowPage({state,dispatch,monthKey:mk}){
  const{year,month}=parseMonthKey(mk)
  const mData=state.months[mk]||{}
  const entries=mData.entries||[]
  const exits=mData.exits||[]
  const daysInMonth=new Date(year,month,0).getDate()
  const today=new Date()
  const isCurr=today.getFullYear()===year&&today.getMonth()+1===month
  const entriesByDay={};exits;entries.forEach(e=>{if(e.dueDay)entriesByDay[e.dueDay]=(entriesByDay[e.dueDay]||0)+(e.expectedValue||0)})
  const exitsByDay={};exits.forEach(e=>{if(e.day)exitsByDay[e.day]=(exitsByDay[e.day]||0)+(e.expectedValue||0)})
  // Build chart data
  let runProj=mData.cashBalance||0
  const chartData=Array.from({length:daysInMonth},(_,i)=>{
    const d=i+1;runProj+=(entriesByDay[d]||0)-(exitsByDay[d]||0)
    const real=mData.dailyCash?.[String(d)]
    return{name:d,'Projetado':runProj,'Real':real??undefined}
  })
  let running=mData.cashBalance||0
  return(
    <div className="space-y-4">
      <div className="rounded-2xl p-4" style={{background:'var(--bg-card)',border:'1px solid var(--border)'}}>
        <h3 className="text-xs font-semibold uppercase tracking-widest mb-3" style={{color:'var(--text-3)'}}>Evolução do Saldo — {MONTH_NAMES[month-1]}</h3>
        <ResponsiveContainer width="100%" height={180}>
          <AreaChart data={chartData} margin={{top:4,right:4,left:0,bottom:0}}>
            <defs>
              <linearGradient id="gProj" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#10b981" stopOpacity={0.25}/><stop offset="95%" stopColor="#10b981" stopOpacity={0}/></linearGradient>
              <linearGradient id="gReal" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#3b82f6" stopOpacity={0.25}/><stop offset="95%" stopColor="#3b82f6" stopOpacity={0}/></linearGradient>
            </defs>
            <CartesianGrid strokeDasharray="3 3" stroke="var(--sep)"/>
            <XAxis dataKey="name" tick={{fill:'#64748b',fontSize:10}} axisLine={false} tickLine={false} interval={4}/>
            <YAxis tick={{fill:'#64748b',fontSize:10}} axisLine={false} tickLine={false} tickFormatter={v=>`${(v/1000).toFixed(0)}k`} width={32}/>
            <Tooltip content={<CTip/>}/>
            <Legend wrapperStyle={{fontSize:11,color:'var(--text-3)'}}/>
            <Area type="monotone" dataKey="Projetado" stroke="#10b981" fill="url(#gProj)" strokeWidth={2} dot={false}/>
            <Area type="monotone" dataKey="Real" stroke="#3b82f6" fill="url(#gReal)" strokeWidth={2} dot={false} connectNulls={false}/>
          </AreaChart>
        </ResponsiveContainer>
      </div>
      <div className="rounded-2xl overflow-auto" style={{border:'1px solid var(--border)'}}>
      <table className="w-full min-w-[700px]">
        <thead style={{background:'var(--bg)'}}><tr><Th>Dia</Th><Th right>Ent. Prev.</Th><Th right>Saí. Prev.</Th><Th right>Saldo Esp.</Th><Th right>Saldo Real</Th><Th>Status</Th><Th>Obs.</Th></tr></thead>
        <tbody>
          {Array.from({length:daysInMonth},(_,i)=>i+1).map((d,i)=>{
            const dIn=entriesByDay[d]||0;const dOut=exitsByDay[d]||0;running+=dIn-dOut
            const realCash=mData.dailyCash?.[String(d)]
            const isToday=isCurr&&today.getDate()===d
            const isPast=isCurr?today.getDate()>d:year<today.getFullYear()||(year===today.getFullYear()&&month<today.getMonth()+1)
            const diff=realCash!=null?realCash-running:null
            const status=realCash!=null?(Math.abs(diff)<1?'✅':'⚠️'):(isPast?'⏳':'—')
            return(
              <tr key={d} className="border-t" style={{borderColor:'var(--sep)',background:isToday?'var(--row-hi)':i%2===0?'transparent':'var(--row-alt)'}}>
                <Td><span style={{color:isToday?'#10b981':'var(--text)'}}>{d}</span>{isToday&&<span className="ml-1 text-xs text-emerald-500">hoje</span>}</Td>
                <Td right color={dIn>0?'#10b981':'var(--text-3)'}>{dIn>0?fmtBRL(dIn):'—'}</Td>
                <Td right color={dOut>0?'#ef4444':'var(--text-3)'}>{dOut>0?fmtBRL(dOut):'—'}</Td>
                <Td right color={running>=0?'var(--text)':'#ef4444'}>{fmtBRL(running)}</Td>
                <td className="px-3 py-1.5"><input type="number" defaultValue={realCash??''} placeholder="—"
                  onBlur={e=>{const v=parseFloat(e.target.value);if(!isNaN(v))dispatch({type:'UPDATE_DAILY_CASH',payload:{monthKey:mk,day:String(d),value:v}})}}
                  className="w-24 px-2 py-1 rounded text-right text-sm outline-none" style={{background:'var(--bg)',border:'1px solid var(--border)',color:'var(--text)'}}/></td>
                <Td>{status}</Td>
                <td className="px-3 py-1.5"><input defaultValue={mData.dailyNotes?.[String(d)]||''} placeholder="Observação..."
                  onBlur={e=>dispatch({type:'UPDATE_DAILY_NOTE',payload:{monthKey:mk,day:String(d),note:e.target.value}})}
                  className="w-full px-2 py-1 rounded text-sm outline-none" style={{background:'transparent',border:'1px solid transparent',color:'var(--text-3)'}}/></td>
              </tr>
            )
          })}
        </tbody>
      </table>
    </div>
    </div>
  )
}

// ─── CARTÕES ──────────────────────────────────────────────────────────────────
const CARD_GRADIENTS=['linear-gradient(135deg,#1a1a2e,#16213e)','linear-gradient(135deg,#0f3460,#533483)','linear-gradient(135deg,#1b262c,#0f4c75)','linear-gradient(135deg,#2d1b69,#11998e)','linear-gradient(135deg,#200122,#6f0000)','linear-gradient(135deg,#134e5e,#71b280)']
function CardsPage({state,dispatch,monthKey:mk,toast}){
  const cards=state.settings?.cards||[]
  const [sel,setSel]=useState(cards[0]?.id||null)
  const [modal,setModal]=useState(null) // null | 'newExp' | 'payBill' | 'addCard' | cardObj
  const [form,setForm]=useState({})
  const today=new Date()
  const todayStr=today.toISOString().slice(0,10)

  // prev month key
  const{year:cy,month:cm}=parseMonthKey(mk)
  const prevMk=cm===1?monthKey(cy-1,12):monthKey(cy,cm-1)

  const card=cards.find(c=>c.id===sel)
  const curMonth=state.months[mk]||{}
  const prevMonth=state.months[prevMk]||{}

  // Fatura aberta = lançamentos do mês atual neste cartão
  const openExpenses=curMonth.cardExpenses?.[sel]||[]
  const openTotal=openExpenses.reduce((s,e)=>s+(e.value||0),0)

  // Fatura fechada = lançamentos do mês anterior (a pagar este mês)
  const closedExpenses=prevMonth.cardExpenses?.[sel]||[]
  const closedTotal=closedExpenses.reduce((s,e)=>s+(e.value||0),0)

  // Status do pagamento da fatura fechada no mês atual
  const billPayment=curMonth.cardPayments?.[sel]||null

  function addExp(){
    if(!form.description||!form.value)return toast('Preencha campos','error')
    dispatch({type:'ADD_CARD_EXPENSE',payload:{monthKey:mk,cardId:sel,expense:{description:form.description,value:parseFloat(form.value)||0,installments:parseInt(form.installments)||1,currentInstallment:parseInt(form.currentInstallment)||1}}})
    setForm({});setModal(null);toast('Lançamento adicionado')
  }
  function payBill(){
    if(!form.amount)return toast('Informe o valor pago','error')
    dispatch({type:'PAY_CARD_BILL',payload:{monthKey:mk,cardId:sel,amount:parseFloat(form.amount)||0,date:form.date||todayStr,notes:form.notes||'',createExit:!!form.createExit}})
    setModal(null);toast('Fatura marcada como paga ✓')
  }
  function saveCard(){
    if(!form.name)return toast('Informe o nome do cartão','error')
    const item={...form,limit:parseFloat(form.limit)||0,closeDay:parseInt(form.closeDay)||1,dueDay:parseInt(form.dueDay)||1}
    if(modal==='addCard')dispatch({type:'ADD_SETTING',payload:{key:'cards',item}})
    else dispatch({type:'UPDATE_SETTING',payload:{key:'cards',item}})
    toast('Cartão salvo');setModal(null)
  }
  function delCard(id){dispatch({type:'DELETE_SETTING',payload:{key:'cards',id}});if(sel===id)setSel(cards.find(c=>c.id!==id)?.id||null);toast('Removido','warn')}

  const{year:py,month:pm}=parseMonthKey(prevMk)

  return(
    <div className="space-y-5">
      {/* Card visual strip */}
      <div className="flex gap-3 overflow-x-auto pb-1">
        {cards.map((c,i)=>(
          <button key={c.id} onClick={()=>setSel(c.id)} className="shrink-0 rounded-2xl p-4 text-left transition-all"
            style={{width:200,minHeight:116,background:CARD_GRADIENTS[i%CARD_GRADIENTS.length],border:sel===c.id?'2px solid #10b981':'2px solid transparent',boxShadow:sel===c.id?'0 0 0 1px #10b98150,0 8px 32px rgba(0,0,0,0.4)':'0 4px 16px rgba(0,0,0,0.3)',color:'#fff',position:'relative',overflow:'hidden'}}>
            <div style={{position:'absolute',top:-20,right:-20,width:80,height:80,borderRadius:'50%',background:'rgba(255,255,255,0.05)'}}/>
            <div style={{position:'absolute',bottom:-30,left:-10,width:100,height:100,borderRadius:'50%',background:'rgba(255,255,255,0.03)'}}/>
            <CreditCard size={18} style={{opacity:0.7,marginBottom:12}}/>
            <div className="font-semibold text-sm truncate">{c.name}</div>
            <div className="text-xs mt-0.5" style={{opacity:0.6}}>{c.type}{c.description?` · ${c.description}`:''}</div>
            <div className="text-xs mt-2" style={{opacity:0.5}}>Fecha dia {c.closeDay} · Vence dia {c.dueDay}</div>
          </button>
        ))}
        <button onClick={()=>{setForm({name:'',type:'PJ',limit:'',closeDay:'',dueDay:'',description:''});setModal('addCard')}}
          className="shrink-0 rounded-2xl flex flex-col items-center justify-center gap-2 transition-all"
          style={{width:200,minHeight:116,border:'2px dashed var(--border)',color:'var(--text-4)'}}>
          <Plus size={20}/><span className="text-xs">Novo Cartão</span>
        </button>
      </div>

      {card&&(
        <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
          {/* Fatura fechada (mês anterior → pagar este mês) */}
          <div className="rounded-2xl p-5 space-y-4" style={{background:'var(--bg-card)',border:'1px solid var(--border)'}}>
            <div className="flex items-start justify-between">
              <div>
                <div className="text-xs font-semibold uppercase tracking-wider mb-1" style={{color:'var(--text-3)'}}>Fatura Fechada</div>
                <div className="text-xs" style={{color:'var(--text-3)'}}>{MONTH_NAMES[pm-1]} {py} → vence dia {card.dueDay}/{cm.toString().padStart(2,'0')}</div>
              </div>
              {billPayment?.paid
                ?<span className="text-xs font-semibold px-2.5 py-1 rounded-full" style={{background:'#10b98120',color:'#10b981',border:'1px solid #10b98140'}}>Paga</span>
                :<span className="text-xs font-semibold px-2.5 py-1 rounded-full" style={{background:'#f59e0b18',color:'#f59e0b',border:'1px solid #f59e0b40'}}>Aguardando</span>}
            </div>
            <div>
              <div className="text-3xl font-bold" style={{color:billPayment?.paid?'#10b981':'#ef4444',fontVariantNumeric:'tabular-nums'}}>
                {fmtBRL(billPayment?.paid?billPayment.amount:closedTotal)}
              </div>
              {billPayment?.paid&&billPayment.amount!==closedTotal&&(
                <div className="text-xs mt-0.5" style={{color:'var(--text-3)'}}>Lançado: {fmtBRL(closedTotal)} · Pago: {fmtBRL(billPayment.amount)}</div>
              )}
            </div>
            {card.limit>0&&<ProgressBar label="Uso do limite" current={closedTotal} total={card.limit} color="#f59e0b"/>}
            {closedExpenses.length>0&&(
              <div className="rounded-xl overflow-hidden" style={{border:'1px solid var(--sep)'}}>
                <div className="max-h-40 overflow-y-auto">
                  <table className="w-full text-xs"><tbody>
                    {closedExpenses.map((e,i)=>(
                      <tr key={e.id} style={{borderTop:i>0?`1px solid var(--sep)`:'none',background:i%2===0?'transparent':'var(--row-alt)'}}>
                        <td className="px-3 py-1.5" style={{color:'var(--text-2)'}}>{e.description}</td>
                        <td className="px-3 py-1.5 text-right" style={{color:'var(--text-2)',fontVariantNumeric:'tabular-nums'}}>{fmtBRL(e.value)}</td>
                        <td className="px-3 py-1.5 text-right" style={{color:'var(--text-3)'}}>{e.installments>1?`${e.currentInstallment}/${e.installments}`:'1x'}</td>
                      </tr>
                    ))}
                  </tbody></table>
                </div>
              </div>
            )}
            {closedExpenses.length===0&&<p className="text-xs text-center py-4" style={{color:'var(--text-4)'}}>Nenhum lançamento no mês anterior</p>}
            {!billPayment?.paid&&(
              <button onClick={()=>{setForm({amount:String(closedTotal),date:todayStr,notes:'',createExit:true});setModal('payBill')}}
                className="w-full py-2.5 rounded-xl text-sm font-semibold transition-all"
                style={{background:'#10b981',color:'#fff',boxShadow:'0 2px 12px #10b98140'}}>
                Pagar Fatura — {fmtBRL(closedTotal)}
              </button>
            )}
            {billPayment?.paid&&(
              <div className="text-xs text-center" style={{color:'var(--text-3)'}}>Paga em {billPayment.date?.split('-').reverse().join('/')}{billPayment.notes?` · ${billPayment.notes}`:''}</div>
            )}
            <div className="flex gap-2 pt-1">
              <button onClick={()=>{setForm({...card});setModal(card)}} className="flex items-center gap-1 text-xs px-3 py-1.5 rounded-lg" style={{background:'var(--bg-overlay)',color:'var(--text-3)'}}><Pencil size={11}/> Editar cartão</button>
              <button onClick={()=>delCard(card.id)} className="flex items-center gap-1 text-xs px-3 py-1.5 rounded-lg" style={{background:'#ef444418',color:'#ef4444'}}><Trash2 size={11}/> Remover</button>
            </div>
          </div>

          {/* Fatura aberta (mês atual — acumulando) */}
          <div className="rounded-2xl p-5 space-y-4" style={{background:'var(--bg-card)',border:'1px solid var(--border)'}}>
            <div className="flex items-center justify-between">
              <div>
                <div className="text-xs font-semibold uppercase tracking-wider mb-1" style={{color:'var(--text-3)'}}>Fatura Aberta</div>
                <div className="text-xs" style={{color:'var(--text-3)'}}>Acumulando em {MONTH_NAMES[cm-1]} → fecha dia {card.closeDay}</div>
              </div>
              <Btn onClick={()=>{setForm({description:'',value:'',installments:'1',currentInstallment:'1'});setModal('newExp')}} small><Plus size={12}/> Novo</Btn>
            </div>
            <div className="text-3xl font-bold" style={{color:'var(--text)',fontVariantNumeric:'tabular-nums'}}>{fmtBRL(openTotal)}</div>
            {card.limit>0&&<ProgressBar label="Do limite" current={openTotal} total={card.limit} color="#3b82f6"/>}
            <div className="rounded-xl overflow-hidden" style={{border:'1px solid var(--border)'}}>
              <table className="w-full"><thead style={{background:'var(--bg-overlay)'}}><tr>
                <Th>Descrição</Th><Th right>Valor</Th><Th>Parcelas</Th><Th>Ações</Th>
              </tr></thead>
              <tbody>
                {openExpenses.map((e,i)=>(
                  <tr key={e.id} style={{borderTop:'1px solid var(--sep)',background:i%2===0?'transparent':'var(--row-alt)'}}>
                    <Td>{e.description}</Td>
                    <Td right>{fmtBRL(e.value)}</Td>
                    <Td muted>{e.installments>1?`${e.currentInstallment}/${e.installments}`:'1x'}</Td>
                    <Td><button onClick={()=>dispatch({type:'DELETE_CARD_EXPENSE',payload:{monthKey:mk,cardId:sel,id:e.id}})} className="p-1 rounded" style={{color:'var(--text-4)'}}><Trash2 size={13}/></button></Td>
                  </tr>
                ))}
                {openExpenses.length===0&&<tr><td colSpan={4} className="px-3 py-6 text-center text-sm" style={{color:'var(--text-4)'}}>Nenhum lançamento ainda</td></tr>}
              </tbody></table>
            </div>
          </div>
        </div>
      )}
      {cards.length===0&&(
        <div className="py-16 text-center space-y-3">
          <CreditCard size={40} style={{color:'var(--text-4)',margin:'0 auto'}}/>
          <p className="text-sm" style={{color:'var(--text-3)'}}>Nenhum cartão cadastrado</p>
          <button onClick={()=>{setForm({name:'',type:'PJ',limit:'',closeDay:'',dueDay:'',description:''});setModal('addCard')}} className="px-4 py-2 rounded-xl text-sm font-medium" style={{background:'#10b981',color:'#fff'}}>+ Adicionar Cartão</button>
        </div>
      )}

      {/* Modal: novo lançamento */}
      {modal==='newExp'&&<Modal title="Novo Lançamento" onClose={()=>setModal(null)}>
        <div className="space-y-4">
          <Field label="Descrição"><Inp value={form.description||''} onChange={v=>setForm(f=>({...f,description:v}))} placeholder="Ex: Adobe CC, Hosting..."/></Field>
          <div className="grid grid-cols-3 gap-3">
            <Field label="Valor (R$)"><Inp type="number" value={form.value||''} onChange={v=>setForm(f=>({...f,value:v}))} placeholder="0,00"/></Field>
            <Field label="Parcelas"><Inp type="number" value={form.installments||'1'} onChange={v=>setForm(f=>({...f,installments:v}))} placeholder="1"/></Field>
            <Field label="Parcela atual"><Inp type="number" value={form.currentInstallment||'1'} onChange={v=>setForm(f=>({...f,currentInstallment:v}))} placeholder="1"/></Field>
          </div>
          <div className="flex justify-end gap-2 pt-2"><BtnG onClick={()=>setModal(null)}>Cancelar</BtnG><Btn onClick={addExp}><Save size={14}/> Salvar</Btn></div>
        </div>
      </Modal>}

      {/* Modal: pagar fatura */}
      {modal==='payBill'&&<Modal title={`Pagar Fatura — ${card?.name}`} onClose={()=>setModal(null)}>
        <div className="space-y-4">
          <div className="rounded-xl p-4 text-center" style={{background:'var(--bg-overlay)'}}>
            <div className="text-xs mb-1" style={{color:'var(--text-3)'}}>Total lançado ({MONTH_NAMES[pm-1]})</div>
            <div className="text-2xl font-bold" style={{color:'#ef4444',fontVariantNumeric:'tabular-nums'}}>{fmtBRL(closedTotal)}</div>
          </div>
          <Field label="Valor pago (R$)">
            <Inp type="number" value={form.amount||''} onChange={v=>setForm(f=>({...f,amount:v}))} placeholder={String(closedTotal)}/>
            <p className="text-xs mt-1" style={{color:'var(--text-4)'}}>Edite se o valor da fatura for diferente do lançado</p>
          </Field>
          <Field label="Data do pagamento"><Inp type="date" value={form.date||todayStr} onChange={v=>setForm(f=>({...f,date:v}))}/></Field>
          <Field label="Observações (opcional)"><Inp value={form.notes||''} onChange={v=>setForm(f=>({...f,notes:v}))} placeholder="Ex: pago via débito automático"/></Field>
          <label className="flex items-center gap-2 text-sm cursor-pointer" style={{color:'var(--text-2)'}}>
            <input type="checkbox" checked={!!form.createExit} onChange={e=>setForm(f=>({...f,createExit:e.target.checked}))} style={{accentColor:'#10b981'}}/>
            Criar saída em {MONTH_NAMES[cm-1]} com o valor pago
          </label>
          <div className="flex justify-end gap-2 pt-2"><BtnG onClick={()=>setModal(null)}>Cancelar</BtnG><Btn onClick={payBill}><Check size={14}/> Confirmar Pagamento</Btn></div>
        </div>
      </Modal>}

      {/* Modal: adicionar/editar cartão */}
      {(modal==='addCard'||typeof modal==='object'&&modal?.closeDay!==undefined)&&<Modal title={modal==='addCard'?'Novo Cartão':'Editar Cartão'} onClose={()=>setModal(null)}>
        <div className="space-y-4">
          <div className="grid grid-cols-2 gap-3">
            <Field label="Nome"><Inp value={form.name||''} onChange={v=>setForm(f=>({...f,name:v}))} placeholder="Ex: Nubank PJ"/></Field>
            <Field label="Tipo"><Sel value={form.type||'PJ'} onChange={v=>setForm(f=>({...f,type:v}))} options={['PJ','PF','Casa']}/></Field>
          </div>
          <div className="grid grid-cols-3 gap-3">
            <Field label="Limite (R$)"><Inp type="number" value={form.limit||''} onChange={v=>setForm(f=>({...f,limit:v}))} placeholder="0"/></Field>
            <Field label="Fecha dia"><Inp type="number" value={form.closeDay||''} onChange={v=>setForm(f=>({...f,closeDay:v}))} placeholder="29"/></Field>
            <Field label="Vence dia"><Inp type="number" value={form.dueDay||''} onChange={v=>setForm(f=>({...f,dueDay:v}))} placeholder="10"/></Field>
          </div>
          <Field label="Descrição"><Inp value={form.description||''} onChange={v=>setForm(f=>({...f,description:v}))} placeholder="Ex: Ferramentas recorrentes"/></Field>
          <div className="flex justify-end gap-2 pt-2"><BtnG onClick={()=>setModal(null)}>Cancelar</BtnG><Btn onClick={saveCard}><Save size={14}/> Salvar</Btn></div>
        </div>
      </Modal>}
    </div>
  )
}

// ─── COLABORADORES ────────────────────────────────────────────────────────────
function CollaboratorsPage({state,dispatch,monthKey:mk,toast}){
  const collabs=state.settings?.collaborators||[]
  const month=state.months[mk]||{}
  const [modal,setModal]=useState(null) // null | 'newCollab' | collabObj | {extraFor: id}
  const [form,setForm]=useState({})
  const totalSal=collabs.reduce((s,c)=>s+(c.baseSalary||0),0)
  const totalExt=collabs.reduce((s,c)=>s+(month.collaboratorExtras?.[c.id]||[]).reduce((ss,e)=>ss+e.value,0),0)
  function saveCollab(){
    if(!form.name)return toast('Informe o nome','error')
    const item={...form,baseSalary:parseFloat(form.baseSalary)||0}
    if(modal==='newCollab')dispatch({type:'ADD_SETTING',payload:{key:'collaborators',item}})
    else dispatch({type:'UPDATE_SETTING',payload:{key:'collaborators',item}})
    toast('Salvo');setModal(null)
  }
  function delCollab(id){dispatch({type:'DELETE_SETTING',payload:{key:'collaborators',id}});toast('Removido','warn')}
  function addExtra(collabId){
    if(!form.description||!form.value)return toast('Preencha campos','error')
    dispatch({type:'ADD_COLLAB_EXTRA',payload:{monthKey:mk,collabId,extra:{description:form.description,value:parseFloat(form.value)||0}}})
    setModal(null);toast('Adicionado')
  }
  return(
    <div className="space-y-5">
      <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
        <SummaryCard label="Salários base" value={fmtBRL(totalSal)} color="#3b82f6" icon={Users}/>
        <SummaryCard label="Extras este mês" value={fmtBRL(totalExt)} color="#f59e0b" icon={Plus}/>
        <SummaryCard label="Total este mês" value={fmtBRL(totalSal+totalExt)} color="#10b981" icon={DollarSign}/>
      </div>
      <div className="flex justify-end">
        <Btn onClick={()=>{setForm({name:'',role:'',baseSalary:''});setModal('newCollab')}}><Plus size={13}/> Novo Colaborador</Btn>
      </div>
      <div className="space-y-4">{collabs.map(c=>{
        const extras=month.collaboratorExtras?.[c.id]||[]
        const extTotal=extras.reduce((s,e)=>s+e.value,0)
        return(
          <div key={c.id} className="rounded-2xl p-5" style={{background:'var(--bg-card)',border:'1px solid var(--border)'}}>
            <div className="flex items-center justify-between mb-3">
              <div className="flex items-center gap-3">
                <div className="w-9 h-9 rounded-full flex items-center justify-center text-sm font-bold" style={{background:'#10b98130',color:'#10b981'}}>{c.name[0]}</div>
                <div>
                  <div className="font-semibold" style={{color:'var(--text)'}}>{c.name}</div>
                  <div className="text-xs" style={{color:'var(--text-3)'}}>{c.role}</div>
                </div>
              </div>
              <div className="flex items-center gap-3">
                <div className="text-right">
                  <div className="text-lg font-bold" style={{color:'var(--text)',fontVariantNumeric:'tabular-nums'}}>{fmtBRL(c.baseSalary+extTotal)}</div>
                  <div className="text-xs" style={{color:'var(--text-3)'}}>Base: {fmtBRL(c.baseSalary)}{extTotal>0?` + ${fmtBRL(extTotal)}`:''}</div>
                </div>
                <div className="flex flex-col gap-1">
                  <button onClick={()=>{setForm({...c});setModal(c)}} className="p-1 rounded" style={{color:'var(--text-3)'}}><Pencil size={13}/></button>
                  <button onClick={()=>delCollab(c.id)} className="p-1 rounded" style={{color:'var(--text-4)'}}><Trash2 size={13}/></button>
                </div>
              </div>
            </div>
            {extras.length>0&&<div className="border-t pt-3 mb-3 space-y-1.5" style={{borderColor:'var(--sep)'}}>
              {extras.map(e=><div key={e.id} className="flex items-center justify-between text-sm">
                <span style={{color:'var(--text-3)'}}>{e.description}</span>
                <div className="flex items-center gap-2">
                  <span style={{color:'var(--text-2)',fontVariantNumeric:'tabular-nums'}}>{fmtBRL(e.value)}</span>
                  <button onClick={()=>dispatch({type:'DELETE_COLLAB_EXTRA',payload:{monthKey:mk,collabId:c.id,id:e.id}})} className="p-0.5 rounded" style={{color:'var(--text-4)'}}><Trash2 size={11}/></button>
                </div>
              </div>)}
            </div>}
            <button onClick={()=>{setForm({description:'',value:''});setModal({extraFor:c.id})}} className="text-xs flex items-center gap-1" style={{color:'#10b981'}}><Plus size={11}/> Adicionar extra este mês</button>
          </div>
        )
      })}
      {collabs.length===0&&<div className="py-12 text-center text-sm" style={{color:'var(--text-3)'}}>Nenhum colaborador cadastrado</div>}
      </div>
      {/* Modal novo/editar colaborador */}
      {(modal==='newCollab'||typeof modal==='object'&&modal?.baseSalary!==undefined&&!modal?.extraFor)&&(
        <Modal title={modal==='newCollab'?'Novo Colaborador':'Editar Colaborador'} onClose={()=>setModal(null)}>
          <div className="space-y-4">
            <Field label="Nome"><Inp value={form.name||''} onChange={v=>setForm(f=>({...f,name:v}))} placeholder="Ex: João Silva"/></Field>
            <div className="grid grid-cols-2 gap-3">
              <Field label="Função"><Inp value={form.role||''} onChange={v=>setForm(f=>({...f,role:v}))} placeholder="Designer"/></Field>
              <Field label="Salário base (R$)"><Inp type="number" value={form.baseSalary||''} onChange={v=>setForm(f=>({...f,baseSalary:v}))} placeholder="0,00"/></Field>
            </div>
            <div className="flex justify-end gap-2 pt-2"><BtnG onClick={()=>setModal(null)}>Cancelar</BtnG><Btn onClick={saveCollab}><Save size={14}/> Salvar</Btn></div>
          </div>
        </Modal>
      )}
      {/* Modal extra mensal */}
      {typeof modal==='object'&&modal?.extraFor&&(
        <Modal title="Novo Extra" onClose={()=>setModal(null)}>
          <div className="space-y-4">
            <Field label="Descrição"><Inp value={form.description||''} onChange={v=>setForm(f=>({...f,description:v}))} placeholder="Ex: Vale refeição, Bônus..."/></Field>
            <Field label="Valor (R$)"><Inp type="number" value={form.value||''} onChange={v=>setForm(f=>({...f,value:v}))} placeholder="0,00"/></Field>
            <div className="flex justify-end gap-2 pt-2"><BtnG onClick={()=>setModal(null)}>Cancelar</BtnG>
              <Btn onClick={()=>addExtra(modal.extraFor)}><Save size={14}/> Salvar</Btn>
            </div>
          </div>
        </Modal>
      )}
    </div>
  )
}

// ─── PROJEÇÃO ANUAL ───────────────────────────────────────────────────────────
function AnnualProjectionPage({state,selYear}){
  const today=new Date();const year=selYear||today.getFullYear()
  const rows=Array.from({length:12},(_,i)=>{
    const mk=monthKey(year,i+1);const m=state.months[mk]||{}
    const entries=m.entries||[];const exits=m.exits||[]
    const expIn=entries.reduce((s,e)=>s+(e.expectedValue||0),0)
    const realIn=entries.filter(e=>e.status==='Recebido').reduce((s,e)=>s+(e.realValue||0),0)
    const expOut=exits.reduce((s,e)=>s+(e.expectedValue||0),0)
    const realOut=exits.filter(e=>e.status==='Pago').reduce((s,e)=>s+(e.realValue||0),0)
    return{mk,month:i+1,name:MONTH_NAMES[i],expIn,realIn,expOut,realOut,isPast:i+1<today.getMonth()+1,isCurrent:i+1===today.getMonth()+1}
  })
  let accP=0,accR=0
  const data=rows.map(r=>{accP+=r.expIn-r.expOut;if(r.isPast||r.isCurrent)accR+=r.realIn-r.realOut;return{...r,accP,accR}})
  const chartData=data.map(r=>({name:r.name.slice(0,3),'Entradas':r.expIn,'Saídas':r.expOut}))
  return(
    <div className="space-y-5">
      <div className="rounded-2xl p-5" style={{background:'var(--bg-card)',border:'1px solid var(--border)'}}>
        <h3 className="text-sm font-semibold mb-4" style={{color:'var(--text-2)'}}>Evolução {year}</h3>
        <ResponsiveContainer width="100%" height={200}>
          <AreaChart data={chartData}>
            <defs>
              <linearGradient id="gin" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#10b981" stopOpacity={0.3}/><stop offset="95%" stopColor="#10b981" stopOpacity={0}/></linearGradient>
              <linearGradient id="gout" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#ef4444" stopOpacity={0.3}/><stop offset="95%" stopColor="#ef4444" stopOpacity={0}/></linearGradient>
            </defs>
            <CartesianGrid strokeDasharray="3 3" stroke="#2d3f55"/>
            <XAxis dataKey="name" tick={{fill:'#64748b',fontSize:11}} axisLine={false} tickLine={false}/>
            <YAxis tick={{fill:'#64748b',fontSize:10}} axisLine={false} tickLine={false} tickFormatter={v=>`${(v/1000).toFixed(0)}k`}/>
            <Tooltip content={<CTip/>}/><Legend wrapperStyle={{fontSize:11,color:'var(--text-3)'}}/>
            <Area type="monotone" dataKey="Entradas" stroke="#10b981" fill="url(#gin)" strokeWidth={2}/>
            <Area type="monotone" dataKey="Saídas" stroke="#ef4444" fill="url(#gout)" strokeWidth={2}/>
          </AreaChart>
        </ResponsiveContainer>
      </div>
      <div className="rounded-2xl overflow-auto" style={{border:'1px solid var(--border)'}}>
        <table className="w-full min-w-[800px]">
          <thead style={{background:'var(--bg)'}}><tr><Th>Mês</Th><Th right>Ent.Prev</Th><Th right>Saí.Prev</Th><Th right>Res.Prev</Th><Th right>Ent.Real</Th><Th right>Saí.Real</Th><Th right>Res.Real</Th><Th right>Acumulado</Th></tr></thead>
          <tbody>{data.map((r,i)=>{
            const rP=r.expIn-r.expOut;const rR=r.realIn-r.realOut
            return(
              <tr key={r.mk} className="border-t" style={{borderColor:'var(--sep)',background:r.isCurrent?'var(--row-hi)':i%2===0?'transparent':'var(--row-alt)'}}>
                <Td><span style={{color:r.isCurrent?'#10b981':'var(--text)'}}>{r.name}</span>{r.isCurrent&&<span className="ml-1 text-xs text-emerald-500">atual</span>}</Td>
                <Td right color="#10b981">{fmtBRL(r.expIn)}</Td><Td right color="#ef4444">{fmtBRL(r.expOut)}</Td>
                <Td right color={rP>=0?'#10b981':'#ef4444'}>{fmtBRL(rP)}</Td>
                <Td right color={r.realIn>0?'#10b981':'var(--text-3)'}>{r.realIn>0?fmtBRL(r.realIn):'—'}</Td>
                <Td right color={r.realOut>0?'#ef4444':'var(--text-3)'}>{r.realOut>0?fmtBRL(r.realOut):'—'}</Td>
                <Td right color={rR!==0?(rR>=0?'#10b981':'#ef4444'):'var(--text-3)'}>{r.realIn>0||r.realOut>0?fmtBRL(rR):'—'}</Td>
                <Td right color={(r.isPast||r.isCurrent)?r.accR>=0?'var(--text)':'#ef4444':r.accP>=0?'var(--text-3)':'#ef4444'}>{fmtBRL((r.isPast||r.isCurrent)?r.accR:r.accP)}</Td>
              </tr>
            )
          })}</tbody>
        </table>
      </div>
    </div>
  )
}

// ─── SIMULADOR ────────────────────────────────────────────────────────────────
function SimulatorPage({state,monthKey:mk}){
  const [type,setType]=useState('expense')
  const [form,setForm]=useState({name:'',value:'',installments:'1',months:'3'})
  const [result,setResult]=useState(null)
  const month=state.months[mk]||{}
  const baseIn=(month.entries||[]).reduce((s,e)=>s+(e.expectedValue||0),0)
  const baseOut=(month.exits||[]).reduce((s,e)=>s+(e.expectedValue||0),0)
  function simulate(){
    const v=parseFloat(form.value)||0;const inst=parseInt(form.installments)||1;const mo=parseInt(form.months)||3
    const months=Array.from({length:Math.max(inst,mo)},(_,i)=>{
      const mIn=type==='client'?baseIn+v:baseIn
      let mOut=baseOut;if(type==='expense')mOut+=i<inst?v/inst:0;if(type==='hire')mOut+=v
      return{month:i+1,in:mIn,out:mOut,result:mIn-mOut}
    })
    setResult({months,name:form.name})
  }
  const chartData=(result?.months||[]).map(m=>({name:`M+${m.month}`,'Com simulação':m.result,'Sem simulação':baseIn-baseOut}))
  return(
    <div className="space-y-5">
      <div className="rounded-2xl p-5" style={{background:'var(--bg-card)',border:'1px solid var(--border)'}}>
        <h3 className="text-sm font-semibold text-slate-300 mb-1 flex items-center gap-2"><Zap size={14} style={{color:'#10b981'}}/> Simulador</h3>
        <p className="text-xs text-slate-500 mb-4">Não altera os dados reais.</p>
        <div className="flex gap-2 mb-5 flex-wrap">
          {[['expense','💳 Compra'],['client','🤝 Novo Cliente'],['hire','👤 Contratação']].map(([k,l])=>(
            <button key={k} onClick={()=>{setType(k);setResult(null)}} className="px-3 py-2 rounded-lg text-xs font-medium transition-all"
              style={{background:type===k?'#10b981':'var(--bg-overlay)',color:type===k?'#fff':'var(--text-3)',border:`1px solid ${type===k?'#10b981':'var(--border)'}`}}>{l}</button>
          ))}
        </div>
        <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-4">
          <Field label="Descrição"><Inp value={form.name} onChange={v=>setForm(f=>({...f,name:v}))} placeholder="Nome"/></Field>
          <Field label="Valor (R$)"><Inp type="number" value={form.value} onChange={v=>setForm(f=>({...f,value:v}))} placeholder="0,00"/></Field>
          {type==='expense'&&<Field label="Parcelas"><Inp type="number" value={form.installments} onChange={v=>setForm(f=>({...f,installments:v}))} placeholder="1"/></Field>}
          <Field label="Meses"><Inp type="number" value={form.months} onChange={v=>setForm(f=>({...f,months:v}))} placeholder="3"/></Field>
        </div>
        <Btn onClick={simulate}><Zap size={14}/> Simular</Btn>
      </div>
      {result&&(
        <div className="space-y-4">
          <div className="rounded-2xl p-5" style={{background:'var(--bg-card)',border:'1px solid var(--border)'}}>
            <h3 className="text-sm font-semibold text-slate-300 mb-3">{result.name||'Simulação'}</h3>
            <ResponsiveContainer width="100%" height={180}>
              <BarChart data={chartData} barSize={18}>
                <CartesianGrid strokeDasharray="3 3" stroke="#2d3f55"/>
                <XAxis dataKey="name" tick={{fill:'#64748b',fontSize:11}} axisLine={false} tickLine={false}/>
                <YAxis tick={{fill:'#64748b',fontSize:10}} axisLine={false} tickLine={false} tickFormatter={v=>`${(v/1000).toFixed(0)}k`}/>
                <Tooltip content={<CTip/>}/><Legend wrapperStyle={{fontSize:11,color:'var(--text-3)'}}/>
                <Bar dataKey="Sem simulação" fill="#475569" radius={[3,3,0,0]}/>
                <Bar dataKey="Com simulação" fill="#10b981" radius={[3,3,0,0]}/>
              </BarChart>
            </ResponsiveContainer>
          </div>
          <div className="rounded-2xl overflow-hidden" style={{border:'1px solid var(--border)'}}>
            <table className="w-full"><thead style={{background:'var(--bg)'}}><tr><Th>Mês</Th><Th right>Entradas</Th><Th right>Saídas</Th><Th right>Resultado</Th><Th right>Impacto</Th></tr></thead>
              <tbody>{result.months.map((m,i)=>{
                const impact=m.result-(baseIn-baseOut)
                return<tr key={i} className="border-t" style={{borderColor:'var(--sep)',background:i%2===0?'transparent':'var(--row-alt)'}}>
                  <Td>Mês +{m.month}</Td><Td right color="#10b981">{fmtBRL(m.in)}</Td><Td right color="#ef4444">{fmtBRL(m.out)}</Td>
                  <Td right color={m.result>=0?'#10b981':'#ef4444'}>{fmtBRL(m.result)}</Td>
                  <Td right color={impact>=0?'#10b981':'#ef4444'}>{impact!==0?(impact>0?'+':'')+fmtBRL(impact):'—'}</Td>
                </tr>
              })}</tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  )
}
