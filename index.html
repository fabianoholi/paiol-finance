              <Fld label="Lançar no mês financeiro">
                <select value={form.monthKey||curMk} onChange={e=>setForm(f=>({...f,monthKey:e.target.value}))} style={inputSt}>
                  {monthOpts.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
                </select>
              </Fld>
            )}
            {form.type==='sale'&&<p className="text-xs text-slate-500 flex items-start gap-1"><CheckCircle size={11} style={{marginTop:2,color:'#10b981',flexShrink:0}}/> Uma entrada "Venda Permuta — {form.clientName}" será criada automaticamente no mês escolhido.</p>}
            <div className="flex justify-end gap-2 pt-2">
              <button onClick={()=>setModal(null)} className="px-4 py-2 text-sm rounded-lg" style={{background:'#33415540',color:'#94a3b8'}}>Cancelar</button>
              <button onClick={save} className="flex items-center gap-1.5 px-4 py-2 text-sm font-medium rounded-lg" style={{background:form.type==='sale'?'#10b981':'#a78bfa',color:'#fff'}}><Save size={14}/> Salvar</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  )
}

// ─── TAREFAS ──────────────────────────────────────────────────────────────────
function TasksPage({state,dispatch,toast}){
  const tasks=state.tasks||[]
  const clients=state.settings?.clients||[]
  const [filterAssignee,setFilterAssignee]=useState('todos')
  const [filterPriority,setFilterPriority]=useState('todos')
  const [modal,setModal]=useState(null)
  const [form,setForm]=useState({})
  const [dragging,setDragging]=useState(null)

  const COLUMNS=[
    {id:'todo',label:'A Fazer',color:'#64748b',bg:'#64748b15'},
    {id:'doing',label:'Em Andamento',color:'#3b82f6',bg:'#3b82f615'},
    {id:'done',label:'Concluído',color:'#10b981',bg:'#10b98115'},
  ]
  const PRIORITIES={high:{label:'Alta',c:'#ef4444',b:'#ef444420'},medium:{label:'Média',c:'#f59e0b',b:'#f59e0b20'},low:{label:'Baixa',c:'#64748b',b:'#64748b20'}}
  const ASSIGNEES=[{v:'todos',l:'Todos'},{v:'fabiano',l:'Fabiano'},{v:'mainara',l:'Mainara'},{v:'',l:'Sem responsável'}]

  const filtered=tasks.filter(t=>{
    if(filterAssignee!=='todos'&&t.assignee!==filterAssignee)return false
    if(filterPriority!=='todos'&&t.priority!==filterPriority)return false
    return true
  })

  function openAdd(status='todo'){
    setForm({title:'',description:'',assignee:'',priority:'medium',dueDate:'',relatedClientId:'',status})
    setModal('add')
  }
  function openEdit(t){setForm({...t});setModal(t)}
  function save(){
    if(!form.title)return toast('Digite o título da tarefa','error')
    if(modal==='add')dispatch({type:'ADD_TASK',payload:{task:{...form}}})
    else dispatch({type:'UPDATE_TASK',payload:{task:{...form}}})
    toast('Salvo');setModal(null)
  }
  function del(id){dispatch({type:'DELETE_TASK',payload:{id}});toast('Removido','warn')}
  function moveTask(taskId,newStatus){
    const t=tasks.find(x=>x.id===taskId)
    if(t)dispatch({type:'UPDATE_TASK',payload:{task:{...t,status:newStatus}}})
  }

  const todoCount=tasks.filter(t=>t.status!=='done').length

  const inputSt={background:'#0f172a',border:'1px solid #2d3f55',borderRadius:8,padding:'8px 12px',color:'#f1f5f9',fontSize:14,width:'100%',outline:'none'}
  const Inp2=({value,onChange,type='text',placeholder})=><input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={inputSt}/>
  const Sel2=({value,onChange,opts})=><select value={value} onChange={e=>onChange(e.target.value)} style={inputSt}>{opts.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}</select>
  const Fld=({label,children})=><div><label className="block text-xs text-slate-400 mb-1">{label}</label>{children}</div>

  return(
    <div className="space-y-4">
      {/* Filtros + botão */}
      <div className="flex flex-wrap items-center gap-3 justify-between">
        <div className="flex flex-wrap gap-2">
          {/* Filtro responsável */}
          {ASSIGNEES.map(a=>(
            <button key={a.v} onClick={()=>setFilterAssignee(a.v)}
              className="px-3 py-1.5 text-xs rounded-lg transition-all"
              style={{background:filterAssignee===a.v?'#3b82f6':'#33415530',color:filterAssignee===a.v?'#fff':'#94a3b8',fontWeight:filterAssignee===a.v?600:400}}>
              {a.l}
            </button>
          ))}
          <div className="w-px bg-slate-700 mx-1"/>
          {/* Filtro prioridade */}
          {[{v:'todos',l:'Todas'},{v:'high',l:'Alta'},{v:'medium',l:'Média'},{v:'low',l:'Baixa'}].map(p=>(
            <button key={p.v} onClick={()=>setFilterPriority(p.v)}
              className="px-3 py-1.5 text-xs rounded-lg transition-all"
              style={{background:filterPriority===p.v?(PRIORITIES[p.v]?.b||'#3b82f615'):'#33415530',color:filterPriority===p.v?(PRIORITIES[p.v]?.c||'#3b82f6'):'#94a3b8',fontWeight:filterPriority===p.v?600:400}}>
              {p.l}
            </button>
          ))}
        </div>
        <button onClick={()=>openAdd()} className="flex items-center gap-1.5 px-4 py-2 text-sm font-medium rounded-lg whitespace-nowrap" style={{background:'#10b981',color:'#fff'}}>
          <Plus size={14}/> Nova Tarefa
        </button>
      </div>

      {/* Kanban */}
      <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
        {COLUMNS.map(col=>{
          const colTasks=filtered.filter(t=>t.status===col.id)
          return(
            <div key={col.id} className="rounded-xl flex flex-col min-h-[300px]"
              style={{background:col.bg,border:`1px solid ${col.color}30`}}
              onDragOver={e=>{e.preventDefault()}}
              onDrop={e=>{e.preventDefault();if(dragging)moveTask(dragging,col.id);setDragging(null)}}>
              {/* Header coluna */}
              <div className="flex items-center justify-between px-4 py-3 border-b" style={{borderColor:col.color+'30'}}>
                <div className="flex items-center gap-2">
                  <div className="w-2 h-2 rounded-full" style={{background:col.color}}/>
                  <span className="text-sm font-semibold" style={{color:col.color}}>{col.label}</span>
                  <span className="text-xs px-1.5 py-0.5 rounded-full" style={{background:col.color+'20',color:col.color}}>{colTasks.length}</span>
                </div>
                <button onClick={()=>openAdd(col.id)} className="text-slate-500 hover:text-slate-300 transition-colors" title="Adicionar nesta coluna">
                  <Plus size={14}/>
                </button>
              </div>
              {/* Cards */}
              <div className="flex-1 p-3 space-y-2">
                {colTasks.map(t=>{
                  const pr=PRIORITIES[t.priority||'medium']
                  const relClient=clients.find(c=>c.id===t.relatedClientId)
                  const overdue=t.dueDate&&new Date(t.dueDate+'T23:59:59')<new Date()&&t.status!=='done'
                  return(
                    <div key={t.id} draggable onDragStart={()=>setDragging(t.id)} onDragEnd={()=>setDragging(null)}
                      className="rounded-lg p-3 space-y-2 cursor-grab active:cursor-grabbing"
                      style={{background:'#1e293b',border:`1px solid ${overdue?'#ef444440':'#334155'}`,opacity:dragging===t.id?0.5:1}}>
                      {/* Prioridade + título */}
                      <div className="flex items-start justify-between gap-2">
                        <span className="text-xs px-1.5 py-0.5 rounded" style={{background:pr.b,color:pr.c,whiteSpace:'nowrap'}}>{pr.label}</span>
                        {t.assignee&&<span className="text-xs text-slate-500 shrink-0">{t.assignee==='fabiano'?'👨‍💼 Fab':'👩‍💼 Mai'}</span>}
                      </div>
                      <div className="text-sm font-medium text-slate-100 leading-snug">{t.title}</div>
                      {t.description&&<div className="text-xs text-slate-500 leading-relaxed line-clamp-2">{t.description}</div>}
                      {/* Rodapé */}
                      <div className="flex items-center justify-between pt-1">
                        <div className="flex items-center gap-2">
                          {t.dueDate&&<span className="text-xs flex items-center gap-1" style={{color:overdue?'#ef4444':'#64748b'}}>
                            <Clock size={10}/>{t.dueDate.split('-').reverse().join('/')}
                          </span>}
                          {relClient&&<span className="text-xs text-slate-600 flex items-center gap-1"><Briefcase size={10}/>{relClient.name}</span>}
                        </div>
                        <div className="flex gap-1">
                          <button onClick={()=>openEdit(t)} className="p-1 rounded text-slate-500 hover:text-slate-300 transition-colors"><Pencil size={11}/></button>
                          <button onClick={()=>del(t.id)} className="p-1 rounded text-slate-600 hover:text-red-400 transition-colors"><Trash2 size={11}/></button>
                        </div>
                      </div>
                    </div>
                  )
                })}
                {colTasks.length===0&&(
                  <div className="flex items-center justify-center h-20 text-xs text-slate-600 rounded-lg border border-dashed" style={{borderColor:col.color+'20'}}>
                    Arraste tarefas aqui
                  </div>
                )}
              </div>
            </div>
          )
        })}
      </div>

      {/* Modal */}
      {modal&&(
        <Modal title={modal==='add'?'Nova Tarefa':'Editar Tarefa'} onClose={()=>setModal(null)} wide>
          <div className="space-y-4">
            <div><label className="block text-xs text-slate-400 mb-1">Título *</label>
              <input value={form.title||''} onChange={e=>setForm(f=>({...f,title:e.target.value}))} placeholder="O que precisa ser feito?" style={inputSt}/>
            </div>
            <div><label className="block text-xs text-slate-400 mb-1">Descrição</label>
              <textarea value={form.description||''} onChange={e=>setForm(f=>({...f,description:e.target.value}))} placeholder="Detalhes opcionais..." rows={3} style={{...inputSt,resize:'vertical'}}/>
            </div>
            <div className="grid grid-cols-2 gap-3">
              <div><label className="block text-xs text-slate-400 mb-1">Responsável</label>
                <select value={form.assignee||''} onChange={e=>setForm(f=>({...f,assignee:e.target.value}))} style={inputSt}>
                  <option value="">Sem responsável</option><option value="fabiano">Fabiano</option><option value="mainara">Mainara</option>
                </select>
              </div>
              <div><label className="block text-xs text-slate-400 mb-1">Prioridade</label>
                <select value={form.priority||'medium'} onChange={e=>setForm(f=>({...f,priority:e.target.value}))} style={inputSt}>
                  <option value="high">🔴 Alta</option><option value="medium">🟡 Média</option><option value="low">🔵 Baixa</option>
                </select>
              </div>
            </div>
            <div className="grid grid-cols-2 gap-3">
              <div><label className="block text-xs text-slate-400 mb-1">Status</label>
                <select value={form.status||'todo'} onChange={e=>setForm(f=>({...f,status:e.target.value}))} style={inputSt}>
                  <option value="todo">A Fazer</option><option value="doing">Em Andamento</option><option value="done">Concluído</option>
                </select>
              </div>
              <div><label className="block text-xs text-slate-400 mb-1">Prazo</label>
                <input type="date" value={form.dueDate||''} onChange={e=>setForm(f=>({...f,dueDate:e.target.value}))} style={inputSt}/>
              </div>
            </div>
            <div><label className="block text-xs text-slate-400 mb-1">Cliente relacionado (opcional)</label>
              <select value={form.relatedClientId||''} onChange={e=>setForm(f=>({...f,relatedClientId:e.target.value}))} style={inputSt}>
                <option value="">Nenhum</option>
                {clients.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
              </select>
            </div>
            <div className="flex justify-end gap-2 pt-2">
              <button onClick={()=>setModal(null)} className="px-4 py-2 text-sm rounded-lg" style={{background:'#33415540',color:'#94a3b8'}}>Cancelar</button>
              <button onClick={save} className="flex items-center gap-1.5 px-4 py-2 text-sm font-medium rounded-lg" style={{background:'#10b981',color:'#fff'}}><Save size={14}/> Salvar</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  )
}

// ─── CALENDÁRIO ───────────────────────────────────────────────────────────────
function CalendarPage({state,dispatch,monthKey:mk,toast}){
  const {year:curYear,month:curMonth}=parseMonthKey(mk)
  const [selDay,setSelDay]=useState(null)

  const monthData=state.months[mk]||{}
  const entries=monthData.entries||[]
  const exits=monthData.exits||[]
  const tasks=state.tasks||[]
  const clients=state.settings?.clients||[]
  const permuteUsages=state.settings?.permuteUsages||[]

  // Construir mapa dia → eventos
  const eventsByDay={}
  function addEv(day,ev){if(!day)return;if(!eventsByDay[day])eventsByDay[day]=[];eventsByDay[day].push(ev)}

  entries.forEach(e=>{
    const d=parseInt(e.dueDay||0)
    if(d)addEv(d,{type:'entry',color:'#10b981',label:e.client,value:e.expectedValue,status:e.status,id:e.id})
  })
  exits.forEach(e=>{
    const d=parseInt(e.day||0)
    if(d)addEv(d,{type:'exit',color:'#ef4444',label:e.name,value:e.expectedValue,status:e.status,id:e.id})
  })
  tasks.forEach(t=>{
    if(!t.dueDate)return
    const tp=parseMonthKey(t.dueDate.slice(0,7))
    if(tp.year===curYear&&tp.month===curMonth){
      const d=parseInt(t.dueDate.slice(8,10))
      addEv(d,{type:'task',color:t.status==='done'?'#10b981':t.priority==='high'?'#ef4444':'#3b82f6',label:t.title,status:t.status,id:t.id,assignee:t.assignee})
    }
  })
  clients.forEach(c=>{
    if(!c.endDate)return
    const ep=parseMonthKey(c.endDate.slice(0,7))
    if(ep.year===curYear&&ep.month===curMonth){
      const d=parseInt(c.endDate.slice(8,10))
      addEv(d,{type:'contract',color:'#f59e0b',label:`Vence: ${c.name}`,id:c.id})
    }
  })
  permuteUsages.forEach(u=>{
    if(!u.date)return
    const up=parseMonthKey(u.date.slice(0,7))
    if(up.year===curYear&&up.month===curMonth){
      const d=parseInt(u.date.slice(8,10))
      addEv(d,{type:'permuta',color:'#a78bfa',label:`${u.type==='sale'?'💰':'🛍'} ${u.clientName}`,value:u.value,id:u.id})
    }
  })

  // Grade do mês
  const firstDay=new Date(curYear,curMonth-1,1).getDay()
  const daysInMonth=new Date(curYear,curMonth,0).getDate()
  const todayObj=new Date()
  const isToday=(d)=>todayObj.getFullYear()===curYear&&todayObj.getMonth()+1===curMonth&&todayObj.getDate()===d

  const typeLabels={entry:'Entrada',exit:'Saída',task:'Tarefa',contract:'Contrato',permuta:'Permuta'}
  const DOW=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb']

  const selEvs=selDay?eventsByDay[selDay]||[]:[]

  return(
    <div className="space-y-4">
      {/* Legenda */}
      <div className="flex flex-wrap gap-3 text-xs">
        {[['#10b981','Entradas'],['#ef4444','Saídas'],['#3b82f6','Tarefas'],['#f59e0b','Contratos'],['#a78bfa','Permuta']].map(([c,l])=>(
          <span key={l} className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-full" style={{background:c}}/><span className="text-slate-400">{l}</span></span>
        ))}
      </div>

      <div className={`gap-4 ${selDay?'grid grid-cols-1 lg:grid-cols-3':'block'}`}>
        {/* Grade */}
        <div className={selDay?'lg:col-span-2':''}>
          <div className="rounded-2xl overflow-hidden" style={{background:'#1e293b',border:'1px solid #2d3f55'}}>
            {/* Cabeçalho dias da semana */}
            <div className="grid grid-cols-7 border-b" style={{borderColor:'#334155'}}>
              {DOW.map(d=><div key={d} className="py-2 text-center text-xs font-semibold text-slate-500">{d}</div>)}
            </div>
            {/* Células */}
            <div className="grid grid-cols-7">
              {Array.from({length:firstDay}).map((_,i)=><div key={`e${i}`} className="min-h-[80px] border-r border-b" style={{borderColor:'#334155'}}/>)}
              {Array.from({length:daysInMonth}).map((_,i)=>{
                const d=i+1
                const evs=eventsByDay[d]||[]
                const sel=selDay===d
                const today=isToday(d)
                return(
                  <div key={d} onClick={()=>setSelDay(sel?null:d)}
                    className="min-h-[80px] p-1.5 border-r border-b cursor-pointer transition-colors"
                    style={{borderColor:'#334155',background:sel?'#334155':today?'#10b98108':'transparent'}}>
                    <div className="flex items-center justify-between mb-1">
                      <span className="text-xs font-semibold flex items-center justify-center w-6 h-6 rounded-full"
                        style={{background:today?'#10b981':'transparent',color:today?'#fff':sel?'#f1f5f9':'#64748b'}}>
                        {d}
                      </span>
                    </div>
                    {/* Dots e labels */}
                    <div className="space-y-0.5">
                      {evs.slice(0,3).map((ev,ei)=>(
                        <div key={ei} className="text-xs px-1 py-0.5 rounded truncate leading-tight"
                          style={{background:ev.color+'20',color:ev.color,fontSize:10}}>
                          {ev.label}
                        </div>
                      ))}
                      {evs.length>3&&<div className="text-xs text-slate-500 pl-1" style={{fontSize:10}}>+{evs.length-3} mais</div>}
                    </div>
                  </div>
                )
              })}
            </div>
          </div>
        </div>

        {/* Painel lateral do dia */}
        {selDay&&(
          <div className="rounded-2xl p-4 space-y-3" style={{background:'#1e293b',border:'1px solid #2d3f55'}}>
            <div className="flex items-center justify-between">
              <h3 className="font-semibold text-slate-100">
                {selDay} de {MONTH_NAMES[curMonth-1]}
                {isToday(selDay)&&<span className="ml-2 text-xs px-2 py-0.5 rounded-full" style={{background:'#10b98120',color:'#10b981'}}>Hoje</span>}
              </h3>
              <button onClick={()=>setSelDay(null)} className="text-slate-500 hover:text-slate-300"><X size={16}/></button>
            </div>
            {selEvs.length===0?(
              <p className="text-xs text-slate-500 py-4 text-center">Nenhum evento neste dia</p>
            ):(
              <div className="space-y-2">
                {selEvs.map((ev,i)=>(
                  <div key={i} className="rounded-lg p-3 space-y-1" style={{background:ev.color+'12',border:`1px solid ${ev.color}30`}}>
                    <div className="flex items-center gap-2">
                      <span className="w-2 h-2 rounded-full shrink-0" style={{background:ev.color}}/>
                      <span className="text-xs font-semibold" style={{color:ev.color}}>{typeLabels[ev.type]}</span>
                      {ev.status&&<span className="text-xs text-slate-500 ml-auto">{ev.status}</span>}
                    </div>
                    <div className="text-sm text-slate-200 pl-4">{ev.label}</div>
                    {ev.value!=null&&<div className="text-sm font-semibold pl-4" style={{color:ev.color}}>{fmtBRL(ev.value)}</div>}
                    {ev.assignee&&<div className="text-xs text-slate-500 pl-4">{ev.assignee==='fabiano'?'👨‍💼 Fabiano':'👩‍💼 Mainara'}</div>}
                  </div>
                ))}
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  )
}

// ─── GOALS ────────────────────────────────────────────────────────────────────
const GOAL_CATEGORIES=['Reforma','Equipamento','Viagem','Ferramenta','Marketing','Outro']
const GOAL_PRIORITIES=['Alta','Média','Baixa']
const GOAL_STATUSES=['Ideia','Planejando','Comprometido','Concluído']
const GOAL_CAT_COLORS={Reforma:'#f59e0b',Equipamento:'#3b82f6',Viagem:'#06b6d4',Ferramenta:'#8b5cf6',Marketing:'#ec4899',Outro:'#94a3b8'}
const GOAL_PRI_COLORS={Alta:'#ef4444',Média:'#f59e0b',Baixa:'#10b981'}
const GOAL_STA_COLORS={Ideia:'#64748b',Planejando:'#3b82f6',Comprometido:'#f59e0b',Concluído:'#10b981'}

function GoalsPage({state,dispatch,toast}){
  const goals=state.settings?.goals||[]
  const [modal,setModal]=useState(null)
  const [expanded,setExpanded]=useState({})
  const [filterStatus,setFilterStatus]=useState('Todos')
  const [form,setForm]=useState({title:'',description:'',category:'Outro',estimatedCost:'',priority:'Média',status:'Ideia'})

  const emptyForm={title:'',description:'',category:'Outro',estimatedCost:'',priority:'Média',status:'Ideia'}

  function openNew(){setForm(emptyForm);setModal('new')}
  function openEdit(g){setForm({...g,estimatedCost:String(g.estimatedCost||'')});setModal('edit')}
  function save(){
    if(!form.title.trim())return toast('Informe o título do objetivo','error')
    const goal={...form,estimatedCost:parseFloat(String(form.estimatedCost).replace(',','.'))||0}
    if(modal==='new'){dispatch({type:'ADD_GOAL',payload:{goal}});toast('Objetivo adicionado ✓')}
    else{dispatch({type:'UPDATE_GOAL',payload:{goal}});toast('Objetivo atualizado ✓')}
    setModal(null)
  }
  function del(id){dispatch({type:'DELETE_GOAL',payload:{id}});toast('Removido','warn')}

  const filtered=filterStatus==='Todos'?goals:goals.filter(g=>g.status===filterStatus)
  const totalCost=goals.filter(g=>g.status!=='Concluído').reduce((s,g)=>s+(g.estimatedCost||0),0)
  const doneCost=goals.filter(g=>g.status==='Concluído').reduce((s,g)=>s+(g.estimatedCost||0),0)

  return(
    <div className="space-y-6">
      {/* KPIs */}
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
        <SummaryCard label="Total de objetivos" value={goals.length} color="#8b5cf6" icon={Target}/>
        <SummaryCard label="Concluídos" value={goals.filter(g=>g.status==='Concluído').length} color="#10b981" icon={CheckCircle}/>
        <SummaryCard label="Investimento estimado" value={fmtBRL(totalCost)} color="#f59e0b" icon={DollarSign}/>
        <SummaryCard label="Já investido" value={fmtBRL(doneCost)} color="#3b82f6" icon={TrendingUp}/>
      </div>

      {/* Filtros + Botão */}
      <div className="flex flex-wrap items-center gap-2 justify-between">
        <div className="flex gap-2 flex-wrap">
          {['Todos',...GOAL_STATUSES].map(s=>(
            <button key={s} onClick={()=>setFilterStatus(s)}
              className="px-3 py-1.5 rounded-lg text-xs font-medium transition-all"
              style={{background:filterStatus===s?'#10b981':'#33415540',color:filterStatus===s?'#fff':'#94a3b8',border:filterStatus===s?'none':'1px solid #334155'}}>
              {s}
            </button>
          ))}
        </div>
        <Btn onClick={openNew}><Plus size={14}/> Novo Objetivo</Btn>
      </div>

      {/* Lista de objetivos */}
      {filtered.length===0?(
        <div className="rounded-2xl p-10 text-center text-slate-500" style={{background:'#1e293b',border:'1px solid #2d3f55'}}>
          <Target size={36} className="mx-auto mb-3 opacity-20"/>
          <p className="text-sm">Nenhum objetivo {filterStatus!=='Todos'?`com status "${filterStatus}"`:'cadastrado'}.</p>
          {filterStatus==='Todos'&&<p className="text-xs mt-1 text-slate-600">Comece adicionando um objetivo de negócio, equipamento ou viagem.</p>}
        </div>
      ):(
        <div className="space-y-3">
          {filtered.map(g=>{
            const isExp=expanded[g.id]
            const catColor=GOAL_CAT_COLORS[g.category]||'#94a3b8'
            const priColor=GOAL_PRI_COLORS[g.priority]||'#94a3b8'
            const staColor=GOAL_STA_COLORS[g.status]||'#64748b'
            const done=g.status==='Concluído'
            return(
              <div key={g.id} className="rounded-2xl overflow-hidden transition-all" style={{background:'#1e293b',border:`1px solid ${done?'#10b98130':'#334155'}`}}>
                <div className="flex items-center gap-3 p-4 cursor-pointer" onClick={()=>setExpanded(e=>({...e,[g.id]:!e[g.id]}))}>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 flex-wrap">
                      <span className={`font-semibold text-sm ${done?'line-through text-slate-500':'text-slate-100'}`}>{g.title}</span>
                      <span className="text-xs px-2 py-0.5 rounded-full font-medium" style={{background:catColor+'20',color:catColor}}>{g.category}</span>
                      <span className="text-xs px-2 py-0.5 rounded-full font-medium" style={{background:priColor+'20',color:priColor}}>{g.priority}</span>
                    </div>
                    <div className="flex items-center gap-3 mt-1">
                      <span className="text-xs px-2 py-0.5 rounded-full" style={{background:staColor+'20',color:staColor}}>{g.status}</span>
                      {g.estimatedCost>0&&<span className="text-xs text-slate-500">{fmtBRL(g.estimatedCost)}</span>}
                    </div>
                  </div>
                  <div className="flex items-center gap-2 shrink-0">
                    <button onClick={e=>{e.stopPropagation();openEdit(g)}} className="p-1.5 rounded-lg text-slate-500 hover:text-slate-300 hover:bg-slate-700 transition-colors"><Pencil size={13}/></button>
                    <button onClick={e=>{e.stopPropagation();del(g.id)}} className="p-1.5 rounded-lg text-slate-500 hover:text-red-400 hover:bg-slate-700 transition-colors"><Trash2 size={13}/></button>
                    <ChevronDown size={14} className="text-slate-500 transition-transform" style={{transform:isExp?'rotate(180deg)':'rotate(0deg)'}}/>
                  </div>
                </div>
                {isExp&&g.description&&(
                  <div className="px-4 pb-4 text-sm text-slate-400 border-t border-slate-700 pt-3">{g.description}</div>
                )}
              </div>
            )
          })}
        </div>
      )}

      {/* Modal */}
      {modal&&(
        <Modal title={modal==='new'?'Novo Objetivo':'Editar Objetivo'} onClose={()=>setModal(null)}>
          <div className="space-y-4">
            <Field label="Título"><Inp value={form.title} onChange={v=>setForm(f=>({...f,title:v}))} placeholder="Ex: Notebook novo para edição"/></Field>
            <Field label="Descrição (opcional)">
              <textarea value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} placeholder="Detalhes, motivação, links..." rows={3}
                className={iCls} style={{...iSty,resize:'vertical'}}/>
            </Field>
            <div className="grid grid-cols-2 gap-3">
              <Field label="Categoria"><Sel value={form.category} onChange={v=>setForm(f=>({...f,category:v}))} options={GOAL_CATEGORIES}/></Field>
              <Field label="Custo estimado (R$)"><Inp type="number" value={form.estimatedCost} onChange={v=>setForm(f=>({...f,estimatedCost:v}))} placeholder="0"/></Field>
            </div>
            <div className="grid grid-cols-2 gap-3">
              <Field label="Prioridade"><Sel value={form.priority} onChange={v=>setForm(f=>({...f,priority:v}))} options={GOAL_PRIORITIES}/></Field>
              <Field label="Status"><Sel value={form.status} onChange={v=>setForm(f=>({...f,status:v}))} options={GOAL_STATUSES}/></Field>
            </div>
            <div className="flex gap-2 pt-2">
              <Btn onClick={save}><Save size={14}/> Salvar</Btn>
              <BtnG onClick={()=>setModal(null)}>Cancelar</BtnG>
            </div>
          </div>
        </Modal>
      )}
    </div>
  )
}

// ─── SIDEBAR ──────────────────────────────────────────────────────────────────
const NAV=[
  {id:'dashboard',icon:LayoutDashboard,label:'Dashboard'},
  {id:'cashflow',icon:CalendarDays,label:'Fluxo de Caixa'},
  {id:'entries',icon:TrendingUp,label:'Entradas'},
  {id:'exits',icon:TrendingDown,label:'Saídas'},
  {id:'cards',icon:CreditCard,label:'Cartões'},
  {id:'collaborators',icon:Users,label:'Colaboradores'},
  {id:'clients',icon:Briefcase,label:'Clientes'},
  {id:'permuta',icon:ArrowLeftRight,label:'Permuta'},
  {id:'objetivos',icon:Flag,label:'Objetivos'},
  {id:'tasks',icon:ListTodo,label:'Tarefas'},
  {id:'calendar',icon:CalendarRange,label:'Calendário'},
  {id:'annual',icon:Target,label:'Projeção Anual'},
  {id:'simulator',icon:Zap,label:'Simulador'},
  {id:'settings',icon:Settings,label:'Configurações'},
]

function Sidebar({activePage,setActivePage,open,setOpen,state}){
  const todayD=new Date()
  const expCount=(state?.settings?.clients||[]).filter(c=>{
    if(!c.endDate)return false
    return Math.floor((new Date(c.endDate+'T12:00:00')-todayD)/86400000)<=30
  }).length
  const openTasksCount=(state?.tasks||[]).filter(t=>t.status!=='done').length
  const overdueCount=(state?.tasks||[]).filter(t=>t.status!=='done'&&t.dueDate&&new Date(t.dueDate+'T23:59:59')<new Date()).length
  const permuteNegCount=(state?.settings?.clients||[]).filter(c=>{
    if(!c.permuteValue)return false
    const earned=Object.values(state?.months||{}).reduce((s,m)=>{const e=(m.entries||[]).find(en=>(en.clientId===c.id||en.client===c.name)&&en.status==='Recebido');return s+(e?c.permuteValue:0)},0)
    const used=(state?.settings?.permuteUsages||[]).filter(u=>u.clientId===c.id).reduce((s,u)=>s+u.value,0)
    return(earned-used)<0
  }).length
  return(
    <>
      {open&&<div className="fixed inset-0 z-30 lg:hidden" style={{background:'rgba(0,0,0,0.6)'}} onClick={()=>setOpen(false)}/>}
      <aside className={`fixed top-0 left-0 h-full z-40 flex flex-col transition-transform duration-300 ${open?'translate-x-0':'-translate-x-full'} lg:translate-x-0`}
        style={{width:220,background:'#0a1628',borderRight:'1px solid #1e293b'}}>
        <div className="flex items-center justify-between p-4 border-b" style={{borderColor:'#1e293b'}}>
          <div className="flex items-center gap-2.5">
            <div className="w-8 h-8 rounded-xl flex items-center justify-center font-bold text-sm" style={{background:'linear-gradient(135deg,#10b981,#059669)',color:'#fff',boxShadow:'0 2px 8px #10b98150'}}>P</div>
            <div>
              <span className="font-bold text-slate-100 text-sm tracking-tight">Paiol Finance</span>
              <div className="text-xs text-slate-600 leading-none">Paiol Mídias</div>
            </div>
          </div>
          <button onClick={()=>setOpen(false)} className="lg:hidden text-slate-500 hover:text-slate-300"><X size={16}/></button>
        </div>
        <nav className="flex-1 p-3 space-y-0.5 overflow-y-auto">
          {NAV.map(({id,icon:Icon,label})=>(
            <button key={id} onClick={()=>{setActivePage(id);setOpen(false)}} className="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-all text-left"
              style={{background:activePage===id?'linear-gradient(135deg,#10b98118,#10b98108)':'transparent',color:activePage===id?'#10b981':'#64748b',fontWeight:activePage===id?600:400}}>
              <Icon size={16}/>{label}
              {id==='clients'&&expCount>0&&<span className="ml-auto text-xs font-bold px-1.5 py-0.5 rounded-full" style={{background:'#f59e0b',color:'#000',fontSize:10}}>{expCount}</span>}
              {id==='permuta'&&permuteNegCount>0&&<span className="ml-auto text-xs font-bold px-1.5 py-0.5 rounded-full" style={{background:'#ef4444',color:'#fff',fontSize:10}}>!</span>}
              {id==='tasks'&&openTasksCount>0&&<span className="ml-auto text-xs font-bold px-1.5 py-0.5 rounded-full" style={{background:overdueCount>0?'#ef4444':'#3b82f6',color:'#fff',fontSize:10}}>{openTasksCount}</span>}
            </button>
          ))}
        </nav>
        <div className="p-4 border-t text-xs text-slate-700 flex items-center gap-2" style={{borderColor:'#1e293b'}}>
          <div className="w-1.5 h-1.5 rounded-full" style={{background:'#10b981'}}></div>
          v1.2 · Paiol Finance
        </div>
      </aside>
    </>
  )
}

// ─── AUTH ─────────────────────────────────────────────────────────────────────
const USERS=[
  {id:'fabiano',name:'Fabiano',role:'admin',  color:'#10b981',initials:'FA',roleLabel:'Administrador'},
  {id:'mainara', name:'Mainara', role:'manager',color:'#8b5cf6',initials:'MA',roleLabel:'Gestora'},
]
async function hashPin(pin){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pin+'paiol_salt_2026'))
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('')
}
const loadSession=()=>{try{const s=sessionStorage.getItem('paiol_sess');return s?JSON.parse(s):null}catch{return null}}
const saveSession=u=>sessionStorage.setItem('paiol_sess',JSON.stringify({...u,loginAt:Date.now()}))
const clearSession=()=>sessionStorage.removeItem('paiol_sess')
const loadPins=()=>{try{const p=localStorage.getItem('paiol_pins');return p?JSON.parse(p):{}}catch{return{}}}
const savePins=p=>localStorage.setItem('paiol_pins',JSON.stringify(p))

function LoginScreen({onLogin}){
  const [step,setStep]=useState('select')
  const [user,setUser]=useState(null)
  const [pin,setPin]=useState('')
  const [confirm,setConfirm]=useState('')
  const [err,setErr]=useState('')
  const [busy,setBusy]=useState(false)
  const pins=loadPins()

  function pick(u){setUser(u);setPin('');setConfirm('');setErr('');setStep(pins[u.id]?'pin':'setup')}
  function back(){setStep('select');setPin('');setConfirm('');setErr('')}

  async function submit(){
    if(pin.length<4){setErr('PIN deve ter 4 dígitos');return}
    setBusy(true)
    const h=await hashPin(pin)
    if(step==='pin'){
      if(h===pins[user.id]){saveSession(user);onLogin(user)}
      else{setErr('PIN incorreto');setPin('')}
    }else{
      if(pin!==confirm){setErr('PINs não coincidem');setBusy(false);return}
      savePins({...loadPins(),[user.id]:h})
      saveSession(user);onLogin(user)
    }
    setBusy(false)
  }

  const inputSt={background:'#0f172a',border:'1px solid #2d3f55',borderRadius:12,padding:'14px',color:'#f1f5f9',fontSize:22,outline:'none',textAlign:'center',letterSpacing:'0.4em',width:'100%'}

  return(
    <div className="min-h-screen flex items-center justify-center px-4" style={{background:'#0f172a'}}>
      <div className="w-full max-w-xs">
        {/* Logo */}
        <div className="text-center mb-10">
          <div className="inline-flex items-center justify-center w-14 h-14 rounded-2xl mb-4" style={{background:'#10b98120',border:'1px solid #10b98140'}}>
            <KeyRound size={26} style={{color:'#10b981'}}/>
          </div>
          <div className="text-xl font-bold text-slate-100">PAIOL FINANCE</div>
          <div className="text-xs text-slate-500 mt-1">Paiol Mídias · Área restrita</div>
        </div>

        {step==='select'&&(
          <div className="space-y-3">
            <p className="text-xs text-slate-500 text-center mb-4">Quem está acessando?</p>
            {USERS.map(u=>(
              <button key={u.id} onClick={()=>pick(u)} className="w-full flex items-center gap-3 p-4 rounded-xl transition-all hover:scale-[1.01] active:scale-[0.99]"
                style={{background:'#1e293b',border:'1px solid #2d3f55'}}>
                <div className="w-11 h-11 rounded-full flex items-center justify-center text-white font-bold shrink-0"
                  style={{background:u.color+'30',border:`2px solid ${u.color}50`}}>
                  <span style={{color:u.color,fontSize:14}}>{u.initials}</span>
                </div>
                <div className="text-left flex-1">
                  <div className="font-semibold text-slate-100 text-sm">{u.name}</div>
                  <div className="text-xs text-slate-500">{u.roleLabel}</div>
                </div>
                <ChevronRight size={15} style={{color:'#475569'}}/>
              </button>
            ))}
          </div>
        )}

        {(step==='pin'||step==='setup')&&(
          <div className="space-y-4">
            <div className="flex items-center gap-2 mb-6">
              <button onClick={back} className="p-1.5 rounded-lg text-slate-400 hover:bg-slate-800">
                <ChevronLeft size={17}/>
              </button>
              <div className="flex items-center gap-2">
                <div className="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold"
                  style={{background:user?.color+'30',border:`1.5px solid ${user?.color}50`,color:user?.color}}>
                  {user?.initials}
                </div>
                <span className="text-sm font-semibold text-slate-200">{user?.name}</span>
              </div>
            </div>
            <p className="text-xs text-slate-400">{step==='setup'?'Crie seu PIN de 4 dígitos':'Digite seu PIN'}</p>
            <input type="password" inputMode="numeric" maxLength={4} autoFocus
              value={pin} onChange={e=>{setPin(e.target.value.replace(/\D/g,''));setErr('')}}
              onKeyDown={e=>e.key==='Enter'&&submit()} placeholder="••••" style={inputSt}/>
            {step==='setup'&&(
              <input type="password" inputMode="numeric" maxLength={4}
                value={confirm} onChange={e=>{setConfirm(e.target.value.replace(/\D/g,''));setErr('')}}
                onKeyDown={e=>e.key==='Enter'&&submit()} placeholder="Confirme o PIN" style={inputSt}/>
            )}
            {err&&<p className="text-xs text-red-400 text-center">{err}</p>}
            <button onClick={submit} disabled={busy} className="w-full py-3 rounded-xl text-sm font-semibold text-white"
              style={{background:'#10b981',opacity:busy?.7:1,marginTop:8}}>
              {busy?'Verificando...':(step==='pin'?'Entrar':'Criar PIN e Entrar')}
            </button>
          </div>
        )}
        <p className="text-center text-xs text-slate-700 mt-8">v1.1 · Paiol Mídias</p>
      </div>
    </div>
  )
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function PaiolFinanceApp({currentUser,onLogout}){
  const [state,dispatch]=useReducer(reducer,null,loadState)
  const [activePage,setActivePage]=useState('dashboard')
  const [sidebarOpen,setSidebarOpen]=useState(false)
  const [toasts,setToasts]=useState([])
  const today=new Date()
  const [selYear,setSelYear]=useState(today.getFullYear())
  const [selMonth,setSelMonth]=useState(today.getMonth()+1)
  const mk=monthKey(selYear,selMonth)

  // Salva localmente imediato + envia para Sheets com debounce de 2s
  useEffect(()=>{
    try{localStorage.setItem('paiolfinance_v3',JSON.stringify(state))}catch{}
    const t=setTimeout(()=>gasPost(state).catch(()=>{}),2000)
    return()=>clearTimeout(t)
  },[state])

  // Na inicialização, sincroniza do Sheets (substitui localStorage se houver dado)
  useEffect(()=>{
    gasGet().then(data=>{
      if(data){
        dispatch({type:'IMPORT',payload:{data}})
        localStorage.setItem('paiolfinance_v3',JSON.stringify(data))
      }
    }).catch(()=>{})
  },[])

  const toast=useCallback((msg,type='success')=>{
    const id=uid();setToasts(t=>[...t,{id,msg,type}])
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3000)
  },[])

  function prevMonth(){if(selMonth===1){setSelYear(y=>y-1);setSelMonth(12)}else setSelMonth(m=>m-1)}
  function nextMonth(){if(selMonth===12){setSelYear(y=>y+1);setSelMonth(1)}else setSelMonth(m=>m+1)}

  const pp={state,dispatch,monthKey:mk,toast}
  const pages={
    dashboard:<DashboardPage {...pp}/>,cashflow:<CashFlowPage {...pp}/>,entries:<EntriesPage {...pp}/>,
    exits:<ExitsPage {...pp}/>,cards:<CardsPage {...pp}/>,collaborators:<CollaboratorsPage {...pp}/>,
    clients:<ClientsPage state={state} dispatch={dispatch} toast={toast}/>,
    permuta:<PermutaPage state={state} dispatch={dispatch} toast={toast}/>,
    objetivos:<GoalsPage state={state} dispatch={dispatch} toast={toast}/>,
    tasks:<TasksPage state={state} dispatch={dispatch} toast={toast}/>,
    calendar:<CalendarPage state={state} dispatch={dispatch} monthKey={mk} toast={toast}/>,
    annual:<AnnualProjectionPage {...pp}/>,simulator:<SimulatorPage {...pp}/>,settings:<SettingsPage {...pp}/>,
  }
  const monthData=state.months[mk]||{}

  return(
    <div className="min-h-screen flex" style={{background:'#1e293b',color:'#f1f5f9',fontFamily:'system-ui,sans-serif'}}>
      <Sidebar activePage={activePage} setActivePage={setActivePage} open={sidebarOpen} setOpen={setSidebarOpen} state={state}/>
      <div className="flex-1 flex flex-col min-h-screen" style={{marginLeft:0,paddingLeft:0}}>
        <div className="flex-1 flex flex-col min-h-screen lg:ml-[220px]">
          {/* Header */}
          <header className="sticky top-0 z-20 flex items-center justify-between px-4 py-3" style={{background:'#0a1628',borderBottom:'1px solid #1e293b',backdropFilter:'blur(12px)'}}>
            <div className="flex items-center gap-3">
              <button onClick={()=>setSidebarOpen(true)} className="lg:hidden p-2 rounded-lg text-slate-400 hover:bg-slate-700 transition-colors"><Menu size={18}/></button>
              <div className="flex items-center gap-2">
                <button onClick={prevMonth} className="p-1.5 rounded-lg text-slate-400 hover:bg-slate-700 transition-colors"><ChevronLeft size={16}/></button>
                <span className="text-sm font-semibold text-slate-100 min-w-[130px] text-center">{MONTH_NAMES[selMonth-1]} / {selYear}</span>
                <button onClick={nextMonth} className="p-1.5 rounded-lg text-slate-400 hover:bg-slate-700 transition-colors"><ChevronRight size={16}/></button>
              </div>
            </div>
            <div className="flex items-center gap-2 sm:gap-3">
              {monthData.closed&&<span className="px-2 py-0.5 text-xs rounded-full" style={{background:'#10b98120',color:'#10b981'}}>Fechado</span>}
              <div className="text-right hidden sm:block"><div className="text-xs text-slate-500">Saldo em caixa</div><div className="text-sm font-bold" style={{color:'#10b981'}}>{fmtBRL(monthData.cashBalance)}</div></div>
              <div className="p-1.5 rounded-lg hidden sm:block" style={{background:'#10b98120'}}><Wallet size={15} style={{color:'#10b981'}}/></div>
              {/* Avatar do usuário */}
              <div className="flex items-center gap-2 pl-2 border-l border-slate-700">
                <div className="w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold shrink-0"
                  style={{background:(currentUser.color||'#10b981')+'30',border:`1.5px solid ${currentUser.color||'#10b981'}50`,color:currentUser.color||'#10b981'}}>
                  {currentUser.initials||currentUser.name?.slice(0,2).toUpperCase()}
                </div>
                <span className="text-xs font-medium text-slate-300 hidden sm:block">{currentUser.name}</span>
                <button onClick={onLogout} title="Sair"
                  className="p-1 rounded-lg text-slate-500 hover:text-red-400 hover:bg-slate-700 transition-colors">
                  <LogOut size={14}/>
                </button>
              </div>
            </div>
          </header>
          <div className="px-4 pt-4 pb-2"><h1 className="text-base font-semibold text-slate-200">{NAV.find(n=>n.id===activePage)?.label}</h1></div>
          <main className="flex-1 px-4 pb-8">{pages[activePage]}</main>
        </div>
      </div>
      <Toast toasts={toasts}/>
    </div>
  )
}

function App(){
  const [currentUser,setCurrentUser]=useState(loadSession)
  if(!currentUser) return <LoginScreen onLogin={u=>setCurrentUser(u)}/>
  return <PaiolFinanceApp currentUser={currentUser} onLogout={()=>{clearSession();setCurrentUser(null)}}/>
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>)
</script>
