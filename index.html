// ─── CLIENTES ─────────────────────────────────────────────────────────────────
function ClientsPage({state,dispatch,toast}){
  const clients=state.settings?.clients||[]
  const [modal,setModal]=useState(null) // null | 'add' | clientObj
  const [histModal,setHistModal]=useState(null) // clientObj for history
  const [formTab,setFormTab]=useState('dados')
  const [form,setForm]=useState({})
  const [svcInput,setSvcInput]=useState('')
  const [cnpjLoading,setCnpjLoading]=useState(false)
  const [cepLoading,setCepLoading]=useState(false)
  const [filterStatus,setFilterStatus]=useState('todos')
  const [genModal,setGenModal]=useState(null)
  const [genForm,setGenForm]=useState({fromDate:'',numMonths:'12'})
  const todayD=new Date()

  const inputSt={background:'var(--bg-input)',border:'1px solid var(--border)',borderRadius:10,padding:'8px 12px',color:'var(--text)',fontSize:14,width:'100%',outline:'none'}
  const Inp2=({value,onChange,type='text',placeholder,readOnly})=><input type={type} value={value||''} readOnly={readOnly} onChange={e=>onChange&&onChange(e.target.value)} placeholder={placeholder} style={{...inputSt,opacity:readOnly?0.6:1}}/>
  const Sel2=({value,onChange,opts})=><select value={value||''} onChange={e=>onChange(e.target.value)} style={inputSt}>{opts.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}</select>
  const Fld=({label,children,half})=><div className={half?'':''}><label className="block text-xs mb-1" style={{color:'var(--text-3)'}}>{label}</label>{children}</div>

  function getDaysLeft(endDate){
    if(!endDate)return null
    return Math.floor((new Date(endDate+'T12:00:00')-todayD)/86400000)
  }
  function getCS(c){
    if(c.status==='inativo')return'inativo'
    if(!c.startDate||!c.endDate)return'no_contract'
    const d=getDaysLeft(c.endDate)
    if(d<0)return'expired';if(d<=30)return'expiring';return'active'
  }
  function computeEnd(startDate,duration){
    if(!startDate||!duration)return''
    const d=new Date(startDate+'T12:00:00')
    d.setMonth(d.getMonth()+parseInt(duration));d.setDate(d.getDate()-1)
    return d.toISOString().slice(0,10)
  }
  function togglePaid(e){
    const isPaid=e.status==='Recebido'
    dispatch({type:'UPDATE_ENTRY',payload:{monthKey:e.mk,entry:{...e,status:isPaid?'Previsto':'Recebido',realValue:isPaid?0:(e.expectedValue||0)}}})
  }
  function markAllPaid(hist){
    const pending=hist.filter(e=>e.status!=='Recebido')
    if(!pending.length)return toast('Todas já estão pagas','warn')
    pending.forEach(e=>dispatch({type:'UPDATE_ENTRY',payload:{monthKey:e.mk,entry:{...e,status:'Recebido',realValue:e.expectedValue||0}}}))
    toast(`${pending.length} parcela${pending.length>1?'s':''} marcada${pending.length>1?'s':''} como paga${pending.length>1?'s':''} ✓`)
  }
  function getPayHistory(c){
    const entries=[]
    Object.entries(state.months||{}).forEach(([mk2,m])=>{
      const e=(m.entries||[]).find(en=>en.clientId===c.id||(en.client===c.name))
      if(e)entries.push({mk:mk2,...e})
    })
    return entries.sort((a,b)=>b.mk.localeCompare(a.mk))
  }
  async function fetchCNPJ(){
    const cnpj=(form.cnpj||'').replace(/\D/g,'')
    if(cnpj.length!==14)return toast('CNPJ inválido (14 dígitos)','error')
    setCnpjLoading(true)
    try{
      const r=await fetch(`https://brasilapi.com.br/api/cnpj/v1/${cnpj}`)
      if(!r.ok)throw new Error()
      const d=await r.json()
      setForm(f=>({...f,
        razaoSocial:sanitize(d.razao_social)||f.razaoSocial,
        street:sanitize((d.logradouro||'').trim())||f.street,
        number:sanitize(d.numero)||f.number,
        complement:sanitize(d.complemento)||f.complement,
        city:sanitize(d.municipio)||f.city,
        state:sanitize(d.uf)||f.state,
        cep:(d.cep||'').replace(/\D/g,'')||f.cep,
      }))
      toast('Dados preenchidos via CNPJ ✓')
    }catch(e){logError('fetchCNPJ',e);toast('CNPJ não encontrado','error')}
    setCnpjLoading(false)
  }
  async function fetchCEP(cepVal){
    const cep=(cepVal||form.cep||'').replace(/\D/g,'')
    if(cep.length!==8)return
    setCepLoading(true)
    try{
      const r=await fetch(`https://viacep.com.br/ws/${cep}/json/`)
      const d=await r.json()
      if(d.erro)throw new Error()
      setForm(f=>({...f,street:sanitize(d.logradouro)||f.street,city:sanitize(d.localidade)||f.city,state:sanitize(d.uf)||f.state,complement:sanitize(d.complemento)||f.complement}))
    }catch(e){logError('fetchCEP',e)}
    setCepLoading(false)
  }
  function openAdd(){
    setForm({name:'',value:'',dueDay:'',startDate:'',duration:'12',endDate:'',contractNote:'',phone:'',email:'',permuteValue:'',permuteAccumulates:true,razaoSocial:'',cnpj:'',cep:'',street:'',number:'',complement:'',city:'',state:'',status:'ativo',services:[],contractUrl:'',proposalUrl:''})
    setFormTab('dados');setModal('add')
  }
  function openEdit(c){setForm({...c,services:c.services||[]});setFormTab('dados');setModal(c)}
  function save(){
    if(!form.name||!form.value)return toast('Preencha nome e valor','error')
    const item={...form,value:parseFloat(form.value)||0,dueDay:parseInt(form.dueDay)||1,duration:parseInt(form.duration)||12,endDate:computeEnd(form.startDate,form.duration),permuteValue:parseFloat(form.permuteValue)||0,services:form.services||[]}
    if(modal==='add')dispatch({type:'ADD_SETTING',payload:{key:'clients',item}})
    else dispatch({type:'UPDATE_SETTING',payload:{key:'clients',item}})
    toast('Salvo');setModal(null)
  }
  function del(id){dispatch({type:'DELETE_SETTING',payload:{key:'clients',id}});toast('Removido','warn')}
  function openGenModal(c){
    const t=new Date()
    setGenForm({fromDate:`${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-01`,numMonths:'12'})
    setGenModal({clientId:c.id,clientName:c.name,existingStart:c.startDate||''})
  }
  function confirmGenEntries(){
    if(!genModal)return
    dispatch({type:'GENERATE_CONTRACT_ENTRIES',payload:{clientId:genModal.clientId,fromDate:genForm.fromDate,numMonths:parseInt(genForm.numMonths)||12}})
    toast('Entradas geradas ✓')
    setGenModal(null)
  }
  function toggleStatus(c){
    const newStatus=c.status==='inativo'?'ativo':'inativo'
    dispatch({type:'UPDATE_SETTING',payload:{key:'clients',item:{...c,status:newStatus}}})
  }
  function toggleNF(entry,mk2){
    dispatch({type:'UPDATE_ENTRY',payload:{monthKey:mk2,entry:{...entry,nf:!entry.nf}}})
  }
  function addSvc(){if(!svcInput.trim())return;setForm(f=>({...f,services:[...(f.services||[]),svcInput.trim()]}));setSvcInput('')}
  function remSvc(i){setForm(f=>({...f,services:(f.services||[]).filter((_,idx)=>idx!==i)}))}

  const scMap={
    active:{label:'Ativo',c:'#10b981',b:'#10b98118'},
    expiring:{label:'Vencendo',c:'#f59e0b',b:'#f59e0b18'},
    expired:{label:'Vencido',c:'#ef4444',b:'#ef444418'},
    inativo:{label:'Inativo',c:'#64748b',b:'#64748b18'},
    no_contract:{label:'Ativo',c:'#10b981',b:'#10b98118'},
  }

  const filtered=filterStatus==='todos'?clients:clients.filter(c=>getCS(c)===filterStatus||(filterStatus==='ativo'&&getCS(c)==='no_contract'))
  const activeCount=clients.filter(c=>!['inativo','expired'].includes(getCS(c))).length
  const mrr=clients.filter(c=>c.status!=='inativo').reduce((s,c)=>s+(c.value||0),0)

  return(
    <div className="space-y-5">
      <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
        <SummaryCard label="Total" value={clients.length} color="#3b82f6" icon={Briefcase}/>
        <SummaryCard label="Ativos" value={activeCount} color="#10b981" icon={CheckCircle}/>
        <SummaryCard label="MRR" value={fmtBRL(mrr)} color="#10b981" icon={TrendingUp}/>
        <SummaryCard label="Vencendo (30d)" value={clients.filter(c=>getCS(c)==='expiring').length} color="#f59e0b" icon={AlertCircle}/>
      </div>
      <div className="flex items-center justify-between flex-wrap gap-3">
        <div className="flex gap-2 flex-wrap">
          {['todos','ativo','expiring','expired','inativo'].map(s=>(
            <button key={s} onClick={()=>setFilterStatus(s)} className="px-3 py-1 rounded-lg text-xs font-medium transition-all"
              style={{background:filterStatus===s?'#10b981':'var(--bg-overlay)',color:filterStatus===s?'#fff':'var(--text-3)',border:filterStatus===s?'1px solid #10b981':'1px solid var(--border)'}}>
              {s==='todos'?'Todos':s==='ativo'?'Ativos':s==='expiring'?'Vencendo':s==='expired'?'Vencidos':'Inativos'}
            </button>
          ))}
        </div>
        <button onClick={openAdd} className="flex items-center gap-1.5 px-4 py-2 text-sm font-medium rounded-xl" style={{background:'#10b981',color:'#fff'}}>
          <Plus size={14}/> Novo Cliente
        </button>
      </div>
      <div className="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-4">
        {filtered.map(c=>{
          const cs=getCS(c),sc=scMap[cs]||scMap.active
          const dl=getDaysLeft(c.endDate)
          const hist=getPayHistory(c)
          const received=hist.filter(e=>e.status==='Recebido').length
          return(
            <div key={c.id} className="rounded-2xl p-4 space-y-3" style={{background:'var(--bg-card)',border:`1px solid ${cs==='expiring'||cs==='expired'?sc.c+'50':'var(--border)'}`}}>
              <div className="flex items-start justify-between gap-2">
                <div className="flex-1 min-w-0">
                  <div className="font-semibold text-sm truncate" style={{color:'var(--text)'}}>{c.name}</div>
                  {c.razaoSocial&&<div className="text-xs truncate mt-0.5" style={{color:'var(--text-3)'}}>{c.razaoSocial}</div>}
                  <div className="text-lg font-bold mt-1" style={{color:'#10b981',fontVariantNumeric:'tabular-nums'}}>{fmtBRL(c.value)}<span className="text-xs font-normal ml-1" style={{color:'var(--text-3)'}}>/ mês</span></div>
                  {c.permuteValue>0&&<div className="text-xs mt-0.5" style={{color:'#a78bfa'}}>+ {fmtBRL(c.permuteValue)} permuta</div>}
                </div>
                <div className="flex flex-col items-end gap-1.5">
                  <button onClick={()=>toggleStatus(c)} className="text-xs font-semibold px-2 py-0.5 rounded-full transition-all" style={{background:sc.b,color:sc.c,border:`1px solid ${sc.c}40`}}>{sc.label}</button>
                  {c.city&&<span className="text-xs" style={{color:'var(--text-3)'}}>{c.city}{c.state&&`, ${c.state}`}</span>}
                </div>
              </div>
              {c.startDate&&(
                <div className="space-y-1.5">
                  <div className="flex items-center gap-1.5 text-xs" style={{color:'var(--text-3)'}}>
                    <CalendarCheck size={11}/><span>Início {c.startDate.split('-').reverse().join('/')} · {c.duration}m</span>
                    {c.endDate&&<span style={{color:dl!==null&&dl<=30?sc.c:'inherit'}}>· Vence {c.endDate.split('-').reverse().join('/')}{dl!==null&&dl<=30&&(dl>=0?` (${dl}d)`:'(vencido)')}</span>}
                  </div>
                  {hist.length>0&&(
                    <div>
                      <div className="flex justify-between text-xs mb-0.5" style={{color:'var(--text-3)'}}><span>Recebimentos</span><span>{received}/{hist.length}</span></div>
                      <div className="h-1.5 rounded-full overflow-hidden" style={{background:'var(--bg-overlay)'}}><div className="h-full rounded-full" style={{width:`${hist.length>0?(received/hist.length)*100:0}%`,background:'#10b981'}}/></div>
                    </div>
                  )}
                </div>
              )}
              {c.services?.length>0&&(
                <div className="flex flex-wrap gap-1">
                  {c.services.map((s,i)=><span key={i} className="text-xs px-2 py-0.5 rounded-full" style={{background:'var(--bg-overlay)',color:'var(--text-3)',border:'1px solid var(--border-s)'}}>{s}</span>)}
                </div>
              )}
              {(c.phone||c.email)&&<div className="flex flex-wrap gap-3 text-xs" style={{color:'var(--text-3)'}}>
                {c.phone&&<span className="flex items-center gap-1"><Phone size={11}/>{c.phone}</span>}
                {c.email&&<span className="flex items-center gap-1 truncate"><Mail size={11}/>{c.email}</span>}
              </div>}
              <div className="flex items-center gap-2 pt-1 flex-wrap">
                <button onClick={()=>openEdit(c)} className="flex items-center gap-1 text-xs px-2.5 py-1 rounded-lg" style={{background:'var(--bg-overlay)',color:'var(--text-3)'}}><Pencil size={11}/> Editar</button>
                <button onClick={()=>setHistModal(c)} className="flex items-center gap-1 text-xs px-2.5 py-1 rounded-lg" style={{background:'var(--bg-overlay)',color:'var(--text-3)'}}><FileText size={11}/> Histórico</button>
                <button onClick={()=>openGenModal(c)} className="flex items-center gap-1 text-xs px-2.5 py-1 rounded-lg" style={{background:'#10b98118',color:'#10b981',border:'1px solid #10b98130'}}><CalendarCheck size={11}/> Gerar meses</button>
                <button onClick={()=>del(c.id)} className="ml-auto text-xs px-2 py-1 rounded-lg" style={{background:'#ef444418',color:'#ef4444'}}><Trash2 size={11}/></button>
              </div>
            </div>
          )
        })}
        {filtered.length===0&&<div className="col-span-full py-12 text-center text-sm" style={{color:'var(--text-3)'}}>Nenhum cliente encontrado</div>}
      </div>

      {/* Modal histórico de pagamentos */}
      {histModal&&(()=>{
        const hist=getPayHistory(histModal)
        const curMk2=monthKey(new Date().getFullYear(),new Date().getMonth()+1)
        const pendingCount=hist.filter(e=>e.status!=='Recebido').length
        return(
          <Modal title={`Histórico — ${histModal.name}`} onClose={()=>setHistModal(null)} wide>
            <div className="space-y-3">
              {hist.length===0&&<p className="text-sm text-center py-6" style={{color:'var(--text-3)'}}>Nenhum lançamento encontrado</p>}
              {pendingCount>0&&(
                <button onClick={()=>markAllPaid(hist)} className="w-full flex items-center justify-center gap-1.5 py-2 rounded-xl text-sm font-medium" style={{background:'#10b98118',color:'#10b981',border:'1px solid #10b98130'}}>
                  <Check size={14}/> Marcar todas as {pendingCount} pendente{pendingCount>1?'s':''} como paga{pendingCount>1?'s':''}
                </button>
              )}
              <div className="rounded-xl overflow-hidden" style={{border:'1px solid var(--border)'}}>
                <table className="w-full text-sm">
                  <thead style={{background:'var(--bg-overlay)'}}><tr>
                    <th className="px-3 py-2 text-left text-xs font-semibold" style={{color:'var(--text-3)'}}>Mês</th>
                    <th className="px-3 py-2 text-right text-xs font-semibold" style={{color:'var(--text-3)'}}>Previsto</th>
                    <th className="px-3 py-2 text-right text-xs font-semibold" style={{color:'var(--text-3)'}}>Recebido</th>
                    <th className="px-3 py-2 text-center text-xs font-semibold" style={{color:'var(--text-3)'}}>Status</th>
                    <th className="px-3 py-2 text-center text-xs font-semibold" style={{color:'var(--text-3)'}}>NF</th>
                    <th className="px-3 py-2 text-center text-xs font-semibold" style={{color:'var(--text-3)'}}>Ação</th>
                  </tr></thead>
                  <tbody>{hist.map((e,i)=>{
                    const{year:y,month:m}=parseMonthKey(e.mk)
                    const isPast=e.mk<curMk2
                    const isPaid=e.status==='Recebido'
                    return(
                      <tr key={e.id} style={{borderTop:'1px solid var(--sep)',background:(!isPaid&&isPast)?'rgba(239,68,68,0.04)':i%2===0?'transparent':'var(--row-alt)'}}>
                        <td className="px-3 py-2" style={{color:'var(--text-2)'}}>{MONTH_NAMES[m-1].slice(0,3)} {y}{!isPaid&&isPast&&<span className="ml-1.5 text-xs" style={{color:'#ef4444'}}>atrasado</span>}</td>
                        <td className="px-3 py-2 text-right font-mono text-xs" style={{color:'var(--text-2)'}}>{fmtBRL(e.expectedValue||0)}</td>
                        <td className="px-3 py-2 text-right font-mono text-xs" style={{color:isPaid?'#10b981':'var(--text-3)'}}>{isPaid?fmtBRL(e.realValue||0):'—'}</td>
                        <td className="px-3 py-2 text-center"><span className="text-xs px-2 py-0.5 rounded-full" style={{background:isPaid?'#10b98118':isPast?'#ef444418':'#64748b18',color:isPaid?'#10b981':isPast?'#ef4444':'#64748b'}}>{e.status}</span></td>
                        <td className="px-3 py-2 text-center"><button onClick={()=>toggleNF(e,e.mk)} className="w-5 h-5 rounded flex items-center justify-center mx-auto transition-all" style={{background:e.nf?'#10b98130':'var(--bg-overlay)',border:`1px solid ${e.nf?'#10b981':'var(--border)'}`,color:e.nf?'#10b981':'var(--text-4)'}}>{e.nf&&<Check size={11}/>}</button></td>
                        <td className="px-3 py-2 text-center">
                          <button onClick={()=>togglePaid(e)} className="text-xs px-2 py-0.5 rounded-lg transition-all" style={{background:isPaid?'#64748b18':'#10b98118',color:isPaid?'#64748b':'#10b981',border:`1px solid ${isPaid?'#64748b30':'#10b98130'}`}}>
                            {isPaid?'↩ Desfazer':'✓ Pago'}
                          </button>
                        </td>
                      </tr>
                    )
                  })}</tbody>
                </table>
              </div>
            </div>
          </Modal>
        )
      })()}

      {/* Modal gerar entradas */}
      {genModal&&(
        <Modal title={`Gerar entradas — ${genModal.clientName}`} onClose={()=>setGenModal(null)}>
          <div className="space-y-4">
            {genModal.existingStart&&<p className="text-xs px-3 py-2 rounded-lg" style={{background:'#3b82f618',color:'#3b82f6',border:'1px solid #3b82f630'}}>Contrato iniciou em {genModal.existingStart.split('-').reverse().join('/')}</p>}
            <div className="space-y-3">
              <Fld label="Gerar a partir de (mês/ano)">
                <Inp2 type="month" value={genForm.fromDate?genForm.fromDate.slice(0,7):''} onChange={v=>setGenForm(f=>({...f,fromDate:v?v+'-01':''}))}/>

              </Fld>
              <Fld label="Quantos meses gerar?">
                <select value={genForm.numMonths} onChange={e=>setGenForm(f=>({...f,numMonths:e.target.value}))} style={{background:'var(--bg-input)',border:'1px solid var(--border)',borderRadius:10,padding:'8px 12px',color:'var(--text)',fontSize:14,width:'100%',outline:'none'}}>
                  {[3,6,12,18,24].map(n=><option key={n} value={n}>{n} meses</option>)}

            <p className="text-xs" style={{color:'var(--text-4)'}}>Apenas cria entradas nos meses que ainda não têm lançamento deste cliente. Não duplica.</p>
            <div className="flex justify-end gap-2 pt-2 border-t" style={{borderColor:'var(--sep)'}}>
              <BtnG onClick={()=>setGenModal(null)}>Cancelar</BtnG>
              <Btn onClick={confirmGenEntries}><CalendarCheck size={14}/> Gerar</Btn>
            </div>
          </div>
        </Modal>
      )}
      {/* Modal cadastro/edição */}
      {modal&&(
        <Modal title={modal==='add'?'Novo Cliente':`${form.name||'Editar'}`} onClose={()=>setModal(null)} wide>
          <div className="space-y-4">
            <div className="flex gap-1 p-1 rounded-xl" style={{background:'var(--bg-overlay)'}}>
              {['dados','endereco','contrato'].map(t=>(
                <button key={t} onClick={()=>setFormTab(t)} className="flex-1 py-1.5 rounded-lg text-xs font-medium transition-all"
                  style={{background:formTab===t?'var(--bg-card)':'transparent',color:formTab===t?'var(--text)':'var(--text-3)',boxShadow:formTab===t?'0 1px 4px rgba(0,0,0,0.2)':'none'}}>
                  {t==='dados'?'Dados':t==='endereco'?'Endereço & Serviços':'Contrato & Docs'}
                </button>
              ))}
            </div>
            {formTab==='dados'&&(
              <div className="space-y-3">
                <div className="grid grid-cols-2 gap-3">
                  <Fld label="Nome fantasia *"><Inp2 value={form.name} onChange={v=>setForm(f=>({...f,name:v}))} placeholder="Ex: Empresa ABC"/></Fld>
                  <Fld label="Status">
                    <div className="flex gap-2 mt-1">
                      {['ativo','inativo'].map(s=>(
                        <button key={s} onClick={()=>setForm(f=>({...f,status:s}))} className="flex-1 py-2 rounded-xl text-xs font-medium transition-all"
                          style={{background:(form.status||'ativo')===s?s==='ativo'?'#10b98130':'#64748b30':'var(--bg-overlay)',color:(form.status||'ativo')===s?s==='ativo'?'#10b981':'#94a3b8':'var(--text-3)',border:`1px solid ${(form.status||'ativo')===s?s==='ativo'?'#10b981':'#64748b':'var(--border)'}`}}>
                          {s==='ativo'?'Ativo':'Inativo'}
                        </button>
                      ))}
                    </div>
                  </Fld>
                </div>
                <Fld label="Razão Social"><Inp2 value={form.razaoSocial} onChange={v=>setForm(f=>({...f,razaoSocial:v}))} placeholder="Ex: Empresa ABC Ltda"/></Fld>
                <div className="flex gap-2">
                  <div className="flex-1"><Fld label="CNPJ"><Inp2 value={form.cnpj} onChange={v=>setForm(f=>({...f,cnpj:v}))} placeholder="00.000.000/0001-00"/></Fld></div>
                  <div className="flex items-end pb-0.5"><button onClick={fetchCNPJ} disabled={cnpjLoading} className="px-3 py-2 rounded-xl text-xs font-medium" style={{background:'#3b82f630',color:'#3b82f6',border:'1px solid #3b82f640',opacity:cnpjLoading?0.5:1}}>{cnpjLoading?'..':'Buscar'}</button></div>
                </div>
                <div className="grid grid-cols-2 gap-3">
                  <Fld label="Valor mensal (R$) *"><Inp2 type="number" value={form.value} onChange={v=>setForm(f=>({...f,value:v}))} placeholder="0,00"/></Fld>
                  <Fld label="Dia de pagamento"><Inp2 type="number" value={form.dueDay} onChange={v=>setForm(f=>({...f,dueDay:v}))} placeholder="10"/></Fld>
                </div>
                <div className="grid grid-cols-2 gap-3">
                  <Fld label="Telefone"><Inp2 value={form.phone} onChange={v=>setForm(f=>({...f,phone:v}))} placeholder="(11) 99999-9999"/></Fld>
                  <Fld label="E-mail"><Inp2 value={form.email} onChange={v=>setForm(f=>({...f,email:v}))} placeholder="contato@empresa.com"/></Fld>
                </div>
                <Fld label="Valor permuta/mês (R$)">
                  <Inp2 type="number" value={form.permuteValue} onChange={v=>setForm(f=>({...f,permuteValue:v}))} placeholder="0,00"/>
                  <p className="text-xs mt-1" style={{color:'var(--text-4)'}}>Deixe 0 se não houver permuta</p>
                </Fld>
                {parseFloat(form.permuteValue)>0&&(
                  <Fld label="Acumula saldo não consumido?">
                    <div className="flex gap-2 mt-1">
                      {[{v:true,l:'✅ Sim, acumula pro próximo mês'},{v:false,l:'❌ Não acumula (perde se não usar)'}].map(opt=>(
                        <button key={opt.l} onClick={()=>setForm(f=>({...f,permuteAccumulates:opt.v}))} className="flex-1 px-3 py-2 rounded-xl text-xs font-medium transition-all" style={{background:form.permuteAccumulates===opt.v?'#a78bfa22':'var(--bg-overlay)',border:`1px solid ${form.permuteAccumulates===opt.v?'#a78bfa':'var(--border)'}`,color:form.permuteAccumulates===opt.v?'#a78bfa':'var(--text-3)'}}>{opt.l}</button>
                      ))}
                    </div>
                  </Fld>
                )}
              </div>
            )}
            {formTab==='endereco'&&(
              <div className="space-y-3">
                <div className="flex gap-2">
                  <div className="flex-1"><Fld label="CEP"><Inp2 value={form.cep} onChange={v=>{setForm(f=>({...f,cep:v}));if((v||'').replace(/\D/g,'').length===8)fetchCEP(v)}} placeholder="00000-000"/></Fld></div>
                  <div className="flex items-end pb-0.5"><span className="px-3 py-2 text-xs" style={{color:'var(--text-4)'}}>{cepLoading?'Buscando...':'Auto'}</span></div>
                </div>
                <Fld label="Logradouro"><Inp2 value={form.street} onChange={v=>setForm(f=>({...f,street:v}))} placeholder="Rua, Av..."/></Fld>
                <div className="grid grid-cols-3 gap-3">
                  <Fld label="Número"><Inp2 value={form.number} onChange={v=>setForm(f=>({...f,number:v}))} placeholder="123"/></Fld>
                  <div className="col-span-2"><Fld label="Complemento"><Inp2 value={form.complement} onChange={v=>setForm(f=>({...f,complement:v}))} placeholder="Sala 10"/></Fld></div>
                </div>
                <div className="grid grid-cols-3 gap-3">
                  <div className="col-span-2"><Fld label="Cidade"><Inp2 value={form.city} onChange={v=>setForm(f=>({...f,city:v}))} placeholder="São Paulo"/></Fld></div>
                  <Fld label="Estado"><Inp2 value={form.state} onChange={v=>setForm(f=>({...f,state:v}))} placeholder="SP"/></Fld>
                </div>
                <div className="border-t pt-3" style={{borderColor:'var(--sep)'}}>
                  <p className="text-xs font-semibold mb-2" style={{color:'var(--text-2)'}}>Serviços contratados</p>
                  <div className="flex gap-2 mb-2">
                    <input value={svcInput} onChange={e=>setSvcInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'){e.preventDefault();addSvc()}}} placeholder="Ex: Social Media..." style={{...inputSt,flex:1}}/>
                    <button onClick={addSvc} className="px-3 py-2 rounded-xl text-xs font-medium" style={{background:'#10b98130',color:'#10b981',border:'1px solid #10b98140'}}>+ Add</button>
                  </div>
                  <div className="flex flex-wrap gap-1.5">
                    {(form.services||[]).map((s,i)=>(
                      <span key={i} className="flex items-center gap-1 text-xs px-2.5 py-1 rounded-full" style={{background:'var(--bg-overlay)',color:'var(--text-2)',border:'1px solid var(--border)'}}>
                        {s}<button onClick={()=>remSvc(i)} style={{color:'var(--text-4)'}}><X size={10}/></button>
                      </span>
                    ))}
                  </div>
                </div>
              </div>
            )}
            {formTab==='contrato'&&(
              <div className="space-y-3">
                <div className="grid grid-cols-2 gap-3">
                  <Fld label="Data de início">
                    <Inp2 type="date" value={form.startDate} onChange={v=>{const e=computeEnd(v,form.duration);setForm(f=>({...f,startDate:v,endDate:e}))}}/>
                  </Fld>
                  <Fld label="Duração">
                    <Sel2 value={String(form.duration||'12')} onChange={v=>{const e=computeEnd(form.startDate,v);setForm(f=>({...f,duration:v,endDate:e}))}} opts={[{v:'3',l:'3 meses'},{v:'6',l:'6 meses'},{v:'12',l:'12 meses'},{v:'18',l:'18 meses'},{v:'24',l:'24 meses'}]}/>
                  </Fld>
                </div>
                {form.endDate&&<p className="text-xs" style={{color:'var(--text-3)'}}>Término previsto: {form.endDate.split('-').reverse().join('/')}</p>}
                <Fld label="Link do contrato assinado (Google Drive)">
                  <Inp2 value={form.contractUrl} onChange={v=>setForm(f=>({...f,contractUrl:v}))} placeholder="https://drive.google.com/..."/>
                </Fld>
                <Fld label="Link da proposta aceita (Google Drive)">
                  <Inp2 value={form.proposalUrl} onChange={v=>setForm(f=>({...f,proposalUrl:v}))} placeholder="https://drive.google.com/..."/>
                </Fld>
                <Fld label="Observações">
                  <Inp2 value={form.contractNote} onChange={v=>setForm(f=>({...f,contractNote:v}))} placeholder="Notas adicionais..."/>
                </Fld>
                {modal!=='add'&&(
                  <button onClick={()=>{openGenModal({id:modal?.id||form.id,name:form.name,startDate:form.startDate});setModal(null)}} className="w-full flex items-center justify-center gap-1.5 py-2 rounded-xl text-sm font-medium" style={{background:'#10b98120',color:'#10b981',border:'1px solid #10b98130'}}>
                    <CalendarCheck size={14}/> Gerar entradas para os próximos meses
                  </button>
                )}
              </div>
            )}
            <div className="flex justify-end gap-2 pt-2 border-t" style={{borderColor:'var(--sep)'}}>
              <BtnG onClick={()=>setModal(null)}>Cancelar</BtnG>
              <Btn onClick={save}><Save size={14}/> Salvar</Btn>
            </div>
          </div>
        </Modal>
      )}
    </div>
  )
}

// ─── PERMUTA ──────────────────────────────────────────────────────────────────
function PermutaPage({state,dispatch,toast}){
  const clients=(state.settings?.clients||[]).filter(c=>c.permuteValue>0)
  const usages=state.settings?.permuteUsages||[]
  const [modal,setModal]=useState(null) // null | {clientId, type:'use'|'sale'}
  const [form,setForm]=useState({})
  const todayStr=new Date().toISOString().slice(0,10)
  const curMk=monthKey(new Date().getFullYear(),new Date().getMonth()+1)

  function getBalance(c){
    const earned=Object.entries(state.months||{}).reduce((sum,[mk2,month])=>{
      if(mk2<'2026-03')return sum
      const e=(month.entries||[]).find(en=>(en.clientId===c.id||en.client===c.name)&&en.status==='Recebido')
      return sum+(e?(c.permuteValue||0):0)
    },0)
    const used=usages.filter(u=>u.clientId===c.id).reduce((s,u)=>s+u.value,0)
    return{earned,used,balance:earned-used}
  }

  function openModal(clientId,type){
    setForm({clientId,clientName:(state.settings.clients.find(c=>c.id===clientId)||{}).name||'',person:'',description:'',value:'',date:todayStr,monthKey:curMk,type})
    setModal({clientId,type})
  }

  function save(){
    if(!form.value||!form.description)return toast('Preencha descrição e valor','error')
    const usage={clientId:form.clientId,clientName:form.clientName,person:form.person,description:form.description,value:parseFloat(form.value)||0,date:form.date,monthKey:form.monthKey,type:form.type}
    if(form.type==='sale'){
      const entry={client:`Venda Permuta — ${form.clientName}`,dueDay:new Date(form.date).getDate(),expectedValue:parseFloat(form.value)||0,note:`Permuta vendida para: ${form.person||'—'}`}
      dispatch({type:'SELL_PERMUTE',payload:{usage,entry,entryMonthKey:form.monthKey}})
      toast('Permuta vendida! Entrada criada no mês ✓')
    }else{
      dispatch({type:'ADD_PERMUTE_USAGE',payload:{usage}})
      toast('Uso registrado ✓')
    }
    setModal(null)
  }

  const inputSt={background:'var(--bg)',border:'1px solid var(--border)',borderRadius:8,padding:'8px 12px',color:'var(--text)',fontSize:14,width:'100%',outline:'none'}
  const Inp2=({value,onChange,type='text',placeholder})=><input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={inputSt}/>
  const Fld=({label,children})=><div><label className="block text-xs text-slate-400 mb-1">{label}</label>{children}</div>

  const totalPermuta=clients.reduce((s,c)=>s+(c.permuteValue||0),0)
  const totalUsed=usages.reduce((s,u)=>s+u.value,0)
  const totalSales=usages.filter(u=>u.type==='sale').reduce((s,u)=>s+u.value,0)

  // Gerar opções de meses disponíveis (últimos 6 + próximos 6)
  const monthOpts=Array.from({length:12},(_,i)=>{
    const d=new Date();d.setMonth(d.getMonth()-6+i)
    const mk2=monthKey(d.getFullYear(),d.getMonth()+1)
    return{v:mk2,l:`${MONTH_NAMES[d.getMonth()]}/${d.getFullYear()}`}
  })

  return(
    <div className="space-y-6">
      {/* KPIs */}
      <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
        <SummaryCard label="Permuta/mês em carteira" value={fmtBRL(totalPermuta)} color="#a78bfa" icon={ArrowLeftRight}/>
        <SummaryCard label="Total consumido" value={fmtBRL(totalUsed)} color="#f59e0b" icon={ShoppingBag}/>
        <SummaryCard label="Vendas em dinheiro" value={fmtBRL(totalSales)} color="#10b981" icon={DollarSign}/>
      </div>

      {/* Cards por cliente */}
      {clients.length===0?(
        <div className="rounded-2xl p-8 text-center text-slate-500" style={{background:'var(--bg-card)',border:'1px solid var(--border)'}}>
          <ArrowLeftRight size={32} className="mx-auto mb-3 opacity-30"/>
          <p className="text-sm">Nenhum cliente com permuta cadastrado.</p>
          <p className="text-xs mt-1">Edite um cliente e adicione um valor em "Permuta por mês".</p>
        </div>
      ):(
        <div className="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-4">
          {clients.map(c=>{
            const{earned,used,balance}=getBalance(c)
            const pct=earned>0?Math.min((used/earned)*100,100):0
            const neg=balance<0
            return(
              <div key={c.id} className="rounded-2xl p-5 space-y-3" style={{background:'var(--bg-card)',border:`1px solid ${neg?'#ef444440':'rgba(255,255,255,0.07)'}`}}>
                <div className="flex items-start justify-between">
                  <div>
                    <div className="font-semibold text-slate-100">{c.name}</div>

                  <span className="text-xs font-bold px-2 py-0.5 rounded-full" style={{background:neg?'#ef444420':balance===0?'#f59e0b20':'#10b98120',color:neg?'#ef4444':balance===0?'#f59e0b':'#10b981'}}>

                  <div className="flex justify-between font-semibold"><span className="text-slate-300">Saldo</span><span style={{color:neg?'#ef4444':'#10b981'}}>{fmtBRL(balance)}</span></div>
                  <div className="h-1.5 rounded-full overflow-hidden mt-2" style={{background:'var(--bg-overlay)'}}>

              <tbody>{[...usages].sort((a,b)=>b.date.localeCompare(a.date)).map(u=>(

// ─── TAREFAS ──────────────────────────────────────────────────────────────────
function TasksPage({state,dispatch,toast}){
  const tasks=state.tasks||[]
  const clients=state.settings?.clients||[]
  const [filterAssignee,setFilterAssignee]=useState('todos')
  const [filterPriority,setFilterPriority]=useState('todos')
  const [modal,setModal]=useState(null)
  const [form,setForm]=useState({})
  const [dragging,setDragging]=useState(null)

  const COLUMNS=[
    {id:'todo',label:'A Fazer',color:'#64748b',bg:'#64748b15'},
    {id:'doing',label:'Em Andamento',color:'#3b82f6',bg:'#3b82f615'},
    {id:'done',label:'Concluído',color:'#10b981',bg:'#10b98115'},
  ]
  const PRIORITIES={high:{label:'Alta',c:'#ef4444',b:'#ef444420'},medium:{label:'Média',c:'#f59e0b',b:'#f59e0b20'},low:{label:'Baixa',c:'#64748b',b:'#64748b20'}}
  const ASSIGNEES=[{v:'todos',l:'Todos'},{v:'fabiano',l:'Fabiano'},{v:'mainara',l:'Mainara'},{v:'',l:'Sem responsável'}]

  const filtered=tasks.filter(t=>{
    if(filterAssignee!=='todos'&&t.assignee!==filterAssignee)return false
    if(filterPriority!=='todos'&&t.priority!==filterPriority)return false
    return true
  })

  function openAdd(status='todo'){
    setForm({title:'',description:'',assignee:'',priority:'medium',dueDate:'',relatedClientId:'',status})
    setModal('add')
  }
  function openEdit(t){setForm({...t});setModal(t)}
  function save(){
    if(!form.title)return toast('Digite o título da tarefa','error')
    if(modal==='add')dispatch({type:'ADD_TASK',payload:{task:{...form}}})
    else dispatch({type:'UPDATE_TASK',payload:{task:{...form}}})
    toast('Salvo');setModal(null)
  }
  function del(id){dispatch({type:'DELETE_TASK',payload:{id}});toast('Removido','warn')}
  function moveTask(taskId,newStatus){
    const t=tasks.find(x=>x.id===taskId)
    if(t)dispatch({type:'UPDATE_TASK',payload:{task:{...t,status:newStatus}}})
  }

  const todoCount=tasks.filter(t=>t.status!=='done').length

  const inputSt={background:'var(--bg)',border:'1px solid var(--border)',borderRadius:8,padding:'8px 12px',color:'var(--text)',fontSize:14,width:'100%',outline:'none'}
  const Inp2=({value,onChange,type='text',placeholder})=><input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={inputSt}/>
  const Sel2=({value,onChange,opts})=><select value={value} onChange={e=>onChange(e.target.value)} style={inputSt}>{opts.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}</select>
  const Fld=({label,children})=><div><label className="block text-xs text-slate-400 mb-1">{label}</label>{children}</div>

  return(
    <div className="space-y-4">
      {/* Filtros + botão */}
      <div className="flex flex-wrap items-center gap-3 justify-between">
        <div className="flex flex-wrap gap-2">
          {/* Filtro responsável */}
          {ASSIGNEES.map(a=>(
            <button key={a.v} onClick={()=>setFilterAssignee(a.v)}
              className="px-3 py-1.5 text-xs rounded-lg transition-all"
              style={{background:filterAssignee===a.v?'#3b82f6':'var(--bg-overlay)',color:filterAssignee===a.v?'#fff':'var(--text-3)',fontWeight:filterAssignee===a.v?600:400}}>
              {a.l}
            </button>
          ))}
          <div className="w-px bg-slate-700 mx-1"/>
          {/* Filtro prioridade */}
          {[{v:'todos',l:'Todas'},{v:'high',l:'Alta'},{v:'medium',l:'Média'},{v:'low',l:'Baixa'}].map(p=>(
            <button key={p.v} onClick={()=>setFilterPriority(p.v)}
              className="px-3 py-1.5 text-xs rounded-lg transition-all"
              style={{background:filterPriority===p.v?(PRIORITIES[p.v]?.b||'#3b82f615'):'var(--bg-overlay)',color:filterPriority===p.v?(PRIORITIES[p.v]?.c||'#3b82f6'):'var(--text-3)',fontWeight:filterPriority===p.v?600:400}}>
              {p.l}
            </button>
          ))}
        </div>
        <button onClick={()=>openAdd()} className="flex items-center gap-1.5 px-4 py-2 text-sm font-medium rounded-lg whitespace-nowrap" style={{background:'#10b981',color:'#fff'}}>
          <Plus size={14}/> Nova Tarefa
        </button>
      </div>

      {/* Kanban */}
      <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
        {COLUMNS.map(col=>{
          const colTasks=filtered.filter(t=>t.status===col.id)
          return(
            <div key={col.id} className="rounded-xl flex flex-col min-h-[300px]"
              style={{background:col.bg,border:`1px solid ${col.color}30`}}
              onDragOver={e=>{e.preventDefault()}}
              onDrop={e=>{e.preventDefault();if(dragging)moveTask(dragging,col.id);setDragging(null)}}>
              {/* Header coluna */}
              <div className="flex items-center justify-between px-4 py-3 border-b" style={{borderColor:col.color+'30'}}>
                <div className="flex items-center gap-2">
                  <div className="w-2 h-2 rounded-full" style={{background:col.color}}/>
                  <span className="text-sm font-semibold" style={{color:col.color}}>{col.label}</span>
                  <span className="text-xs px-1.5 py-0.5 rounded-full" style={{background:col.color+'20',color:col.color}}>{colTasks.length}</span>
                </div>
                <button onClick={()=>openAdd(col.id)} className="text-slate-500 hover:text-slate-300 transition-colors" title="Adicionar nesta coluna">
                  <Plus size={14}/>
                </button>
              </div>
              {/* Cards */}
              <div className="flex-1 p-3 space-y-2">
                {colTasks.map(t=>{
                  const pr=PRIORITIES[t.priority||'medium']
                  const relClient=clients.find(c=>c.id===t.relatedClientId)
                  const overdue=t.dueDate&&new Date(t.dueDate+'T23:59:59')<new Date()&&t.status!=='done'
                  return(
                    <div key={t.id} draggable onDragStart={()=>setDragging(t.id)} onDragEnd={()=>setDragging(null)}
                      className="rounded-lg p-3 space-y-2 cursor-grab active:cursor-grabbing"
                      style={{background:'var(--bg-card)',border:`1px solid ${overdue?'#ef444440':'rgba(255,255,255,0.07)'}`,opacity:dragging===t.id?0.5:1}}>
                      {/* Prioridade + título */}
                      <div className="flex items-start justify-between gap-2">
                        <span className="text-xs px-1.5 py-0.5 rounded" style={{background:pr.b,color:pr.c,whiteSpace:'nowrap'}}>{pr.label}</span>
                        {t.assignee&&<span className="text-xs text-slate-500 shrink-0">{t.assignee==='fabiano'?'👨‍💼 Fab':'👩‍💼 Mai'}</span>}
                      </div>
                      <div className="text-sm font-medium text-slate-100 leading-snug">{t.title}</div>
                      {t.description&&<div className="text-xs text-slate-500 leading-relaxed line-clamp-2">{t.description}</div>}
                      {/* Rodapé */}
                      <div className="flex items-center justify-between pt-1">
                        <div className="flex items-center gap-2">
                          {t.dueDate&&<span className="text-xs flex items-center gap-1" style={{color:overdue?'#ef4444':'#64748b'}}>
                            <Clock size={10}/>{t.dueDate.split('-').reverse().join('/')}
                          </span>}
                          {relClient&&<span className="text-xs text-slate-600 flex items-center gap-1"><Briefcase size={10}/>{relClient.name}</span>}
                        </div>
                        <div className="flex gap-1">
                          <button onClick={()=>openEdit(t)} className="p-1 rounded text-slate-500 hover:text-slate-300 transition-colors"><Pencil size={11}/></button>
                          <button onClick={()=>del(t.id)} className="p-1 rounded text-slate-600 hover:text-red-400 transition-colors"><Trash2 size={11}/></button>
                        </div>
                      </div>
                    </div>
                  )
                })}
                {colTasks.length===0&&(
                  <div className="flex items-center justify-center h-20 text-xs text-slate-600 rounded-lg border border-dashed" style={{borderColor:col.color+'20'}}>
                    Arraste tarefas aqui
                  </div>
                )}
              </div>
            </div>
          )
        })}
      </div>

      {/* Modal */}
      {modal&&(
        <Modal title={modal==='add'?'Nova Tarefa':'Editar Tarefa'} onClose={()=>setModal(null)} wide>
          <div className="space-y-4">
            <div><label className="block text-xs text-slate-400 mb-1">Título *</label>
              <input value={form.title||''} onChange={e=>setForm(f=>({...f,title:e.target.value}))} placeholder="O que precisa ser feito?" style={inputSt}/>
            </div>
            <div><label className="block text-xs text-slate-400 mb-1">Descrição</label>
              <textarea value={form.description||''} onChange={e=>setForm(f=>({...f,description:e.target.value}))} placeholder="Detalhes opcionais..." rows={3} style={{...inputSt,resize:'vertical'}}/>
            </div>
            <div className="grid grid-cols-2 gap-3">
              <div><label className="block text-xs text-slate-400 mb-1">Responsável</label>
                <select value={form.assignee||''} onChange={e=>setForm(f=>({...f,assignee:e.target.value}))} style={inputSt}>
                  <option value="">Sem responsável</option><option value="fabiano">Fabiano</option><option value="mainara">Mainara</option>
                </select>
              </div>
              <div><label className="block text-xs text-slate-400 mb-1">Prioridade</label>
                <select value={form.priority||'medium'} onChange={e=>setForm(f=>({...f,priority:e.target.value}))} style={inputSt}>
                  <option value="high">🔴 Alta</option><option value="medium">🟡 Média</option><option value="low">🔵 Baixa</option>
                </select>
              </div>
            </div>
            <div className="grid grid-cols-2 gap-3">
              <div><label className="block text-xs text-slate-400 mb-1">Status</label>
                <select value={form.status||'todo'} onChange={e=>setForm(f=>({...f,status:e.target.value}))} style={inputSt}>
                  <option value="todo">A Fazer</option><option value="doing">Em Andamento</option><option value="done">Concluído</option>
                </select>
              </div>
              <div><label className="block text-xs text-slate-400 mb-1">Prazo</label>
                <input type="date" value={form.dueDate||''} onChange={e=>setForm(f=>({...f,dueDate:e.target.value}))} style={inputSt}/>
              </div>
            </div>
            <div><label className="block text-xs text-slate-400 mb-1">Cliente relacionado (opcional)</label>
              <select value={form.relatedClientId||''} onChange={e=>setForm(f=>({...f,relatedClientId:e.target.value}))} style={inputSt}>
                <option value="">Nenhum</option>
                {clients.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
              </select>
            </div>
            <div className="flex justify-end gap-2 pt-2">
              <button onClick={()=>setModal(null)} className="px-4 py-2 text-sm rounded-lg" style={{background:'var(--bg-input)',color:'var(--text-3)'}}>Cancelar</button>
              <button onClick={save} className="flex items-center gap-1.5 px-4 py-2 text-sm font-medium rounded-lg" style={{background:'#10b981',color:'#fff'}}><Save size={14}/> Salvar</button>
            </div>
          </div>
        </Modal>
      )}
    </div>
  )
}

// ─── CALENDÁRIO ───────────────────────────────────────────────────────────────
function CalendarPage({state,dispatch,monthKey:mk,toast}){
  const {year:curYear,month:curMonth}=parseMonthKey(mk)
  const [selDay,setSelDay]=useState(null)

  const monthData=state.months[mk]||{}
  const entries=monthData.entries||[]
  const exits=monthData.exits||[]
  const tasks=state.tasks||[]
  const clients=state.settings?.clients||[]
  const permuteUsages=state.settings?.permuteUsages||[]

  // Construir mapa dia → eventos
  const eventsByDay={}
  function addEv(day,ev){if(!day)return;if(!eventsByDay[day])eventsByDay[day]=[];eventsByDay[day].push(ev)}

  entries.forEach(e=>{
    const d=parseInt(e.dueDay||0)
    if(d)addEv(d,{type:'entry',color:'#10b981',label:e.client,value:e.expectedValue,status:e.status,id:e.id})
  })
  exits.forEach(e=>{
    const d=parseInt(e.day||0)
    if(d)addEv(d,{type:'exit',color:'#ef4444',label:e.name,value:e.expectedValue,status:e.status,id:e.id})
  })
  tasks.forEach(t=>{
    if(!t.dueDate)return
    const tp=parseMonthKey(t.dueDate.slice(0,7))
    if(tp.year===curYear&&tp.month===curMonth){
      const d=parseInt(t.dueDate.slice(8,10))
      addEv(d,{type:'task',color:t.status==='done'?'#10b981':t.priority==='high'?'#ef4444':'#3b82f6',label:t.title,status:t.status,id:t.id,assignee:t.assignee})
    }
  })
  clients.forEach(c=>{
    if(!c.endDate)return
    const ep=parseMonthKey(c.endDate.slice(0,7))
    if(ep.year===curYear&&ep.month===curMonth){
      const d=parseInt(c.endDate.slice(8,10))
      addEv(d,{type:'contract',color:'#f59e0b',label:`Vence: ${c.name}`,id:c.id})
    }
  })
  permuteUsages.forEach(u=>{
    if(!u.date)return
    const up=parseMonthKey(u.date.slice(0,7))
    if(up.year===curYear&&up.month===curMonth){
      const d=parseInt(u.date.slice(8,10))
      addEv(d,{type:'permuta',color:'#a78bfa',label:`${u.type==='sale'?'💰':'🛍'} ${u.clientName}`,value:u.value,id:u.id})
    }
  })

  // Grade do mês
  const firstDay=new Date(curYear,curMonth-1,1).getDay()
  const daysInMonth=new Date(curYear,curMonth,0).getDate()
  const todayObj=new Date()
  const isToday=(d)=>todayObj.getFullYear()===curYear&&todayObj.getMonth()+1===curMonth&&todayObj.getDate()===d

  const typeLabels={entry:'Entrada',exit:'Saída',task:'Tarefa',contract:'Contrato',permuta:'Permuta'}
  const DOW=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb']

  const selEvs=selDay?eventsByDay[selDay]||[]:[]

  return(
    <div className="space-y-4">
      {/* Legenda */}
      <div className="flex flex-wrap gap-3 text-xs">
        {[['#10b981','Entradas'],['#ef4444','Saídas'],['#3b82f6','Tarefas'],['#f59e0b','Contratos'],['#a78bfa','Permuta']].map(([c,l])=>(
          <span key={l} className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-full" style={{background:c}}/><span className="text-slate-400">{l}</span></span>
        ))}
      </div>

      <div className={`gap-4 ${selDay?'grid grid-cols-1 lg:grid-cols-3':'block'}`}>
        {/* Grade */}
        <div className={selDay?'lg:col-span-2':''}>
          <div className="rounded-2xl overflow-hidden" style={{background:'var(--bg-card)',border:'1px solid var(--border)'}}>
            {/* Cabeçalho dias da semana */}
            <div className="grid grid-cols-7 border-b" style={{borderColor:'var(--sep)'}}>
              {DOW.map(d=><div key={d} className="py-2 text-center text-xs font-semibold text-slate-500">{d}</div>)}
            </div>
            {/* Células */}
            <div className="grid grid-cols-7">
              {Array.from({length:firstDay}).map((_,i)=><div key={`e${i}`} className="min-h-[80px] border-r border-b" style={{borderColor:'var(--sep)'}}/>)}
              {Array.from({length:daysInMonth}).map((_,i)=>{
                const d=i+1
                const evs=eventsByDay[d]||[]
                const sel=selDay===d
                const today=isToday(d)
                return(
                  <div key={d} onClick={()=>setSelDay(sel?null:d)}
                    className="min-h-[80px] p-1.5 border-r border-b cursor-pointer transition-colors"
                    style={{borderColor:'var(--sep)',background:sel?'rgba(255,255,255,0.07)':today?'#10b98108':'transparent'}}>
                    <div className="flex items-center justify-between mb-1">
                      <span className="text-xs font-semibold flex items-center justify-center w-6 h-6 rounded-full"

const GOAL_CATEGORIES=['Reforma','Equipamento','Viagem','Ferramenta','Marketing','Outro']
const GOAL_PRIORITIES=['Alta','Média','Baixa']
const GOAL_STATUSES=['Ideia','Planejando','Comprometido','Concluído']
const GOAL_CAT_COLORS={Reforma:'#f59e0b',Equipamento:'#3b82f6',Viagem:'#06b6d4',Ferramenta:'#8b5cf6',Marketing:'#ec4899',Outro:'#94a3b8'}
const GOAL_PRI_COLORS={Alta:'#ef4444',Média:'#f59e0b',Baixa:'#10b981'}
const GOAL_STA_COLORS={Ideia:'#64748b',Planejando:'#3b82f6',Comprometido:'#f59e0b',Concluído:'#10b981'}

function GoalsPage({state,dispatch,toast}){
  const goals=state.settings?.goals||[]
  const [modal,setModal]=useState(null)
  const [expanded,setExpanded]=useState({})
  const [filterStatus,setFilterStatus]=useState('Todos')
  const [form,setForm]=useState({title:'',description:'',category:'Outro',estimatedCost:'',priority:'Média',status:'Ideia'})

  const emptyForm={title:'',description:'',category:'Outro',estimatedCost:'',priority:'Média',status:'Ideia'}

  function openNew(){setForm(emptyForm);setModal('new')}
  function openEdit(g){setForm({...g,estimatedCost:String(g.estimatedCost||'')});setModal('edit')}
  function save(){
    if(!form.title.trim())return toast('Informe o título do objetivo','error')
    const goal={...form,estimatedCost:parseFloat(String(form.estimatedCost).replace(',','.'))||0}
    if(modal==='new'){dispatch({type:'ADD_GOAL',payload:{goal}});toast('Objetivo adicionado ✓')}
    else{dispatch({type:'UPDATE_GOAL',payload:{goal}});toast('Objetivo atualizado ✓')}
    setModal(null)
  }
  function del(id){dispatch({type:'DELETE_GOAL',payload:{id}});toast('Removido','warn')}

  const filtered=filterStatus==='Todos'?goals:goals.filter(g=>g.status===filterStatus)
  const totalCost=goals.filter(g=>g.status!=='Concluído').reduce((s,g)=>s+(g.estimatedCost||0),0)
  const doneCost=goals.filter(g=>g.status==='Concluído').reduce((s,g)=>s+(g.estimatedCost||0),0)

  return(
    <div className="space-y-6">
      {/* KPIs */}
      <div className="grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-4 gap-3">
        <SummaryCard label="Total de objetivos" value={goals.length} color="#8b5cf6" icon={Target}/>
        <SummaryCard label="Concluídos" value={goals.filter(g=>g.status==='Concluído').length} color="#10b981" icon={CheckCircle}/>
        <SummaryCard label="Investimento estimado" value={fmtBRL(totalCost)} color="#f59e0b" icon={DollarSign}/>
        <SummaryCard label="Já investido" value={fmtBRL(doneCost)} color="#3b82f6" icon={TrendingUp}/>
      </div>

      {/* Filtros + Botão */}
      <div className="flex flex-wrap items-center gap-2 justify-between">
        <div className="flex gap-2 flex-wrap">
          {['Todos',...GOAL_STATUSES].map(s=>(
            <button key={s} onClick={()=>setFilterStatus(s)}
              className="px-3 py-1.5 rounded-lg text-xs font-medium transition-all"
              style={{background:filterStatus===s?'#10b981':'var(--bg-overlay)',color:filterStatus===s?'#fff':'var(--text-3)',border:filterStatus===s?'none':'1px solid var(--border)'}}>
              {s}
            </button>
          ))}
        </div>
        <Btn onClick={openNew}><Plus size={14}/> Novo Objetivo</Btn>
      </div>

      {/* Lista de objetivos */}
      {filtered.length===0?(
        <div className="rounded-2xl p-10 text-center text-slate-500" style={{background:'var(--bg-card)',border:'1px solid var(--border)'}}>
          <Target size={36} className="mx-auto mb-3 opacity-20"/>
          <p className="text-sm">Nenhum objetivo {filterStatus!=='Todos'?`com status "${filterStatus}"`:'cadastrado'}.</p>
          {filterStatus==='Todos'&&<p className="text-xs mt-1 text-slate-600">Comece adicionando um objetivo de negócio, equipamento ou viagem.</p>}
        </div>
      ):(
        <div className="space-y-3">
          {filtered.map(g=>{
            const isExp=expanded[g.id]
            const catColor=GOAL_CAT_COLORS[g.category]||'#94a3b8'
            const priColor=GOAL_PRI_COLORS[g.priority]||'#94a3b8'
            const staColor=GOAL_STA_COLORS[g.status]||'#64748b'
            const done=g.status==='Concluído'
            return(
              <div key={g.id} className="rounded-2xl overflow-hidden transition-all" style={{background:'var(--bg-card)',border:`1px solid ${done?'#10b98130':'rgba(255,255,255,0.07)'}`}}>
                <div className="flex items-center gap-3 p-4 cursor-pointer" onClick={()=>setExpanded(e=>({...e,[g.id]:!e[g.id]}))}>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 flex-wrap">
                      <span className={`font-semibold text-sm ${done?'line-through text-slate-500':'text-slate-100'}`}>{g.title}</span>
                      <span className="text-xs px-2 py-0.5 rounded-full font-medium" style={{background:catColor+'20',color:catColor}}>{g.category}</span>
                      <span className="text-xs px-2 py-0.5 rounded-full font-medium" style={{background:priColor+'20',color:priColor}}>{g.priority}</span>
                    </div>
                    <div className="flex items-center gap-3 mt-1">
                      <span className="text-xs px-2 py-0.5 rounded-full" style={{background:staColor+'20',color:staColor}}>{g.status}</span>
                      {g.estimatedCost>0&&<span className="text-xs text-slate-500">{fmtBRL(g.estimatedCost)}</span>}
                    </div>
                  </div>
                  <div className="flex items-center gap-2 shrink-0">
                    <button onClick={e=>{e.stopPropagation();openEdit(g)}} className="p-1.5 rounded-lg text-slate-500 hover:text-slate-300 hover:bg-slate-700 transition-colors"><Pencil size={13}/></button>
                    <button onClick={e=>{e.stopPropagation();del(g.id)}} className="p-1.5 rounded-lg text-slate-500 hover:text-red-400 hover:bg-slate-700 transition-colors"><Trash2 size={13}/></button>
                    <ChevronDown size={14} className="text-slate-500 transition-transform" style={{transform:isExp?'rotate(180deg)':'rotate(0deg)'}}/>
                  </div>
                </div>
                {isExp&&g.description&&(
                  <div className="px-4 pb-4 text-sm text-slate-400 border-t border-slate-700 pt-3">{g.description}</div>
                )}
              </div>
            )
          })}
        </div>
      )}

      {/* Modal */}
      {modal&&(
        <Modal title={modal==='new'?'Novo Objetivo':'Editar Objetivo'} onClose={()=>setModal(null)}>
          <div className="space-y-4">
            <Field label="Título"><Inp value={form.title} onChange={v=>setForm(f=>({...f,title:v}))} placeholder="Ex: Notebook novo para edição"/></Field>
            <Field label="Descrição (opcional)">
              <textarea value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} placeholder="Detalhes, motivação, links..." rows={3}

            </Field>
            <div className="grid grid-cols-2 gap-3">
              <Field label="Categoria"><Sel value={form.category} onChange={v=>setForm(f=>({...f,category:v}))} options={GOAL_CATEGORIES}/></Field>
              <Field label="Custo estimado (R$)"><Inp type="number" value={form.estimatedCost} onChange={v=>setForm(f=>({...f,estimatedCost:v}))} placeholder="0"/></Field>
            </div>
            <div className="grid grid-cols-2 gap-3">
              <Field label="Prioridade"><Sel value={form.priority} onChange={v=>setForm(f=>({...f,priority:v}))} options={GOAL_PRIORITIES}/></Field>
              <Field label="Status"><Sel value={form.status} onChange={v=>setForm(f=>({...f,status:v}))} options={GOAL_STATUSES}/></Field>
            </div>
            <div className="flex gap-2 pt-2">
              <Btn onClick={save}><Save size={14}/> Salvar</Btn>
              <BtnG onClick={()=>setModal(null)}>Cancelar</BtnG>
            </div>
          </div>
        </Modal>
      )}
    </div>
  )
}

// ─── ATIVIDADE ────────────────────────────────────────────────────────────────
function ActivityPage({state}){
  const log=state.activityLog||[]
  const [filterUser,setFilterUser]=useState('todos')
  const users=[{id:'todos',label:'Todos'},{id:'Fabiano',label:'Fabiano'},{id:'Mainara',label:'Mainara'}]

  const filtered=filterUser==='todos'?log:log.filter(e=>e.user===filterUser)

  function relTime(iso){
    const diff=Date.now()-new Date(iso).getTime()
    const min=Math.floor(diff/60000)
    if(min<1)return'agora'
    if(min<60)return`${min}min atrás`
    const h=Math.floor(min/60)
    if(h<24)return`${h}h atrás`
    const d=Math.floor(h/24)
    if(d===1)return'ontem'
    if(d<7)return`${d} dias atrás`
    return new Date(iso).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'})
  }
  function dayLabel(iso){
    const d=new Date(iso)
    const today=new Date()
    const diff=Math.floor((today.setHours(0,0,0,0)-d.setHours(0,0,0,0))/86400000)
    if(diff===0)return'Hoje'
    if(diff===1)return'Ontem'
    return new Date(iso).toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long'})
  }

  // Agrupar por dia
  const groups=[]
  let lastDay=null
  filtered.forEach(entry=>{
    const day=entry.at?entry.at.slice(0,10):'?'
    if(day!==lastDay){groups.push({day,label:dayLabel(entry.at),entries:[]});lastDay=day}
    groups[groups.length-1].entries.push(entry)
  })

  return(
    <div className="space-y-5 max-w-2xl">
      <div className="flex items-center justify-between flex-wrap gap-3">
        <div>
          <h2 className="text-base font-semibold" style={{color:'var(--text)'}}>Registro de Atividade</h2>
          <p className="text-xs mt-0.5" style={{color:'var(--text-3)'}}>Tudo que foi feito no app, por quem e quando</p>
        </div>
        <div className="flex gap-2">
          {users.map(u=>(
            <button key={u.id} onClick={()=>setFilterUser(u.id)} className="px-3 py-1.5 rounded-xl text-xs font-medium transition-all"
              style={{background:filterUser===u.id?'#10b981':'var(--bg-overlay)',color:filterUser===u.id?'#fff':'var(--text-3)',border:filterUser===u.id?'1px solid #10b981':'1px solid var(--border)'}}>
              {u.label}
            </button>
          ))}
        </div>
      </div>

      {filtered.length===0&&(
        <div className="py-16 text-center" style={{color:'var(--text-3)'}}>
          <div className="text-4xl mb-3">📭</div>
          <p className="text-sm">Nenhuma atividade registrada ainda</p>
          <p className="text-xs mt-1" style={{color:'var(--text-4)'}}>As ações feitas no app aparecerão aqui</p>
        </div>
      )}

      <div className="space-y-6">
        {groups.map(group=>(
          <div key={group.day}>
            <div className="flex items-center gap-3 mb-3">
              <div className="text-xs font-semibold uppercase tracking-wider" style={{color:'var(--text-3)'}}>{group.label}</div>
              <div className="flex-1 h-px" style={{background:'var(--sep)'}}/>
              <div className="text-xs" style={{color:'var(--text-4)'}}>{group.entries.length} ação{group.entries.length!==1?'ões':''}</div>
            </div>
            <div className="space-y-1">
              {group.entries.map(entry=>(
                <div key={entry.id} className="flex items-start gap-3 px-3 py-2.5 rounded-xl transition-all"
                  style={{background:'var(--bg-card)',border:'1px solid var(--border)'}}>
                  <div className="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold shrink-0 mt-0.5"
                    style={{background:`${entry.userColor||'#10b981'}25`,color:entry.userColor||'#10b981',border:`1px solid ${entry.userColor||'#10b981'}40`}}>
                    {entry.userInitials||'??'}
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-baseline gap-1.5 flex-wrap">
                      <span className="text-xs font-semibold" style={{color:entry.userColor||'var(--text)'}}>{entry.user}</span>
                      <span className="text-sm" style={{color:'var(--text-2)'}}>{entry.text}</span>
                    </div>
                  </div>
                  <div className="text-xs shrink-0" style={{color:'var(--text-4)'}}>{relTime(entry.at)}</div>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
    </div>
  )
}
