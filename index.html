const USERS=[
  {id:'fabiano',name:'Fabiano',role:'admin',  color:'#10b981',initials:'FA',roleLabel:'Administrador'},
  {id:'mainara', name:'Mainara', role:'manager',color:'#8b5cf6',initials:'MA',roleLabel:'Gestora'},
]
async function hashPin(pin){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pin+'paiol_salt_2026'))
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('')
}
const loadSession=()=>{try{const s=sessionStorage.getItem('paiol_sess');return s?JSON.parse(s):null}catch(e){logError('loadSession',e);return null}}
const saveSession=u=>sessionStorage.setItem('paiol_sess',JSON.stringify({...u,loginAt:Date.now()}))
const clearSession=()=>sessionStorage.removeItem('paiol_sess')
const loadPins=()=>{try{const p=localStorage.getItem('paiol_pins');return p?JSON.parse(p):{}}catch(e){logError('loadPins',e);return{}}}
const savePins=p=>localStorage.setItem('paiol_pins',JSON.stringify(p))

function LoginScreen({onLogin}){
  const [step,setStep]=useState('select')
  const [user,setUser]=useState(null)
  const [pin,setPin]=useState('')
  const [confirm,setConfirm]=useState('')
  const [err,setErr]=useState('')
  const [busy,setBusy]=useState(false)
  const pins=loadPins()

  function pick(u){setUser(u);setPin('');setConfirm('');setErr('');setStep(pins[u.id]?'pin':'setup')}
  function back(){setStep('select');setPin('');setConfirm('');setErr('')}

  function getAttempts(userId){try{const a=JSON.parse(localStorage.getItem('paiol_attempts')||'{}');return a[userId]||{count:0,lockedUntil:0}}catch{return{count:0,lockedUntil:0}}}
  function setAttempts(userId,data){try{const a=JSON.parse(localStorage.getItem('paiol_attempts')||'{}');a[userId]=data;localStorage.setItem('paiol_attempts',JSON.stringify(a))}catch(e){logError('setAttempts',e)}}

  async function submit(){
    if(pin.length<4){setErr('PIN deve ter 4 dígitos');return}
    setBusy(true)
    const att=getAttempts(user.id)
    if(att.lockedUntil>Date.now()){const secs=Math.ceil((att.lockedUntil-Date.now())/1000);setErr(`Bloqueado. Tente em ${secs}s`);setBusy(false);return}
    const h=await hashPin(pin)
    if(step==='pin'){
      if(h===pins[user.id]){setAttempts(user.id,{count:0,lockedUntil:0});saveSession(user);onLogin(user)}
      else{
        const newCount=att.count+1
        const locked=newCount>=5?Date.now()+5*60*1000:0
        setAttempts(user.id,{count:newCount,lockedUntil:locked})
        setErr(newCount>=5?'Muitas tentativas. Bloqueado por 5 min':`PIN incorreto (${newCount}/5)`)
        setPin('')
      }
    }else{
      if(pin!==confirm){setErr('PINs não coincidem');setBusy(false);return}
      savePins({...loadPins(),[user.id]:h})
      saveSession(user);onLogin(user)
    }
    setBusy(false)
  }

  const inputSt={background:'var(--bg-input)',border:'1px solid var(--border)',borderRadius:16,padding:'16px',color:'#ffffff',fontSize:24,outline:'none',textAlign:'center',letterSpacing:'0.5em',width:'100%',backdropFilter:'blur(20px)',WebkitBackdropFilter:'blur(20px)'}

  return(
    <div className="min-h-screen flex items-center justify-center px-4" style={{background:'var(--bg)'}}>
      <div className="w-full max-w-xs">
        {/* Logo */}
        <div className="text-center mb-10">
          <div className="inline-flex items-center justify-center w-16 h-16 rounded-3xl mb-5" style={{background:'rgba(16,185,129,0.15)',border:'1px solid rgba(16,185,129,0.3)',boxShadow:'0 8px 32px rgba(16,185,129,0.2)',backdropFilter:'blur(20px)'}}>
            <KeyRound size={28} style={{color:'#10b981'}}/>
          </div>
          <div className="text-2xl font-bold text-white tracking-tight">Paiol Finance</div>
          <div className="text-sm mt-1" style={{color:'var(--text-3)'}}>Paiol Mídias · Área restrita</div>
        </div>

        {step==='select'&&(
          <div className="space-y-3">
            <p className="text-xs text-center mb-4" style={{color:'var(--text-3)'}}>Quem está acessando?</p>
            {USERS.map(u=>(
              <button key={u.id} onClick={()=>pick(u)} className="w-full flex items-center gap-3 p-4 rounded-2xl transition-all active:scale-[0.98]"
                style={{background:'var(--bg-input)',border:'1px solid var(--border)',backdropFilter:'blur(20px)',WebkitBackdropFilter:'blur(20px)',boxShadow:'inset 0 0.5px 0 var(--inner)'}}>
                <div className="w-11 h-11 rounded-full flex items-center justify-center font-bold shrink-0"
                  style={{background:u.color+'25',border:`1.5px solid ${u.color}40`}}>
                  <span style={{color:u.color,fontSize:13}}>{u.initials}</span>
                </div>
                <div className="text-left flex-1">
                  <div className="font-semibold text-white text-sm">{u.name}</div>
                  <div className="text-xs mt-0.5" style={{color:'var(--text-3)'}}>{u.roleLabel}</div>
                </div>
                <ChevronRight size={15} style={{color:'var(--text-4)'}}/>
              </button>
            ))}
          </div>
        )}

        {(step==='pin'||step==='setup')&&(
          <div className="space-y-4">
            <div className="flex items-center gap-2 mb-6">
              <button onClick={back} className="p-2 rounded-xl" style={{background:'var(--bg-input)',color:'var(--text-2)'}}>
                <ChevronLeft size={17}/>
              </button>
              <div className="flex items-center gap-2">
                <div className="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold"
                  style={{background:user?.color+'25',border:`1.5px solid ${user?.color}40`,color:user?.color}}>
                  {user?.initials}
                </div>
                <span className="text-sm font-semibold text-white">{user?.name}</span>
              </div>
            </div>
            <p className="text-xs" style={{color:'var(--text-2)'}}>{step==='setup'?'Crie seu PIN de 4 dígitos':'Digite seu PIN'}</p>
            <input type="password" inputMode="numeric" maxLength={4} autoFocus
              value={pin} onChange={e=>{setPin(e.target.value.replace(/\D/g,''));setErr('')}}
              onKeyDown={e=>e.key==='Enter'&&submit()} placeholder="••••" style={inputSt}/>
            {step==='setup'&&(
              <input type="password" inputMode="numeric" maxLength={4}
                value={confirm} onChange={e=>{setConfirm(e.target.value.replace(/\D/g,''));setErr('')}}
                onKeyDown={e=>e.key==='Enter'&&submit()} placeholder="Confirme o PIN" style={inputSt}/>
            )}
            {err&&<p className="text-xs text-red-400 text-center">{err}</p>}
            <button onClick={submit} disabled={busy} className="w-full py-3.5 text-sm font-semibold text-white"
              style={{background:'#10b981',borderRadius:12,opacity:busy?.7:1,marginTop:8,boxShadow:'inset 0 1px 0 rgba(255,255,255,0.2),0 4px 16px rgba(16,185,129,0.4)'}}>
              {busy?'Verificando...':(step==='pin'?'Entrar':'Criar PIN e Entrar')}
            </button>
          </div>
        )}
        <p className="text-center text-xs mt-8" style={{color:'var(--text-4)'}}>v1.2 · Paiol Mídias</p>
      </div>
    </div>
  )
}

// ─── APP ──────────────────────────────────────────────────────────────────────
// ─── ACTIVITY LOG ─────────────────────────────────────────────────────────────
const ENTITY_LABELS={clients:'cliente',cards:'cartão',collaborators:'colaborador',fixedExpenses:'despesa fixa',goals:'objetivo',permuteUsages:'permuta'}
function buildLog(action,user,state){
  const{type,payload}=action
  const u={user:user.name,userColor:user.color,userInitials:user.initials,id:uid(),at:new Date().toISOString()}
  const mk2label=mk=>{if(!mk)return'';const{year,month}=parseMonthKey(mk);return` · ${MONTH_NAMES[month-1].slice(0,3)}/${year}`}
  switch(type){
    case'ADD_ENTRY':return{...u,icon:'➕',text:`Adicionou entrada — ${payload.entry.client||'?'} ${fmtBRL(payload.entry.expectedValue||0)}${mk2label(payload.monthKey)}`}
    case'UPDATE_ENTRY':return{...u,icon:'✏️',text:`Editou entrada — ${payload.entry.client||'?'} ${fmtBRL(payload.entry.expectedValue||0)}${mk2label(payload.monthKey)}`}
    case'DELETE_ENTRY':{const e=(state.months[payload.monthKey]?.entries||[]).find(x=>x.id===payload.id);return{...u,icon:'🗑️',text:`Removeu entrada${e?` — ${e.client} ${fmtBRL(e.expectedValue||0)}`:''}`}}
    case'ADD_EXIT':return{...u,icon:'➕',text:`Adicionou saída — ${payload.exit.description||'?'} ${fmtBRL(payload.exit.expectedValue||0)}${mk2label(payload.monthKey)}`}
    case'UPDATE_EXIT':return{...u,icon:'✏️',text:`Editou saída — ${payload.exit.description||'?'} ${fmtBRL(payload.exit.expectedValue||0)}${mk2label(payload.monthKey)}`}
    case'DELETE_EXIT':{const e=(state.months[payload.monthKey]?.exits||[]).find(x=>x.id===payload.id);return{...u,icon:'🗑️',text:`Removeu saída${e?` — ${e.description} ${fmtBRL(e.expectedValue||0)}`:''}`}}
    case'ADD_CARD_EXPENSE':{const c=(state.settings?.cards||[]).find(x=>x.id===payload.cardId);return{...u,icon:'💳',text:`Lançou no cartão ${c?.name||'?'} — ${payload.expense.description||'?'} ${fmtBRL(payload.expense.value||0)}`}}
    case'DELETE_CARD_EXPENSE':{const c=(state.settings?.cards||[]).find(x=>x.id===payload.cardId);return{...u,icon:'🗑️',text:`Removeu lançamento do cartão ${c?.name||'?'}`}}
    case'PAY_CARD_BILL':{const c=(state.settings?.cards||[]).find(x=>x.id===payload.cardId);return{...u,icon:'✅',text:`Pagou fatura ${c?.name||'?'} — ${fmtBRL(payload.amount)}`}}
    case'ADD_SETTING':{const lbl=ENTITY_LABELS[payload.key]||payload.key;return{...u,icon:'➕',text:`Cadastrou ${lbl} — ${payload.item.name||payload.item.description||'?'}`}}
    case'UPDATE_SETTING':{const lbl=ENTITY_LABELS[payload.key]||payload.key;return{...u,icon:'✏️',text:`Editou ${lbl} — ${payload.item.name||payload.item.description||'?'}`}}
    case'DELETE_SETTING':{const lbl=ENTITY_LABELS[payload.key]||payload.key;return{...u,icon:'🗑️',text:`Removeu ${lbl}`}}
    case'ADD_TASK':return{...u,icon:'📋',text:`Criou tarefa — ${payload.task.title||'?'}`}
    case'UPDATE_TASK':return{...u,icon:'✏️',text:`Atualizou tarefa — ${payload.task.title||'?'}`}
    case'DELETE_TASK':{const t=(state.tasks||[]).find(x=>x.id===payload.id);return{...u,icon:'🗑️',text:`Removeu tarefa${t?` — ${t.title}`:''}`}}
    case'GENERATE_CONTRACT_ENTRIES':{const c=(state.settings?.clients||[]).find(x=>x.id===payload.clientId);return{...u,icon:'📅',text:`Gerou entradas do contrato — ${c?.name||'?'}`}}
    case'CLOSE_MONTH':return{...u,icon:'🔒',text:`Fechou o mês${mk2label(payload.monthKey)}`}
    case'COPY_FROM_PREV':return{...u,icon:'📋',text:`Copiou dados do mês anterior para${mk2label(payload.monthKey)}`}
    case'ADD_COLLAB_EXTRA':{const c=(state.settings?.collaborators||[]).find(x=>x.id===payload.collabId);return{...u,icon:'➕',text:`Adicionou extra para ${c?.name||'?'} — ${fmtBRL(payload.extra.value)}`}}
    default:return null
  }
}

function PaiolFinanceApp({currentUser,onLogout}){
  const [state,dispatch]=useReducer(trackedReducer,null,loadState)
  const [activePage,setActivePage]=useState('dashboard')
  const [sidebarOpen,setSidebarOpen]=useState(false)
  const [toasts,setToasts]=useState([])
  const [syncing,setSyncing]=useState(false)
  const today=new Date()
  const [selYear,setSelYear]=useState(today.getFullYear())
  const [selMonth,setSelMonth]=useState(today.getMonth()+1)
  const mk=monthKey(selYear,selMonth)

  // Salva localmente com debounce de 500ms + envia para Sheets com debounce de 2s
  useEffect(()=>{
    const tLocal=setTimeout(()=>{try{localStorage.setItem('paiolfinance_v3',JSON.stringify(state))}catch(e){logError('saveLocal',e)}},500)
    const tGas=setTimeout(()=>gasPost(state),2000)
    return()=>{clearTimeout(tLocal);clearTimeout(tGas)}
  },[state])

  // Na inicialização, sincroniza do Sheets com resolução de conflitos
  useEffect(()=>{
    const migFlag=localStorage.getItem('paiolfinance_migrated')
    if(migFlag&&(Date.now()-parseInt(migFlag))<120000){
      localStorage.removeItem('paiolfinance_migrated')
      gasPost(state).catch(e=>logError('migSync',e))
      return
    }
    setSyncing(true)
    gasGet().then(data=>{
      if(data){
        const localMod=state.lastModified||0
        const remoteMod=data.lastModified||0
        if(remoteMod>localMod){
          dispatch({type:'IMPORT',payload:{data}})
          localStorage.setItem('paiolfinance_v3',JSON.stringify(data))
          setTimeout(()=>toast('Dados sincronizados da nuvem'),500)
        } else if(localMod>remoteMod){
          gasPost(state)
          setTimeout(()=>toast('Dados locais enviados para a nuvem'),500)
        }
      }
    }).catch(e=>{logError('syncInit',e);setTimeout(()=>toast('Sincronização offline — usando dados locais','warn'),500)}).finally(()=>setSyncing(false))
  },[])

  const toast=useCallback((msg,type='success')=>{
    const id=uid();setToasts(t=>[...t,{id,msg,type}])
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3000)
  },[])

  // trackedDispatch: intercepta ações e grava no log de atividade
  const stateRef=useRef(state)
  useEffect(()=>{stateRef.current=state},[state])
  const trackedDispatch=useCallback((action)=>{
    dispatch(action)
    const log=buildLog(action,currentUser,stateRef.current)
    if(log)dispatch({type:'LOG_ACTIVITY',payload:log})
  },[dispatch,currentUser])

  function prevMonth(){if(selMonth===1){setSelYear(y=>y-1);setSelMonth(12)}else setSelMonth(m=>m-1)}
  function nextMonth(){if(selMonth===12){setSelYear(y=>y+1);setSelMonth(1)}else setSelMonth(m=>m+1)}
  function prevYear(){setSelYear(y=>y-1)}
  function nextYear(){setSelYear(y=>y+1)}

  const pp={state,dispatch:trackedDispatch,monthKey:mk,toast}
  const pages={
    dashboard:<DashboardPage {...pp} setActivePage={setActivePage}/>,cashflow:<CashFlowPage {...pp}/>,entries:<EntriesPage {...pp}/>,
    exits:<ExitsPage {...pp}/>,cards:<CardsPage {...pp}/>,collaborators:<CollaboratorsPage {...pp}/>,
    clients:<ClientsPage state={state} dispatch={trackedDispatch} toast={toast}/>,
    permuta:<PermutaPage state={state} dispatch={trackedDispatch} toast={toast}/>,
    objetivos:<GoalsPage state={state} dispatch={trackedDispatch} toast={toast}/>,
    tasks:<TasksPage state={state} dispatch={trackedDispatch} toast={toast}/>,
    calendar:<CalendarPage state={state} dispatch={trackedDispatch} monthKey={mk} toast={toast}/>,
    annual:<AnnualProjectionPage state={state} selYear={selYear}/>,simulator:<SimulatorPage {...pp}/>,settings:<SettingsPage {...pp}/>,
    activity:<ActivityPage state={state}/>,
  }
  const monthData=state.months[mk]||{}

  return(
    <div className="min-h-screen flex" style={{background:'var(--bg)',color:'var(--text)'}}>
      <Sidebar activePage={activePage} setActivePage={setActivePage} open={sidebarOpen} setOpen={setSidebarOpen} state={state}/>
      <div className="flex-1 flex flex-col min-h-screen" style={{marginLeft:0,paddingLeft:0}}>
        <div className="flex-1 flex flex-col min-h-screen lg:ml-[220px]">
          {/* Header */}
          {syncing&&<div className="fixed top-0 left-0 right-0 z-50 h-0.5" style={{background:'linear-gradient(90deg,#10b981,#3b82f6,#10b981)',backgroundSize:'200% 100%',animation:'syncbar 1.5s linear infinite'}}/>}
          <header className="sticky top-0 z-20 flex items-center justify-between px-4 py-3" style={{background:'var(--bg-header)',borderBottom:'1px solid var(--sep)',backdropFilter:'blur(40px) saturate(200%)',WebkitBackdropFilter:'blur(40px) saturate(200%)'}}>
            <div className="flex items-center gap-3">
              <button onClick={()=>setSidebarOpen(true)} title="Menu" aria-label="Abrir menu" className="lg:hidden p-2 rounded-xl transition-colors" style={{color:'var(--text-2)'}}><Menu size={18}/></button>
              {activePage==='annual'?(
                <div className="flex items-center gap-1.5">
                  <button onClick={prevYear} className="p-1.5 rounded-xl transition-colors" style={{color:'var(--text-2)'}}><ChevronLeft size={16}/></button>
                  <span className="text-sm font-semibold min-w-[80px] text-center tracking-tight" style={{color:'var(--text)'}}>{selYear}</span>
                  <button onClick={nextYear} className="p-1.5 rounded-xl transition-colors" style={{color:'var(--text-2)'}}><ChevronRight size={16}/></button>
                </div>
              ):['settings','clients','cards','collaborators','activity'].includes(activePage)?(
                <span className="text-sm font-semibold tracking-tight" style={{color:'var(--text)'}}>
                  {activePage==='clients'?'Clientes':activePage==='cards'?'Cartões':activePage==='collaborators'?'Colaboradores':activePage==='activity'?'Atividade':'Dados & Backup'}
                </span>
              ):(
                <div className="flex items-center gap-1.5">
                  <button onClick={prevMonth} className="p-1.5 rounded-xl transition-colors" style={{color:'var(--text-2)'}}><ChevronLeft size={16}/></button>
                  <span className="text-sm font-semibold min-w-[130px] text-center tracking-tight" style={{color:'var(--text)'}}>{MONTH_NAMES[selMonth-1]} · {selYear}</span>
                  <button onClick={nextMonth} className="p-1.5 rounded-xl transition-colors" style={{color:'var(--text-2)'}}><ChevronRight size={16}/></button>
                </div>
              )}
            </div>
            <div className="flex items-center gap-2 sm:gap-3">
              {monthData.closed&&<span className="px-2.5 py-1 text-xs font-medium rounded-full" style={{background:'rgba(16,185,129,0.15)',color:'#10b981',border:'1px solid rgba(16,185,129,0.3)'}}>Fechado</span>}
              <div className="text-right hidden sm:block">
                <div className="text-xs" style={{color:'var(--text-3)'}}>Saldo em caixa</div>
                <div className="text-sm font-bold" style={{color:'#10b981'}}>{fmtBRL(monthData.cashBalance)}</div>
              </div>
              <div className="p-1.5 rounded-xl hidden sm:block" style={{background:'rgba(16,185,129,0.12)'}}><Wallet size={15} style={{color:'#10b981'}}/></div>
              <div className="flex items-center gap-2 pl-2" style={{borderLeft:'1px solid var(--border)'}}>
                <div className="w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold shrink-0"
                  style={{background:(currentUser.color||'#10b981')+'25',border:`1.5px solid ${currentUser.color||'#10b981'}45`,color:currentUser.color||'#10b981'}}>
                  {currentUser.initials||currentUser.name?.slice(0,2).toUpperCase()}
                </div>
                <span className="text-xs font-medium hidden sm:block" style={{color:'var(--text-2)'}}>{currentUser.name}</span>
                <button onClick={onLogout} title="Sair" className="p-1 rounded-lg transition-colors" style={{color:'var(--text-3)'}}>
                  <LogOut size={14}/>
                </button>
              </div>
            </div>
          </header>
          <div className="px-5 pt-5 pb-2"><h1 className="text-lg font-semibold text-white tracking-tight">{NAV.find(n=>n.id===activePage)?.label}</h1></div>
          <main className="flex-1 px-5 pb-8"><ErrorBoundary key={activePage}><div className="page-enter" key={activePage}>{syncing?<PageSkeleton/>:pages[activePage]}</div></ErrorBoundary></main>
        </div>
      </div>
      <Toast toasts={toasts}/>
    </div>
  )
}

function App(){
  const [currentUser,setCurrentUser]=useState(loadSession)
  useEffect(()=>{
    const mq=window.matchMedia('(prefers-color-scheme: light)')
    const apply=e=>document.body.classList.toggle('light',e.matches)
    apply(mq)
    mq.addEventListener('change',apply)
    return()=>mq.removeEventListener('change',apply)
  },[])
  if(!currentUser) return <LoginScreen onLogin={u=>setCurrentUser(u)}/>
  return <PaiolFinanceApp currentUser={currentUser} onLogout={()=>{clearSession();setCurrentUser(null)}}/>
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>)
</script>
