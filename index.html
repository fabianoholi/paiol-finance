// ─── REDUCER ──────────────────────────────────────────────────────────────────
function reducer(state,action){
  const{type,payload}=action
  const updMonth=(key,fn)=>({...state,months:{...state.months,[key]:fn(state.months[key]||{cashBalance:0,closed:false,snapshot:null,entries:[],exits:[],cardExpenses:{},collaboratorExtras:{},dailyNotes:{},dailyCash:{}})}})
  switch(type){
    case'ADD_ENTRY':return updMonth(payload.monthKey,m=>({...m,entries:[...(m.entries||[]),{...payload.entry,id:uid()}]}))
    case'UPDATE_ENTRY':return updMonth(payload.monthKey,m=>({...m,entries:m.entries.map(e=>e.id===payload.entry.id?payload.entry:e)}))
    case'DELETE_ENTRY':return updMonth(payload.monthKey,m=>({...m,entries:m.entries.filter(e=>e.id!==payload.id)}))
    case'ADD_EXIT':return updMonth(payload.monthKey,m=>({...m,exits:[...(m.exits||[]),{...payload.exit,id:uid()}]}))
    case'UPDATE_EXIT':return updMonth(payload.monthKey,m=>({...m,exits:m.exits.map(e=>e.id===payload.exit.id?payload.exit:e)}))
    case'DELETE_EXIT':return updMonth(payload.monthKey,m=>({...m,exits:m.exits.filter(e=>e.id!==payload.id)}))
    case'SET_CASH_BALANCE':return updMonth(payload.monthKey,m=>({...m,cashBalance:payload.value}))
    case'UPDATE_DAILY_NOTE':return updMonth(payload.monthKey,m=>({...m,dailyNotes:{...m.dailyNotes,[payload.day]:payload.note}}))
    case'UPDATE_DAILY_CASH':return updMonth(payload.monthKey,m=>({...m,dailyCash:{...m.dailyCash,[payload.day]:payload.value}}))
    case'ADD_CARD_EXPENSE':return updMonth(payload.monthKey,m=>({...m,cardExpenses:{...m.cardExpenses,[payload.cardId]:[...(m.cardExpenses?.[payload.cardId]||[]),{...payload.expense,id:uid()}]}}))
    case'DELETE_CARD_EXPENSE':return updMonth(payload.monthKey,m=>({...m,cardExpenses:{...m.cardExpenses,[payload.cardId]:(m.cardExpenses?.[payload.cardId]||[]).filter(e=>e.id!==payload.id)}}))
    case'ADD_COLLAB_EXTRA':return updMonth(payload.monthKey,m=>({...m,collaboratorExtras:{...m.collaboratorExtras,[payload.collabId]:[...(m.collaboratorExtras?.[payload.collabId]||[]),{...payload.extra,id:uid()}]}}))
    case'DELETE_COLLAB_EXTRA':return updMonth(payload.monthKey,m=>({...m,collaboratorExtras:{...m.collaboratorExtras,[payload.collabId]:(m.collaboratorExtras?.[payload.collabId]||[]).filter(e=>e.id!==payload.id)}}))
    case'CLOSE_MONTH':return updMonth(payload.monthKey,m=>({...m,closed:true,snapshot:{...m,closed:true}}))
    case'COPY_FROM_PREV':{
      const prev=state.months[payload.prevKey]
      if(!prev)return state
      return updMonth(payload.monthKey,m=>({...m,entries:prev.entries.map(e=>({...e,id:uid(),status:'Previsto',realValue:0,note:''})),exits:prev.exits.map(e=>({...e,id:uid(),status:'Pendente',realValue:0,note:''}))}))
    }
    case'ADD_SETTING':return{...state,settings:{...state.settings,[payload.key]:[...(state.settings[payload.key]||[]),{...payload.item,id:uid()}]}}
    case'UPDATE_SETTING':return{...state,settings:{...state.settings,[payload.key]:state.settings[payload.key].map(i=>i.id===payload.item.id?payload.item:i)}}
    case'DELETE_SETTING':return{...state,settings:{...state.settings,[payload.key]:state.settings[payload.key].filter(i=>i.id!==payload.id)}}
    case'IMPORT':return payload.data
    default:return state
  }
}

function BtnG({onClick,children,small}){return <button onClick={onClick} className={`flex items-center gap-1.5 rounded-lg transition-all ${small?'px-3 py-1.5 text-xs':'px-4 py-2 text-sm'}`} style={{background:'#33415540',color:'#94a3b8',border:'1px solid #334155'}}>{children}</button>}

function Th({children,right}){return <th className={`px-3 py-2.5 text-xs font-medium text-slate-400 uppercase tracking-wider ${right?'text-right':'text-left'}`}>{children}</th>}
function Td({children,right,muted,color}){return <td className={`px-3 py-2.5 text-sm ${right?'text-right':''} ${muted?'text-slate-500':''}`} style={{color:color||undefined}}>{children}</td>}

const CTip=({active,payload,label})=>{
  if(!active||!payload?.length)return null
  return <div className="rounded-lg p-3 text-sm" style={{background:'#0f172a',border:'1px solid #334155'}}><p className="text-slate-400 mb-1">{label}</p>{payload.map((p,i)=><p key={i} style={{color:p.color}}>{p.name}: {fmtBRL(p.value)}</p>)}</div>
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function DashboardPage({state,dispatch,monthKey:mk,toast}){
  const month=state.months[mk]||{}
  const entries=month.entries||[]
  const exits=month.exits||[]
  const totalExpIn=entries.reduce((s,e)=>s+(e.expectedValue||0),0)
  const totalRealIn=entries.filter(e=>e.status==='Recebido').reduce((s,e)=>s+(e.realValue||0),0)
  const totalExpOut=exits.reduce((s,e)=>s+(e.expectedValue||0),0)
  const totalRealOut=exits.filter(e=>e.status==='Pago').reduce((s,e)=>s+(e.realValue||0),0)
  const resPrev=totalExpIn-totalExpOut
  const resReal=totalRealIn-totalRealOut
  const [editBal,setEditBal]=useState(false)
  const [balVal,setBalVal]=useState(String(month.cashBalance||''))
  const pendIn=entries.filter(e=>e.status!=='Recebido')
  const pendOut=exits.filter(e=>e.status!=='Pago')
  const barData=[{name:'Entradas',Previsto:totalExpIn,Realizado:totalRealIn},{name:'Saídas',Previsto:totalExpOut,Realizado:totalRealOut},{name:'Resultado',Previsto:resPrev,Realizado:resReal}]

  function saveBal(){const v=parseFloat(balVal.replace(',','.')); if(!isNaN(v)){dispatch({type:'SET_CASH_BALANCE',payload:{monthKey:mk,value:v}});toast('Saldo atualizado')}; setEditBal(false)}

  return(
    <div className="space-y-6">
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
        <div className="col-span-2 rounded-xl p-5" style={{background:'#1e293b',border:'1px solid #334155'}}>
          <div className="flex items-start justify-between mb-3"><span className="text-xs text-slate-400 uppercase tracking-wider">Saldo em Caixa</span><Wallet size={16} style={{color:'#10b981'}}/></div>
          {editBal?(
            <div className="flex gap-2 items-center">
              <input className={iCls} style={{...iSty,maxWidth:160}} type="number" value={balVal} onChange={e=>setBalVal(e.target.value)} onKeyDown={e=>e.key==='Enter'&&saveBal()} autoFocus/>
              <button onClick={saveBal}><Check size={18} style={{color:'#10b981'}}/></button>
            </div>
          ):(
            <div className="flex items-center gap-2 cursor-pointer" onClick={()=>{setBalVal(String(month.cashBalance||'0'));setEditBal(true)}}>
              <span className="text-2xl font-bold" style={{color:'#10b981'}}>{fmtBRL(month.cashBalance)}</span>
              <Pencil size={14} className="text-slate-500"/>
            </div>
          )}
          <div className="text-xs text-slate-500 mt-1">Clique para editar</div>
        </div>
        <SummaryCard label="Entradas Previstas" value={fmtBRL(totalExpIn)} sub={`Realizadas: ${fmtBRL(totalRealIn)}`} color="#10b981" icon={TrendingUp}/>
        <SummaryCard label="Saídas Previstas" value={fmtBRL(totalExpOut)} sub={`Pagas: ${fmtBRL(totalRealOut)}`} color="#ef4444" icon={TrendingDown}/>
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
        <div className="rounded-xl p-5 space-y-4" style={{background:'#1e293b',border:'1px solid #334155'}}>
          <h3 className="text-sm font-semibold text-slate-300">Resultado do Mês</h3>
          <div className="flex gap-6">
            <div><div className="text-xs text-slate-500 mb-1">Previsto</div><div className="text-xl font-bold" style={{color:resPrev>=0?'#10b981':'#ef4444'}}>{fmtBRL(resPrev)}</div></div>
            <div><div className="text-xs text-slate-500 mb-1">Realizado</div><div className="text-xl font-bold" style={{color:resReal>=0?'#10b981':'#ef4444'}}>{fmtBRL(resReal)}</div></div>
          </div>
          <ProgressBar label="Entradas realizadas" current={totalRealIn} total={totalExpIn} color="#10b981"/>
          <ProgressBar label="Saídas pagas" current={totalRealOut} total={totalExpOut} color="#ef4444"/>
          {!month.closed&&<button onClick={()=>{dispatch({type:'CLOSE_MONTH',payload:{monthKey:mk}});toast('Mês fechado!')}} className="text-xs text-emerald-500 hover:text-emerald-400 flex items-center gap-1 pt-1"><Check size={12}/> Fechar mês</button>}
          {month.closed&&<span className="text-xs text-emerald-500 flex items-center gap-1"><CheckCircle size={12}/> Mês fechado</span>}
        </div>
        <div className="rounded-xl p-5" style={{background:'#1e293b',border:'1px solid #334155'}}>
          <h3 className="text-sm font-semibold text-slate-300 mb-3">Previsto vs Realizado</h3>
          <ResponsiveContainer width="100%" height={160}>
            <BarChart data={barData} barSize={16}>
              <CartesianGrid strokeDasharray="3 3" stroke="#334155"/>
              <XAxis dataKey="name" tick={{fill:'#64748b',fontSize:11}} axisLine={false} tickLine={false}/>
              <YAxis tick={{fill:'#64748b',fontSize:10}} axisLine={false} tickLine={false} tickFormatter={v=>`${(v/1000).toFixed(0)}k`}/>
              <Tooltip content={<CTip/>}/>
              <Legend wrapperStyle={{fontSize:11,color:'#94a3b8'}}/>
              <Bar dataKey="Previsto" fill="#3b82f6" radius={[3,3,0,0]}/>
              <Bar dataKey="Realizado" fill="#10b981" radius={[3,3,0,0]}/>
            </BarChart>
          </ResponsiveContainer>
        </div>
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
        <div className="rounded-xl p-5" style={{background:'#1e293b',border:'1px solid #334155'}}>
          <h3 className="text-sm font-semibold text-slate-300 mb-3 flex items-center gap-2"><TrendingUp size={14} style={{color:'#10b981'}}/> A Receber ({pendIn.length})</h3>
          {pendIn.length===0?<p className="text-xs text-slate-500">Tudo recebido!</p>:(
            <div className="space-y-2">{pendIn.map(e=>(
              <div key={e.id} className="flex items-center justify-between py-1.5 border-b border-slate-700/50">
                <div><div className="text-sm text-slate-200">{e.client}</div><div className="text-xs text-slate-500">Dia {e.dueDay}</div></div>
                <div className="flex items-center gap-2"><span className="text-sm font-medium text-slate-200">{fmtBRL(e.expectedValue)}</span><StatusBadge status={e.status}/></div>
              </div>
            ))}</div>
          )}
        </div>
        <div className="rounded-xl p-5" style={{background:'#1e293b',border:'1px solid #334155'}}>
          <h3 className="text-sm font-semibold text-slate-300 mb-3 flex items-center gap-2"><TrendingDown size={14} style={{color:'#ef4444'}}/> A Pagar ({pendOut.length})</h3>
          {pendOut.length===0?<p className="text-xs text-slate-500">Tudo pago!</p>:(
            <div className="space-y-2">{pendOut.map(e=>(
              <div key={e.id} className="flex items-center justify-between py-1.5 border-b border-slate-700/50">
                <div><div className="text-sm text-slate-200">{e.name}</div><div className="text-xs text-slate-500">Dia {e.day} · {e.category}</div></div>
                <div className="flex items-center gap-2"><span className="text-sm font-medium text-slate-200">{fmtBRL(e.expectedValue)}</span><StatusBadge status={e.status}/></div>
              </div>
            ))}</div>
          )}
        </div>
      </div>
    </div>
  )
}

// ─── ENTRADAS ─────────────────────────────────────────────────────────────────
function EntriesPage({state,dispatch,monthKey:mk,toast}){
  const month=state.months[mk]||{}
  const entries=month.entries||[]
  const [filter,setFilter]=useState('Todos')
  const [modal,setModal]=useState(null)
  const [form,setForm]=useState({})
  const filtered=filter==='Todos'?entries:entries.filter(e=>e.status===filter)
  const totalExp=entries.reduce((s,e)=>s+(e.expectedValue||0),0)
  const totalReal=entries.filter(e=>e.status==='Recebido').reduce((s,e)=>s+(e.realValue||0),0)
  const totalPend=entries.filter(e=>e.status!=='Recebido').reduce((s,e)=>s+(e.expectedValue||0),0)
  function openAdd(){setForm({client:'',dueDay:'',expectedValue:'',status:'Previsto',realValue:'',note:''});setModal('add')}
  function openEdit(e){setForm({...e});setModal(e)}
  function save(){
    if(!form.client||!form.expectedValue)return toast('Preencha cliente e valor','error')
    const entry={...form,expectedValue:parseFloat(form.expectedValue)||0,realValue:parseFloat(form.realValue)||0,dueDay:parseInt(form.dueDay)||0}
    if(modal==='add')dispatch({type:'ADD_ENTRY',payload:{monthKey:mk,entry}})
    else dispatch({type:'UPDATE_ENTRY',payload:{monthKey:mk,entry}})
    toast('Salvo');setModal(null)
  }
  function del(id){dispatch({type:'DELETE_ENTRY',payload:{monthKey:mk,id}});toast('Removido','warn')}
  return(
    <div className="space-y-5">
      <div className="grid grid-cols-3 gap-4">
        <SummaryCard label="Previsto" value={fmtBRL(totalExp)} color="#3b82f6" icon={TrendingUp}/>
        <SummaryCard label="Recebido" value={fmtBRL(totalReal)} color="#10b981" icon={CheckCircle}/>
        <SummaryCard label="A Receber" value={fmtBRL(totalPend)} color="#f59e0b" icon={Clock}/>
      </div>
      <div className="flex flex-wrap items-center justify-between gap-3">
        <div className="flex gap-2 flex-wrap">
          {['Todos','Previsto','Cobrado','Recebido'].map(s=>(
            <button key={s} onClick={()=>setFilter(s)} className="px-3 py-1.5 text-xs rounded-lg transition-all"
              style={{background:filter===s?'#10b981':'#33415540',color:filter===s?'#fff':'#94a3b8',border:'1px solid #334155'}}>{s}</button>
          ))}
        </div>
        <Btn onClick={openAdd}><Plus size={14}/> Adicionar</Btn>
      </div>
      <div className="rounded-xl overflow-auto" style={{border:'1px solid #334155'}}>
        <table className="w-full min-w-[600px]">
          <thead style={{background:'#0f172a'}}><tr><Th>Cliente</Th><Th>Dia</Th><Th right>Previsto</Th><Th right>Recebido</Th><Th right>Diferença</Th><Th>Status</Th><Th>Ações</Th></tr></thead>
          <tbody>
            {filtered.map((e,i)=>{
              const diff=(e.realValue||0)-(e.expectedValue||0)
              return(
                <tr key={e.id} className="border-t" style={{borderColor:'#334155',background:i%2===0?'#1e293b':'#1a2540'}}>
                  <Td>{e.client}</Td><Td muted>{e.dueDay||'—'}</Td>
                  <Td right>{fmtBRL(e.expectedValue)}</Td>
                  <Td right color={e.realValue?'#f1f5f9':'#475569'}>{e.realValue?fmtBRL(e.realValue):'—'}</Td>
                  <Td right color={diff>0?'#10b981':diff<0?'#ef4444':'#64748b'}>{e.realValue?fmtBRL(diff):'—'}</Td>
                  <Td><StatusBadge status={e.status}/></Td>
                  <Td><div className="flex gap-1.5">
                    <button onClick={()=>openEdit(e)} className="p-1 rounded text-slate-400 hover:text-slate-200"><Pencil size={13}/></button>
                    <button onClick={()=>del(e.id)} className="p-1 rounded text-slate-400 hover:text-red-400"><Trash2 size={13}/></button>
                  </div></Td>
                </tr>
              )
            })}
            {filtered.length===0&&<tr><td colSpan={7} className="px-3 py-8 text-center text-sm text-slate-500">Nenhuma entrada</td></tr>}
          </tbody>
          <tfoot style={{background:'#0f172a',borderTop:'1px solid #334155'}}>
            <tr>
              <td colSpan={2} className="px-3 py-2 text-xs text-slate-400 font-medium">Total ({filtered.length})</td>
              <td className="px-3 py-2 text-sm text-right font-bold text-slate-200">{fmtBRL(filtered.reduce((s,e)=>s+(e.expectedValue||0),0))}</td>
              <td className="px-3 py-2 text-sm text-right font-bold text-emerald-400">{fmtBRL(filtered.filter(e=>e.status==='Recebido').reduce((s,e)=>s+(e.realValue||0),0))}</td>
              <td colSpan={3}/>
            </tr>
          </tfoot>
        </table>
      </div>
      {modal&&(
        <Modal title={modal==='add'?'Nova Entrada':'Editar Entrada'} onClose={()=>setModal(null)}>
          <div className="space-y-4">
            <Field label="Cliente / Empresa"><Inp value={form.client} onChange={v=>setForm(f=>({...f,client:v}))} placeholder="Nome do cliente"/></Field>
            <div className="grid grid-cols-2 gap-3">
              <Field label="Dia previsto"><Inp type="number" value={form.dueDay} onChange={v=>setForm(f=>({...f,dueDay:v}))} placeholder="10"/></Field>
              <Field label="Status"><Sel value={form.status} onChange={v=>setForm(f=>({...f,status:v}))} options={['Previsto','Cobrado','Recebido']}/></Field>
            </div>
            <div className="grid grid-cols-2 gap-3">
              <Field label="Valor previsto (R$)"><Inp type="number" value={form.expectedValue} onChange={v=>setForm(f=>({...f,expectedValue:v}))} placeholder="0,00"/></Field>
              <Field label="Valor recebido (R$)"><Inp type="number" value={form.realValue} onChange={v=>setForm(f=>({...f,realValue:v}))} placeholder="0,00"/></Field>
            </div>
            <Field label="Observação"><Inp value={form.note} onChange={v=>setForm(f=>({...f,note:v}))} placeholder="Opcional"/></Field>
            <div className="flex justify-end gap-2 pt-2"><BtnG onClick={()=>setModal(null)}>Cancelar</BtnG><Btn onClick={save}><Save size={14}/> Salvar</Btn></div>
          </div>
        </Modal>
      )}
    </div>
  )
}

// ─── FLUXO DE CAIXA ───────────────────────────────────────────────────────────
function CashFlowPage({state,dispatch,monthKey:mk}){
  const{year,month}=parseMonthKey(mk)
  const mData=state.months[mk]||{}
  const entries=mData.entries||[]
  const exits=mData.exits||[]
  const daysInMonth=new Date(year,month,0).getDate()
  const today=new Date()
  const isCurr=today.getFullYear()===year&&today.getMonth()+1===month
  const entriesByDay={};exits;entries.forEach(e=>{if(e.dueDay)entriesByDay[e.dueDay]=(entriesByDay[e.dueDay]||0)+(e.expectedValue||0)})
  const exitsByDay={};exits.forEach(e=>{if(e.day)exitsByDay[e.day]=(exitsByDay[e.day]||0)+(e.expectedValue||0)})
  let running=mData.cashBalance||0
  return(
    <div className="rounded-xl overflow-auto" style={{border:'1px solid #334155'}}>
      <table className="w-full min-w-[700px]">
        <thead style={{background:'#0f172a'}}><tr><Th>Dia</Th><Th right>Ent. Prev.</Th><Th right>Saí. Prev.</Th><Th right>Saldo Esp.</Th><Th right>Saldo Real</Th><Th>Status</Th><Th>Obs.</Th></tr></thead>
        <tbody>
          {Array.from({length:daysInMonth},(_,i)=>i+1).map((d,i)=>{
            const dIn=entriesByDay[d]||0;const dOut=exitsByDay[d]||0;running+=dIn-dOut
            const realCash=mData.dailyCash?.[String(d)]
            const isToday=isCurr&&today.getDate()===d
            const isPast=isCurr?today.getDate()>d:year<today.getFullYear()||(year===today.getFullYear()&&month<today.getMonth()+1)
            const diff=realCash!=null?realCash-running:null
            const status=realCash!=null?(Math.abs(diff)<1?'✅':'⚠️'):(isPast?'⏳':'—')
            return(
              <tr key={d} className="border-t" style={{borderColor:'#334155',background:isToday?'#1a3a2a':i%2===0?'#1e293b':'#1a2540'}}>
                <Td><span style={{color:isToday?'#10b981':'#f1f5f9'}}>{d}</span>{isToday&&<span className="ml-1 text-xs text-emerald-500">hoje</span>}</Td>
                <Td right color={dIn>0?'#10b981':'#475569'}>{dIn>0?fmtBRL(dIn):'—'}</Td>
                <Td right color={dOut>0?'#ef4444':'#475569'}>{dOut>0?fmtBRL(dOut):'—'}</Td>
                <Td right color={running>=0?'#f1f5f9':'#ef4444'}>{fmtBRL(running)}</Td>
                <td className="px-3 py-1.5"><input type="number" defaultValue={realCash??''} placeholder="—"
                  onBlur={e=>{const v=parseFloat(e.target.value);if(!isNaN(v))dispatch({type:'UPDATE_DAILY_CASH',payload:{monthKey:mk,day:String(d),value:v}})}}
                  className="w-24 px-2 py-1 rounded text-right text-sm outline-none" style={{background:'#0f172a',border:'1px solid #334155',color:'#f1f5f9'}}/></td>
                <Td>{status}</Td>
                <td className="px-3 py-1.5"><input defaultValue={mData.dailyNotes?.[String(d)]||''} placeholder="Observação..."
                  onBlur={e=>dispatch({type:'UPDATE_DAILY_NOTE',payload:{monthKey:mk,day:String(d),note:e.target.value}})}
                  className="w-full px-2 py-1 rounded text-sm outline-none" style={{background:'transparent',border:'1px solid transparent',color:'#94a3b8'}}/></td>
              </tr>
            )
          })}
        </tbody>
      </table>
    </div>
  )
}

// ─── PROJEÇÃO ANUAL ───────────────────────────────────────────────────────────
function AnnualProjectionPage({state}){
  const today=new Date();const year=today.getFullYear()
  const rows=Array.from({length:12},(_,i)=>{
    const mk=monthKey(year,i+1);const m=state.months[mk]||{}
    const entries=m.entries||[];const exits=m.exits||[]
    const expIn=entries.reduce((s,e)=>s+(e.expectedValue||0),0)
    const realIn=entries.filter(e=>e.status==='Recebido').reduce((s,e)=>s+(e.realValue||0),0)
    const expOut=exits.reduce((s,e)=>s+(e.expectedValue||0),0)
    const realOut=exits.filter(e=>e.status==='Pago').reduce((s,e)=>s+(e.realValue||0),0)
    return{mk,month:i+1,name:MONTH_NAMES[i],expIn,realIn,expOut,realOut,isPast:i+1<today.getMonth()+1,isCurrent:i+1===today.getMonth()+1}
  })
  let accP=0,accR=0
  const data=rows.map(r=>{accP+=r.expIn-r.expOut;if(r.isPast||r.isCurrent)accR+=r.realIn-r.realOut;return{...r,accP,accR}})
  const chartData=data.map(r=>({name:r.name.slice(0,3),'Entradas':r.expIn,'Saídas':r.expOut}))
  return(
    <div className="space-y-5">
      <div className="rounded-xl p-5" style={{background:'#1e293b',border:'1px solid #334155'}}>
        <h3 className="text-sm font-semibold text-slate-300 mb-4">Evolução {year}</h3>
        <ResponsiveContainer width="100%" height={200}>
          <AreaChart data={chartData}>
            <defs>
              <linearGradient id="gin" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#10b981" stopOpacity={0.3}/><stop offset="95%" stopColor="#10b981" stopOpacity={0}/></linearGradient>
              <linearGradient id="gout" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#ef4444" stopOpacity={0.3}/><stop offset="95%" stopColor="#ef4444" stopOpacity={0}/></linearGradient>
            </defs>
            <CartesianGrid strokeDasharray="3 3" stroke="#334155"/>
            <XAxis dataKey="name" tick={{fill:'#64748b',fontSize:11}} axisLine={false} tickLine={false}/>
            <YAxis tick={{fill:'#64748b',fontSize:10}} axisLine={false} tickLine={false} tickFormatter={v=>`${(v/1000).toFixed(0)}k`}/>
            <Tooltip content={<CTip/>}/><Legend wrapperStyle={{fontSize:11,color:'#94a3b8'}}/>
            <Area type="monotone" dataKey="Entradas" stroke="#10b981" fill="url(#gin)" strokeWidth={2}/>
            <Area type="monotone" dataKey="Saídas" stroke="#ef4444" fill="url(#gout)" strokeWidth={2}/>
          </AreaChart>
        </ResponsiveContainer>
      </div>
      <div className="rounded-xl overflow-auto" style={{border:'1px solid #334155'}}>
        <table className="w-full min-w-[800px]">
          <thead style={{background:'#0f172a'}}><tr><Th>Mês</Th><Th right>Ent.Prev</Th><Th right>Saí.Prev</Th><Th right>Res.Prev</Th><Th right>Ent.Real</Th><Th right>Saí.Real</Th><Th right>Res.Real</Th><Th right>Acumulado</Th></tr></thead>
          <tbody>{data.map((r,i)=>{
            const rP=r.expIn-r.expOut;const rR=r.realIn-r.realOut
            return(
              <tr key={r.mk} className="border-t" style={{borderColor:'#334155',background:r.isCurrent?'#1a3a2a':i%2===0?'#1e293b':'#1a2540'}}>
                <Td><span style={{color:r.isCurrent?'#10b981':'#f1f5f9'}}>{r.name}</span>{r.isCurrent&&<span className="ml-1 text-xs text-emerald-500">atual</span>}</Td>
                <Td right color="#10b981">{fmtBRL(r.expIn)}</Td><Td right color="#ef4444">{fmtBRL(r.expOut)}</Td>
                <Td right color={rP>=0?'#10b981':'#ef4444'}>{fmtBRL(rP)}</Td>
                <Td right color={r.realIn>0?'#10b981':'#475569'}>{r.realIn>0?fmtBRL(r.realIn):'—'}</Td>
                <Td right color={r.realOut>0?'#ef4444':'#475569'}>{r.realOut>0?fmtBRL(r.realOut):'—'}</Td>
                <Td right color={rR!==0?(rR>=0?'#10b981':'#ef4444'):'#475569'}>{r.realIn>0||r.realOut>0?fmtBRL(rR):'—'}</Td>
                <Td right color={(r.isPast||r.isCurrent)?r.accR>=0?'#f1f5f9':'#ef4444':r.accP>=0?'#64748b':'#ef4444'}>{fmtBRL((r.isPast||r.isCurrent)?r.accR:r.accP)}</Td>
              </tr>
            )
          })}</tbody>
        </table>
      </div>
    </div>
  )
}

// ─── SIMULADOR ────────────────────────────────────────────────────────────────
function SimulatorPage({state,monthKey:mk}){
  const [type,setType]=useState('expense')
  const [form,setForm]=useState({name:'',value:'',installments:'1',months:'3'})
  const [result,setResult]=useState(null)
  const month=state.months[mk]||{}
  const baseIn=(month.entries||[]).reduce((s,e)=>s+(e.expectedValue||0),0)
  const baseOut=(month.exits||[]).reduce((s,e)=>s+(e.expectedValue||0),0)
  function simulate(){
    const v=parseFloat(form.value)||0;const inst=parseInt(form.installments)||1;const mo=parseInt(form.months)||3
    const months=Array.from({length:Math.max(inst,mo)},(_,i)=>{
      const mIn=type==='client'?baseIn+v:baseIn
      let mOut=baseOut;if(type==='expense')mOut+=i<inst?v/inst:0;if(type==='hire')mOut+=v
      return{month:i+1,in:mIn,out:mOut,result:mIn-mOut}
    })
    setResult({months,name:form.name})
  }
  const chartData=(result?.months||[]).map(m=>({name:`M+${m.month}`,'Com simulação':m.result,'Sem simulação':baseIn-baseOut}))
  return(
    <div className="space-y-5">
      <div className="rounded-xl p-5" style={{background:'#1e293b',border:'1px solid #334155'}}>
        <h3 className="text-sm font-semibold text-slate-300 mb-1 flex items-center gap-2"><Zap size={14} style={{color:'#10b981'}}/> Simulador</h3>
        <p className="text-xs text-slate-500 mb-4">Não altera os dados reais.</p>
        <div className="flex gap-2 mb-5 flex-wrap">
          {[['expense','💳 Compra'],['client','🤝 Novo Cliente'],['hire','👤 Contratação']].map(([k,l])=>(
            <button key={k} onClick={()=>{setType(k);setResult(null)}} className="px-3 py-2 rounded-lg text-xs font-medium transition-all"
              style={{background:type===k?'#10b981':'#33415540',color:type===k?'#fff':'#94a3b8',border:`1px solid ${type===k?'#10b981':'#334155'}`}}>{l}</button>
          ))}
        </div>
        <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-4">
          <Field label="Descrição"><Inp value={form.name} onChange={v=>setForm(f=>({...f,name:v}))} placeholder="Nome"/></Field>
          <Field label="Valor (R$)"><Inp type="number" value={form.value} onChange={v=>setForm(f=>({...f,value:v}))} placeholder="0,00"/></Field>
          {type==='expense'&&<Field label="Parcelas"><Inp type="number" value={form.installments} onChange={v=>setForm(f=>({...f,installments:v}))} placeholder="1"/></Field>}
          <Field label="Meses"><Inp type="number" value={form.months} onChange={v=>setForm(f=>({...f,months:v}))} placeholder="3"/></Field>
        </div>
        <Btn onClick={simulate}><Zap size={14}/> Simular</Btn>
      </div>
      {result&&(
        <div className="space-y-4">
          <div className="rounded-xl p-5" style={{background:'#1e293b',border:'1px solid #334155'}}>
            <h3 className="text-sm font-semibold text-slate-300 mb-3">{result.name||'Simulação'}</h3>
            <ResponsiveContainer width="100%" height={180}>
              <BarChart data={chartData} barSize={18}>
                <CartesianGrid strokeDasharray="3 3" stroke="#334155"/>
                <XAxis dataKey="name" tick={{fill:'#64748b',fontSize:11}} axisLine={false} tickLine={false}/>
                <YAxis tick={{fill:'#64748b',fontSize:10}} axisLine={false} tickLine={false} tickFormatter={v=>`${(v/1000).toFixed(0)}k`}/>
                <Tooltip content={<CTip/>}/><Legend wrapperStyle={{fontSize:11,color:'#94a3b8'}}/>
                <Bar dataKey="Sem simulação" fill="#475569" radius={[3,3,0,0]}/>
                <Bar dataKey="Com simulação" fill="#10b981" radius={[3,3,0,0]}/>
              </BarChart>
            </ResponsiveContainer>
          </div>
          <div className="rounded-xl overflow-hidden" style={{border:'1px solid #334155'}}>
            <table className="w-full"><thead style={{background:'#0f172a'}}><tr><Th>Mês</Th><Th right>Entradas</Th><Th right>Saídas</Th><Th right>Resultado</Th><Th right>Impacto</Th></tr></thead>
              <tbody>{result.months.map((m,i)=>{
                const impact=m.result-(baseIn-baseOut)
                return<tr key={i} className="border-t" style={{borderColor:'#334155',background:i%2===0?'#1e293b':'#1a2540'}}>
                  <Td>Mês +{m.month}</Td><Td right color="#10b981">{fmtBRL(m.in)}</Td><Td right color="#ef4444">{fmtBRL(m.out)}</Td>
                  <Td right color={m.result>=0?'#10b981':'#ef4444'}>{fmtBRL(m.result)}</Td>
                  <Td right color={impact>=0?'#10b981':'#ef4444'}>{impact!==0?(impact>0?'+':'')+fmtBRL(impact):'—'}</Td>
                </tr>
              })}</tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  )
}

  const fields={
    clients:<><Field label="Nome"><Inp value={form.name||''} onChange={v=>setForm(f=>({...f,name:v}))} placeholder="Empresa"/></Field><div className="grid grid-cols-2 gap-3"><Field label="Valor (R$)"><Inp type="number" value={form.value||''} onChange={v=>setForm(f=>({...f,value:v}))} placeholder="0,00"/></Field><Field label="Dia pgto"><Inp type="number" value={form.dueDay||''} onChange={v=>setForm(f=>({...f,dueDay:v}))} placeholder="10"/></Field></div></>,
    fixedExpenses:<><Field label="Nome"><Inp value={form.name||''} onChange={v=>setForm(f=>({...f,name:v}))} placeholder="Nome"/></Field><div className="grid grid-cols-2 gap-3"><Field label="Valor (R$)"><Inp type="number" value={form.value||''} onChange={v=>setForm(f=>({...f,value:v}))} placeholder="0,00"/></Field><Field label="Dia"><Inp type="number" value={form.day||''} onChange={v=>setForm(f=>({...f,day:v}))} placeholder="10"/></Field></div><div className="grid grid-cols-2 gap-3"><Field label="Categoria"><Sel value={form.category||'Outros'} onChange={v=>setForm(f=>({...f,category:v}))} options={CATEGORIES}/></Field><Field label="Cartão"><Sel value={form.cardId||''} onChange={v=>setForm(f=>({...f,cardId:v}))} options={[{value:'',label:'Conta corrente'},...cards.map(c=>({value:c.id,label:c.name}))]}/></Field></div></>,
    cards:<><div className="grid grid-cols-2 gap-3"><Field label="Nome"><Inp value={form.name||''} onChange={v=>setForm(f=>({...f,name:v}))} placeholder="Ex: Nubank PJ"/></Field><Field label="Tipo"><Sel value={form.type||'PJ'} onChange={v=>setForm(f=>({...f,type:v}))} options={['PJ','PF','Casa']}/></Field></div><div className="grid grid-cols-3 gap-3"><Field label="Limite (R$)"><Inp type="number" value={form.limit||''} onChange={v=>setForm(f=>({...f,limit:v}))} placeholder="0"/></Field><Field label="Fecha dia"><Inp type="number" value={form.closeDay||''} onChange={v=>setForm(f=>({...f,closeDay:v}))} placeholder="29"/></Field><Field label="Vence dia"><Inp type="number" value={form.dueDay||''} onChange={v=>setForm(f=>({...f,dueDay:v}))} placeholder="10"/></Field></div><Field label="Descrição"><Inp value={form.description||''} onChange={v=>setForm(f=>({...f,description:v}))} placeholder="Ferramentas..."/></Field></>,
    collaborators:<><Field label="Nome"><Inp value={form.name||''} onChange={v=>setForm(f=>({...f,name:v}))} placeholder="Nome"/></Field><div className="grid grid-cols-2 gap-3"><Field label="Função"><Inp value={form.role||''} onChange={v=>setForm(f=>({...f,role:v}))} placeholder="Designer"/></Field><Field label="Salário base (R$)"><Inp type="number" value={form.baseSalary||''} onChange={v=>setForm(f=>({...f,baseSalary:v}))} placeholder="0,00"/></Field></div></>,
  }
  const rowRender=item=>{
    if(tab==='clients')return<><Td>{item.name}</Td><Td right color="#10b981">{fmtBRL(item.value)}</Td><Td muted>Dia {item.dueDay}</Td></>
    if(tab==='fixedExpenses')return<><Td>{item.name}</Td><Td muted>{item.category}</Td><Td right color="#ef4444">{fmtBRL(item.value)}</Td><Td muted>Dia {item.day}</Td></>
    if(tab==='cards')return<><Td>{item.name}</Td><Td muted>{item.type}</Td><Td right>{item.limit>0?fmtBRL(item.limit):'—'}</Td><Td muted>F:{item.closeDay}/V:{item.dueDay}</Td></>
    if(tab==='collaborators')return<><Td>{item.name}</Td><Td muted>{item.role}</Td><Td right color="#3b82f6">{fmtBRL(item.baseSalary)}</Td></>
  }
  return(
    <div className="space-y-5">
      <div className="flex flex-wrap gap-3">
        <BtnG onClick={copyPrev}><Copy size={14}/> Copiar mês anterior</BtnG>
        <BtnG onClick={exportData}><Download size={14}/> Exportar JSON</BtnG>
        <label className="flex items-center gap-1.5 px-4 py-2 text-sm rounded-lg cursor-pointer" style={{background:'#33415540',color:'#94a3b8',border:'1px solid #334155'}}>
          <RefreshCw size={14}/> Importar JSON
          <input type="file" accept=".json" className="hidden" onChange={e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{dispatch({type:'IMPORT',payload:{data:JSON.parse(ev.target.result)}});toast('Importado')}catch{toast('Arquivo inválido','error')}};r.readAsText(f)}}/>
        </label>
      </div>
      <div className="flex gap-0 border-b border-slate-700">
        {tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)} className="px-4 py-2 text-sm font-medium transition-all -mb-px" style={{color:tab===t.id?'#10b981':'#64748b',borderBottom:tab===t.id?'2px solid #10b981':'2px solid transparent'}}>{t.label}</button>)}
      </div>
      <div className="flex items-center justify-between">
        <h3 className="text-sm font-semibold text-slate-300">{tabs.find(t=>t.id===tab)?.label}</h3>
        <Btn onClick={()=>{setForm({});setModal('add')}} small><Plus size={12}/> Adicionar</Btn>
      </div>
      <div className="rounded-xl overflow-hidden" style={{border:'1px solid #334155'}}>
        <table className="w-full"><tbody>
          {items.map((item,i)=>(
            <tr key={item.id} className="border-b" style={{borderColor:'#334155',background:i%2===0?'#1e293b':'#1a2540'}}>
              {rowRender(item)}
              <Td><div className="flex gap-1.5">
                <button onClick={()=>{setForm({...item});setModal(item)}} className="p-1 rounded text-slate-400 hover:text-slate-200"><Pencil size={13}/></button>
                <button onClick={()=>del(item.id)} className="p-1 rounded text-slate-400 hover:text-red-400"><Trash2 size={13}/></button>
              </div></Td>
            </tr>
          ))}
          {items.length===0&&<tr><td colSpan={5} className="px-3 py-8 text-center text-sm text-slate-500">Nenhum registro</td></tr>}
        </tbody></table>
      </div>
      {modal&&<Modal title={modal==='add'?'Novo Registro':'Editar'} onClose={()=>setModal(null)}>
        <div className="space-y-4">{fields[tab]}<div className="flex justify-end gap-2 pt-2"><BtnG onClick={()=>setModal(null)}>Cancelar</BtnG><Btn onClick={save}><Save size={14}/> Salvar</Btn></div></div>
      </Modal>}
    </div>
  )
}

// ─── SIDEBAR ──────────────────────────────────────────────────────────────────
const NAV=[
  {id:'dashboard',icon:LayoutDashboard,label:'Dashboard'},
  {id:'cashflow',icon:CalendarDays,label:'Fluxo de Caixa'},
  {id:'entries',icon:TrendingUp,label:'Entradas'},
  {id:'exits',icon:TrendingDown,label:'Saídas'},
  {id:'cards',icon:CreditCard,label:'Cartões'},
  {id:'collaborators',icon:Users,label:'Colaboradores'},
  {id:'annual',icon:Target,label:'Projeção Anual'},
  {id:'simulator',icon:Zap,label:'Simulador'},
  {id:'settings',icon:Settings,label:'Configurações'},
]

function Sidebar({activePage,setActivePage,open,setOpen}){
  return(
    <>
      {open&&<div className="fixed inset-0 z-30 lg:hidden" style={{background:'rgba(0,0,0,0.6)'}} onClick={()=>setOpen(false)}/>}
      <aside className={`fixed top-0 left-0 h-full z-40 flex flex-col transition-transform duration-300 ${open?'translate-x-0':'-translate-x-full'} lg:translate-x-0`}
        style={{width:220,background:'#0f172a',borderRight:'1px solid #1e293b'}}>
        <div className="flex items-center justify-between p-4 border-b" style={{borderColor:'#1e293b'}}>
          <div className="flex items-center gap-2.5">
            <div className="w-8 h-8 rounded-lg flex items-center justify-center font-bold text-sm" style={{background:'#10b981',color:'#fff'}}>P</div>
            <span className="font-bold text-slate-100 text-sm">PAIOL FINANCE</span>
          </div>
          <button onClick={()=>setOpen(false)} className="lg:hidden text-slate-500 hover:text-slate-300"><X size={16}/></button>
        </div>
        <nav className="flex-1 p-3 space-y-0.5 overflow-y-auto">
          {NAV.map(({id,icon:Icon,label})=>(
            <button key={id} onClick={()=>{setActivePage(id);setOpen(false)}} className="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-all text-left"
              style={{background:activePage===id?'#10b98115':'transparent',color:activePage===id?'#10b981':'#64748b',fontWeight:activePage===id?600:400}}>
              <Icon size={16}/>{label}
            </button>
          ))}
        </nav>
        <div className="p-4 border-t text-xs text-slate-600" style={{borderColor:'#1e293b'}}>v1.0 · Paiol Mídias</div>
      </aside>
    </>
  )
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function PaiolFinanceApp(){
  const [state,dispatch]=useReducer(reducer,null,loadState)
  const [activePage,setActivePage]=useState('dashboard')
  const [sidebarOpen,setSidebarOpen]=useState(false)
  const [toasts,setToasts]=useState([])
  const today=new Date()
  const [selYear,setSelYear]=useState(today.getFullYear())
  const [selMonth,setSelMonth]=useState(today.getMonth()+1)
  const mk=monthKey(selYear,selMonth)

  // Salva localmente imediato + envia para Sheets com debounce de 2s
  useEffect(()=>{
    try{localStorage.setItem('paiolfinance_v1',JSON.stringify(state))}catch{}
    const t=setTimeout(()=>gasPost(state).catch(()=>{}),2000)
    return()=>clearTimeout(t)
  },[state])

  // Na inicialização, sincroniza do Sheets (substitui localStorage se houver dado)
  useEffect(()=>{
    gasGet().then(data=>{
      if(data){
        dispatch({type:'IMPORT',payload:{data}})
        localStorage.setItem('paiolfinance_v1',JSON.stringify(data))
      }
    }).catch(()=>{})
  },[])

  const toast=useCallback((msg,type='success')=>{
    const id=uid();setToasts(t=>[...t,{id,msg,type}])
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3000)
  },[])

  function prevMonth(){if(selMonth===1){setSelYear(y=>y-1);setSelMonth(12)}else setSelMonth(m=>m-1)}
  function nextMonth(){if(selMonth===12){setSelYear(y=>y+1);setSelMonth(1)}else setSelMonth(m=>m+1)}

  const pp={state,dispatch,monthKey:mk,toast}
  const pages={
    dashboard:<DashboardPage {...pp}/>,cashflow:<CashFlowPage {...pp}/>,entries:<EntriesPage {...pp}/>,
    exits:<ExitsPage {...pp}/>,cards:<CardsPage {...pp}/>,collaborators:<CollaboratorsPage {...pp}/>,
    annual:<AnnualProjectionPage {...pp}/>,simulator:<SimulatorPage {...pp}/>,settings:<SettingsPage {...pp}/>,
  }
  const monthData=state.months[mk]||{}

  return(
    <div className="min-h-screen flex" style={{background:'#1e293b',color:'#f1f5f9',fontFamily:'system-ui,sans-serif'}}>
      <Sidebar activePage={activePage} setActivePage={setActivePage} open={sidebarOpen} setOpen={setSidebarOpen}/>
      <div className="flex-1 flex flex-col min-h-screen" style={{marginLeft:0,paddingLeft:0}}>
        <div className="flex-1 flex flex-col min-h-screen lg:ml-[220px]">
          {/* Header */}
          <header className="sticky top-0 z-20 flex items-center justify-between px-4 py-3" style={{background:'#1e293b',borderBottom:'1px solid #334155'}}>
            <div className="flex items-center gap-3">
              <button onClick={()=>setSidebarOpen(true)} className="lg:hidden p-2 rounded-lg text-slate-400 hover:bg-slate-700 transition-colors"><Menu size={18}/></button>
              <div className="flex items-center gap-2">
                <button onClick={prevMonth} className="p-1.5 rounded-lg text-slate-400 hover:bg-slate-700 transition-colors"><ChevronLeft size={16}/></button>
                <span className="text-sm font-semibold text-slate-100 min-w-[130px] text-center">{MONTH_NAMES[selMonth-1]} / {selYear}</span>
                <button onClick={nextMonth} className="p-1.5 rounded-lg text-slate-400 hover:bg-slate-700 transition-colors"><ChevronRight size={16}/></button>
              </div>
            </div>
            <div className="flex items-center gap-3">
              {monthData.closed&&<span className="px-2 py-0.5 text-xs rounded-full" style={{background:'#10b98120',color:'#10b981'}}>Fechado</span>}
              <div className="text-right hidden sm:block"><div className="text-xs text-slate-500">Saldo em caixa</div><div className="text-base font-bold" style={{color:'#10b981'}}>{fmtBRL(monthData.cashBalance)}</div></div>
              <div className="p-2 rounded-lg" style={{background:'#10b98120'}}><Wallet size={16} style={{color:'#10b981'}}/></div>
            </div>
          </header>
          <div className="px-4 pt-4 pb-2"><h1 className="text-base font-semibold text-slate-200">{NAV.find(n=>n.id===activePage)?.label}</h1></div>
          <main className="flex-1 px-4 pb-8">{pages[activePage]}</main>
        </div>
      </div>
      <Toast toasts={toasts}/>
    </div>
  )
}

ReactDOM.createRoot(document.getElementById('root')).render(<PaiolFinanceApp/>)
</script>
</body>
</html>
